 sovereignty as both normative and de facto, civil war as the people deciding who is sovereign, and the risks of distorting the outcome, prolonging suffering, and proxy wars.","type":"apply"},{"q":"Humanitarian intervention and 'R2P' are called the most controversial yet perhaps most important just cause. Using the notes' examples (Rwanda, Bosnia, East Timor on one side; Iraq, Afghanistan, Libya, Syria, Gaza on the other), argue both for and against recognising humanitarian intervention as a just cause.","week":4,"idea":"Humanitarian intervention and the Responsibility to Protect — the responsibility-not-to-stand-aside vs. the selective, sometimes outcome-worsening, deployment of the argument.","type":"case"},{"q":"Having a just cause is necessary but not sufficient. Take the 2003 invasion of Iraq (or Afghanistan) and run it through 'last resort', 'right intention', 'reasonable chance of success' and 'proportionality', explaining how a war with an arguable just cause can still fail jus ad bellum.","week":4,"idea":"All six ad bellum criteria must be met — just cause is not sufficient; last resort, right intention, success, and proportionality each provide independent grounds for a war to be unjust.","type":"apply"},{"q":"Explain the 'proper authority' criterion. Why is it 'especially vexed' within nations (Head of State vs. Parliament; the decline of formal declarations of war) and in relation to the UN Security Council and Article 51 of the UN Charter?","week":4,"idea":"Proper authority — the legitimate-government requirement, its erosion via undeclared wars, and the contested claim that the UNSC is now the proper authority (with Article 51's self-defence 'wriggle room').","type":"define"},{"q":"The 'reasonable chance of success' criterion implies that hopeless 'wars of defiance' are unjustified. Explain the criterion (noting that 'success' means realising the just cause, not merely winning), and then make the case that it objectionably 'lines up with the interests of the powerful'.","week":4,"idea":"Reasonable chance of success — victory conditions tied to the just cause (the undefined 'victory conditions' of the war on terror), and the troubling implication that the powerless have no right to resist.","type":"argue"},{"q":"Define the jus ad bellum proportionality criterion and carefully distinguish it from the jus in bello proportionality criterion. Why must the ad bellum calculation be a judgement about reasonably foreseeable goods and harms (to BOTH sides) rather than actual outcomes?","week":4,"idea":"Ad bellum proportionality (stakes of going to war vs. all consequences for both sides, judged ex ante on probabilities) vs. in bello proportionality (collateral harm of a particular attack vs. its military objective) — a distinction students must not conflate.","type":"define"},{"q":"Reflective exercise 4.1 — If someone attacks you and you defend yourself, are you violating their right to personal security?","week":4,"idea":"Probing the intuition behind self-defence: whether the attacker forfeits/voids their right (the basis of asymmetric individual self-defence) — groundwork for the domestic analogy and moral equality of soldiers.","type":"probe"},{"q":"Reflective exercise 4.2 — If you make what you take to be a convincing argument to someone about an important matter and they are unconvinced, what do you conclude? About them? About your argument?","week":4,"idea":"What we may legitimately expect of a philosophical argument — even sound JWT arguments cannot compel belief or prevent war, which bears on the pacifist worry that JWT is too easily abused.","type":"probe"},{"q":"Reflective exercise 4.3 — What would your life be like if you had no guarantee what laws you would live under in future? How would it affect your daily life and happiness? What would it be like if you could not guarantee that strangers would not come into your home?","week":4,"idea":"The value of sovereignty/security: distinguishing a threat to one's personal life from a threat to the social order and one's capacity to plan — why sovereignty (and its defence) might matter even absent a direct threat to life.","type":"probe"},{"q":"Reflective exercise 4.4 — If you knew your partner was going to kill you and that neither running away nor the police would prevent it, would you be justified in attacking and killing them first?","week":4,"idea":"The intuition pump for pre-emptive self-defence — imminence, the futility of alternatives, and how the individual case is meant to license seizing the initiative at the level of states.","type":"probe"},{"q":"Reflective exercise 4.5 — If a nation can't win a war, is it justified in fighting it?","week":4,"idea":"The intuition behind 'reasonable chance of success' — and the worry that answering 'no' denies the weak and oppressed a right to resist while favouring the powerful.","type":"probe"},{"q":"Sparrow notes that with each edition of Just and Unjust Wars Walzer became more willing to justify US interventions, and that 'smart people who want to support their government can usually find a way to rationalise it'. Does the very flexibility of JWT — its many grounds for war — vindicate the pacifist critique that it makes war too easy to justify?","week":4,"idea":"The pacifist/meta critique of JWT: that by allowing so many grounds for war it is prone to abuse and rationalisation, set against JWT's self-understanding as primarily a tool to dissuade states from war.","type":"meta"},{"q":"Sparrow advises students to grasp the overall structure of JWT and to 'develop a sense of why each and every one of the jus ad bellum criteria is controversial'. Pick any three criteria and articulate the deepest worry about each, then say what these worries share.","week":4,"idea":"Synthesis — every ad bellum criterion is contestable, and the recurring source of controversy is that each can be stretched to license more war or to disadvantage the weak, against JWT's war-limiting purpose.","type":"meta"},{"q":"What is 'humanitarian intervention'? In the R2P debate, what does 'intervention' fundamentally mean, and why does Sparrow stress it is primarily a violation of sovereignty rather than just any cross-border action?","week":5,"idea":"Definitional: intervention = military action that violates the sovereignty of the target state (distinguished from economic policy, blockades, funding dissident groups, soft power).","type":"define"},{"q":"Define a 'humanitarian emergency'. Walk me through the competing thresholds Sparrow lays out — 'ongoing serious violations of human rights on a large scale' vs 'civilian deaths from deliberate government action or inaction' vs 'genocide' — and explain what each definition includes and excludes (e.g. rape, famine, poverty, military coups).","week":5,"idea":"Definitional: the threshold for a 'humanitarian emergency' must be set high ('shock the conscience of mankind'); rival definitions capture different harms, and where you set the bar determines what counts as just cause.","type":"define"},{"q":"Distinguish the two accounts of the basis of sovereignty Sparrow gives — the 'de facto / effective' account (monopoly on force plus recognition) versus the 'moralised' account (consent of the people). What do both ultimately share as their moral foundation?","week":5,"idea":"Two accounts of sovereignty: de facto (effective control + recognition) vs moralised (consent/representation); both rest on the human need for security and make sovereignty a matter of right.","type":"define"},{"q":"What is the 'Responsibility to Protect' (R2P)? Explain the core move it makes — that when a state fails to protect its citizens the responsibility falls on all UN member states, and that this may weaken the failing state's claim against intervention.","week":5,"idea":"R2P: sovereignty is grounded in the human rights of individuals; states owe protection to those within their borders, and failure transfers that responsibility to the international community.","type":"define"},{"q":"Sparrow separates three different questions about humanitarian intervention within Just War Theory. What are they, and why does keeping them apart matter for the argument?","week":5,"idea":"Three questions: (1) can humanitarian emergency be a 'just cause'? (2) is intervention ever justified given the other jus ad bellum criteria? (3) what is the 'proper authority'?","type":"debate"},{"q":"Apply the jus ad bellum criteria to the 2011 NATO intervention in Libya. Why does Sparrow use Libya as a case where intervention 'arguably itself generated a humanitarian emergency', and what does it show about proportionality and reasonable chance of success?","week":5,"idea":"Case application: Libya — intervention can collapse a government without a replacement ('any government may be better than no government'), illustrating the proportionality / chance-of-success problem.","type":"apply"},{"q":"Take the Cold War cases (Cambodia under Pol Pot) and the post-Cold-War failures (Srebrenica, Rwanda, Darfur). What do these examples establish about why R2P emerged, and how was the UN itself implicated?","week":5,"idea":"Historical motivation for R2P: realpolitik paralysis during the Cold War, then post-1989 massacres while the international community (and UN peacekeepers) looked on — driving Annan's push for a new consensus.","type":"case"},{"q":"Kosovo is the obvious case for the 'proper authority' question. If a humanitarian crisis 'shocks the conscience of mankind' but the Security Council is deadlocked by a veto, can a unilateral or coalition intervention be legitimate? Argue it.","week":5,"idea":"Proper authority: tension between requiring a Security Council mandate (consistency, restraint) and the moral pull toward unilateral action when the Council fails (Kosovo).","type":"argue"},{"q":"State the strongest case AGAINST humanitarian intervention from the value of sovereignty, then the strongest case FOR it from R2P. How does each side handle the 'abuse worry' — that R2P is a fig leaf for imperialism?","week":5,"idea":"Central debate: sovereignty (Westphalian peace/stability by limiting causes of war) vs R2P (rights are universal); the imperialism/abuse objection and R2P's three replies.","type":"argue"},{"q":"Sparrow says the charge that humanitarian intervention is 'just a fig leaf for imperialism' must be taken seriously. Give the three responses R2P advocates offer to the selectivity/hypocrisy objection, and assess whether they work.","week":5,"idea":"Imperialism objection and replies: (1) it's early days — norms may bind powerful states too; (2) a principle isn't void just because it can be abused; (3) better some crises addressed than none.","type":"argue"},{"q":"Contrast the 'philosopher's example' (half a dozen troops kill one leader to stop half a million deaths) with the 'accurate reading of history and politics' approach. Which method should govern how we think about the ethics of war, and why does Sparrow think this is the big-picture question?","week":5,"idea":"The 'big picture' question: idealised thought experiments make intervention look obviously justified, but realistic appraisal of what actually happens when we license intervention may point the other way — two rival methods.","type":"meta"},{"q":"How does the 'right intention' criterion help answer worried critics who say powerful nations will abuse R2P? And why does a state's inconsistent track record (intervening in some places, not others) bear on whether it acts with right intention?","week":5,"idea":"Right intention: if a state isn't really fighting to stop the emergency it fails this test; hypocrisy/selectivity undercuts our faith that the stated humanitarian motive is the real one.","type":"apply"},{"q":"Why is the 'last resort' criterion especially tricky for humanitarian interventions? Sparrow notes the emergency is ongoing so every day's delay kills more people — how do you weigh that urgency against the reasons not to license too many wars?","week":5,"idea":"Last resort under emergency conditions: ongoing deaths create pressure to act now, but available non-military alternatives must be tried first — the balance is genuinely hard.","type":"argue"},{"q":"Is Westphalian sovereignty a myth? Lay out Krasner's argument that states have always interfered in each other's domestic affairs (e.g. through human-rights treaties), and explain Sparrow's reply about why bombing or invading is still 'quite another' thing.","week":5,"idea":"Krasner / sovereignty-as-myth: states constantly shape each other's domestic affairs (currency, treaties), but Sparrow distinguishes that from the military violation of sovereignty at stake in R2P.","type":"define"},{"q":"Sparrow connects the definitional dispute to a real current controversy — whether Israel's policy toward Gaza is 'genocidal' or whether a 'genocide' is occurring in Gaza. Use the rival definitions of humanitarian emergency to show why this labelling matters for intervention.","week":5,"idea":"Connect to event: the choice between 'large-scale rights violations', 'civilian deaths from state action/inaction', and 'genocide' has real stakes — visible in the Gaza genocide debate.","type":"case"},{"q":"REFLECTIVE EXERCISE 5.1: Is your nationality something that you deserve? What have you done to have the nationality that you possess? Do people born in Australia have any more right to be in Australia than people born in Afghanistan? Why/why not?","week":5,"idea":"Probing intuitions: the moral arbitrariness of nationality — tests whether human rights are universal and whether borders carry moral weight, the foundation of R2P's universalism.","type":"probe"},{"q":"REFLECTIVE EXERCISE 5.2: Do people in Syria have the same human rights as people in Australia? What, if anything, does your answer imply for the extent to which the Australian government should protect the human rights of people in Syria?","week":5,"idea":"Probing intuitions: universality of human rights vs the limits of a national government's protective duties — the core R2P premise that universal rights make demands on all who become aware of their denial.","type":"probe"},{"q":"REFLECTIVE EXERCISE 5.3: What role should evidence about the history of humanitarian interventions play in determining the justification of humanitarian interventions in the future?","week":5,"idea":"Probing intuitions / method: whether the historical track record of interventions (mostly failures) should constrain forward-looking judgements — links to proportionality and the 'big picture' question.","type":"probe"},{"q":"REFLECTIVE EXERCISE 5.4: Would it be morally worse to kill everyone in Australia than to kill the same number of people in China?","week":5,"idea":"Probing intuitions: tests partiality/nationalism vs impartial valuation of human life — pressure-testing the universalism that R2P relies on.","type":"probe"},{"q":"REFLECTIVE EXERCISE 5.5: If a nation systematically failed to protect the human rights of women, would that constitute grounds for humanitarian intervention?","week":5,"idea":"Probing intuitions: whether gendered injustice (e.g. widespread rape, denial of women's rights) crosses the humanitarian-emergency threshold — exposing which definition you are committed to.","type":"probe"},{"q":"REFLECTIVE EXERCISE 5.6: Can the real government of a territory be in exile?","week":5,"idea":"Probing intuitions: tests the de facto (effective control) vs moralised (consent/representation) accounts of sovereignty — a government in exile lacks a monopoly on force but may retain legitimacy.","type":"probe"},{"q":"REFLECTIVE EXERCISE 5.7: To what extent does the Australian government control the Australian economy? Its environmental conditions? Its culture? Should it?","week":5,"idea":"Probing intuitions: interrogates whether any state truly controls its 'domestic affairs' — feeding the 'Westphalian sovereignty is a myth' / Krasner line.","type":"probe"},{"q":"REFLECTIVE EXERCISE 5.8: Does Australia have a responsibility to protect the human rights of people living in Vietnam?","week":5,"idea":"Probing intuitions: makes the R2P claim concrete — do universal human rights generate a positive duty on one state to protect citizens of another?","type":"probe"},{"q":"Sparrow notes some humanitarian emergencies attract more attention than others — European/American lives over Asian/African ones, and always 'what should the West do about Africa/Asia' rather than vice versa (he jokes about Cuba aiding the US after Katrina). Does this selectivity defeat the whole idea of humanitarian intervention, or not?","week":5,"idea":"Selectivity / hypocrisy: recognition of bias can lead to distrust of intervention, but Sparrow argues you wouldn't want to hold that no crisis is addressed unless all are.","type":"argue"},{"q":"Why does Sparrow argue there should be a HIGHER threshold of authorisation for humanitarian war than for self-defence? Connect this to the worry that R2P represents 'a radical change to the international order'.","week":5,"idea":"Higher threshold: anything beyond self-defence challenges the international order, so humanitarian war needs more demanding authorisation and a high emergency threshold to avoid licensing too many wars.","type":"debate"},{"q":"Sparrow ends with the Realist twist: maybe the very idea of universal human rights is itself a threat to the international order of sovereign states, and thus to peace. Reconstruct that argument and say whether 'less regard for sovereignty' or 'less regard for universal rights' is the better response to the fact that intervention always comes too late.","week":5,"idea":"'Why war?' / Realist conclusion: respect for sovereignty blocks early prevention, so either we downgrade sovereignty for the sake of rights, or we see universal rights as a destabilising threat to the peace sovereignty secures.","type":"meta"},{"q":"The notes say the US justifying the invasion/occupation of Iraq and Afghanistan as humanitarian 'damaged the credibility of the idea significantly'. How does the misuse of a justification by one actor affect the moral standing of the doctrine itself? Connect to R2P advocates' reply that principles aren't void because hypocrites abuse them.","week":5,"idea":"Abuse vs validity: misuse of R2P (Iraq/Afghanistan) damaged its credibility, but advocates argue a sound moral principle is not refuted by its being abused.","type":"case"},{"q":"State the principle of distinction precisely. What does it require combatants to distinguish between, and what exactly does it prohibit?","week":6,"idea":"Distinction prohibits directly targeting non-combatants/civilians/'innocents'; combatants must distinguish them from enemy combatants and make every effort to avoid killing them. It establishes legitimate vs illegitimate targets of attack.","type":"define"},{"q":"The principle is expressed in terms of the permissibility of 'targeting' or 'deliberately attacking' rather than the permissibility of 'killing'. Why does that wording matter, and what doctrine does the gap rely on?","week":6,"idea":"Distinction permits incidentally killing non-combatants while directly targeting combatants; it is the doctrine of double effect (intended vs merely foreseen consequences) that licenses this — otherwise lethal force would only be permissible when combatants are wholly separated from civilians, which is rare in modern war.","type":"define"},{"q":"Distinguish the three sub-principles of jus in bello, and explain how distinction differs from proportionality and from the prohibition on 'evil means'.","week":6,"idea":"Jus in bello = distinction (legitimate vs illegitimate targets), proportionality (anticipated harm justified by military objective, including combatant deaths in JWT but only civilian casualties in IHL), and avoidance of mala in se weapons (serrated bayonets, poison gas, dum-dum bullets).","type":"define"},{"q":"If you are fighting in a just cause, is there anything you should be unwilling to do in order to secure victory? Why or why not? [Reflective exercise 6.1]","week":6,"idea":"Probes whether jus in bello restrictions are absolute even for the just side — the tension between consequentialist 'win at all costs' reasoning and the claim that distinction/proportionality/evil-means are absolute prohibitions. Sets up the independence thesis and the slide toward 'total war'.","type":"probe"},{"q":"You are a bomber pilot in a just war over democratic Transzania. Which of these may you permissibly attack, and why does the line fall where you draw it: children under 5, citizens, voters, war supporters, farmers (feed the military), uniform-factory workers, electronics-factory workers (chips for weapons), ammunition-factory workers, factory owners, government offices, Parliament House, propagandising TV stations, military cooks, military medics, all military personnel, only frontline personnel, only those actually firing weapons? [Reflective exercise 6.2]","week":6,"idea":"Forces the student to locate the combatant/non-combatant line on a continuum of war-involvement; surfaces the munitions-worker vs farmer puzzle, the status of medics/cooks, voters/supporters, and the 'as soldiers vs as people' distinction. Demonstrates that none of the three candidate criteria (personnel, innocence, combatant-status) draws a clean line.","type":"probe"},{"q":"Walk through the three successive attempts to draw the line of distinction — military-personnel-vs-civilians, innocent-vs-responsible, combatant-vs-non-combatant — and say why each first two fail.","week":6,"idea":"Personnel-vs-civilian fails because some civilians (leaders, munitions workers) are legitimate targets while some military (doctors, clerics) are not; innocent-vs-guilty/responsible fails because conscripts are innocent yet targetable while voting citizens are 'responsible' yet protected; combatant/non-combatant just relocates the controversy into defining those terms ('those actively engaged in the business of war').","type":"define"},{"q":"Why are munitions-factory workers conventionally treated as legitimate targets while farmers who feed the army are not, even though an army can fight without neither? Is the distinction defensible?","week":6,"idea":"The 'as soldiers vs as people' defence: supplying food supports soldiers as people (they would eat anyway), while supplying weapons/ammunition supports them as soldiers (no use except to fight). Tests whether contribution-to-war-effort tracks targetability — echoes Nagel's soldiers/persons distinction.","type":"apply"},{"q":"Apply the principle of distinction to the SAS conduct examined in the Brereton Report. Were the killings violations of distinction, and which sub-principle is actually at stake?","week":6,"idea":"Tests application to a real Australian event: unlawful killing of prisoners/non-combatants (those who had surrendered or were no longer capable of fighting become non-combatants). Distinguishes distinction (illegitimate targets) from proportionality, and engages the rule that combatants regain non-combatant status by surrender/incapacitation.","type":"case"},{"q":"The US bombed a Serbian TV station in 1999 (propaganda) and has drone-struck Islamic religious leaders for providing religious justification for fighting. Are propagandists, journalists and clerics who 'recruit' legitimate targets under distinction?","week":6,"idea":"The bloggers/journalists/clerics controversy: targeting those who 'support' the war slides toward making everyone who supports the war a target, threatening to collapse the whole combatant/non-combatant distinction.","type":"case"},{"q":"Set out the three candidate justifications for the jus in bello principles in general — consequentialist, conventional, deontological — and explain why each struggles to ground them as absolute prohibitions.","week":6,"idea":"Consequentialism collapses whenever breaking the rule has better consequences (and in a just war we already assume losing is disastrous); convention can lapse when the enemy defects, yet Common Article 1 of the 1949 Geneva Conventions demands compliance 'in all circumstances'; deontology struggles because respect-for-persons/human-rights doesn't obviously license any killing. JWT's 'hybrid' nature.","type":"argue"},{"q":"Argue both sides: should the principle of distinction be understood as merely conventional? What does treating it as a convention gain, and what can it not explain?","week":6,"idea":"Convention can carry real moral weight (the driving-side analogy) and is justified consequentially by reducing war's destruction; but convention can't explain why distinction binds absolutely even when the enemy violates it, and it seems implausible that targeting innocent civilians could be made permissible by adopting a different convention.","type":"argue"},{"q":"Self-defence is one justification for killing combatants — Walzer says the enemy soldier 'has been made into a dangerous man'. Lay out the objections to grounding distinction in a right of self-defence.","week":6,"idea":"Self-defence normally licenses killing only direct threats, yet combatants kill sleeping soldiers far behind the lines and aggressors who launch the first attack can't claim self-defence; self-defence also undermines the independence thesis (an unjust aggressor can't justify killing the victim's response); and the enemy attacks our nation, not 'us' (the domestic-analogy point).","type":"argue"},{"q":"Explain the responsibility-based justification Primoratz explores, and why it both succeeds and fails. Whom does it justify killing, and whom does it wrongly capture or miss?","week":6,"idea":"Responsibility for an unjust war can forfeit one's right not to be killed — works well for political leadership, but fails for 'all and only enemy soldiers': most soldiers aren't responsible for the war's existence, conscripts are forced, some can't tell their cause is unjust, while in democracies the responsible parties may be the whole voting population. It also forces abandoning the independence of jus in bello and jus ad bellum.","type":"argue"},{"q":"Evaluate the 'forfeiture/consent' justification — that by signing on to military service combatants forfeit their right to life or consent to be targets. This is Sparrow's 'Hands up who wants to die?' move. What are the three problems with it?","week":6,"idea":"Three objections: (1) it assumes what it sets out to prove — we expect people to shoot at soldiers, but that isn't the same as their being justified, and the just-cause soldier is doing the right thing so shouldn't be liable; (2) it can't explain killing conscripts who had no choice; (3) it extends to civilians, who arguably also accept liability by not emigrating while standing to gain from victory. Also: many join the military only for a wage/training/education.","type":"argue"},{"q":"Explain McMahan's liability-based revisionism and how it bears on the moral equality of combatants. Why is the moral equality of combatants controversial, and what does liability imply for it?","week":6,"idea":"The independence thesis gives just and unjust combatants equal moral permissions (moral equality of combatants); McMahan-style liability grounds permissibility in moral responsibility for an unjustified threat, which implies unjust combatants are liable and just combatants are not — denying moral equality and rejecting the independence of jus ad bellum and jus in bello.","type":"debate"},{"q":"Outline the core of the Primoratz vs Sparrow debate. What exactly is at issue, and how does it turn on the independence of jus ad bellum and jus in bello?","week":6,"idea":"The central debate is the plausibility of the independence thesis: can someone trying to kill me in an unjust cause really have the same moral permissions I have defending a just cause? Responsibility/liability accounts (Primoratz) push toward denying independence; the convention/consequentialist defence preserves it but can't ground absoluteness.","type":"debate"},{"q":"Suppose we conclude no plausible account of distinction can be given. The notes say two opposite conclusions follow — what are they, and why is the more 'fine-grained' our account, the sharper the dilemma?","week":6,"idea":"Either pacifism (we can never justify the killing war requires) or 'total war' (abandon distinction since we can't renounce war). The more intellectually plausible/fine-grained the criterion, the more it shows we can't make the required distinctions in real wartime conditions — pushing toward pacifism — yet the more effort invested, the less plausible giving up entirely.","type":"debate"},{"q":"The 'big picture' worry: jus in bello seems to advantage the militarily powerful, who can use precision weapons while weaker forces wielding IEDs or inaccurate rockets are convicted of war crimes — potentially requiring the weak not to fight back. Is this a fatal objection to jus in bello, and how does it connect to terrorism?","week":6,"idea":"Precision weapons make distinction/proportionality easy for the strong and near-impossible for the weak, so jus in bello may effectively demand the weak surrender; the claim that jus in bello is a tool of powerful states is used to justify attacks on non-combatants for political ends — i.e. terrorism, next week's topic. But: what is jus in bello worth if it rules nothing out?","type":"meta"},{"q":"How does the combatant/non-combatant distinction fare in wars against non-state actors such as Al Qaeda or the Taliban, where people move fluidly in and out of combatant roles? What does this imply for targeted killing?","week":6,"idea":"Several authorities argue distinction breaks down against non-state actors and popular resistance movements; fluid role-switching makes status hard to fix, foreshadowing the targeted-killing topic and the danger of reverting to targeting anyone who 'supports' the fight.","type":"apply"},{"q":"Beyond defining legitimate targets, the notes flag further tasks: defining what 'targeting/deliberately killing' involves, setting a standard of reasonable care, and responding to human shields or military installations disguised as civilian objects. Why are these as important as the line-drawing itself, and what role does double effect play across them?","week":6,"idea":"Applying distinction needs an account of intention/targeting, a reasonable-care standard for avoiding civilian casualties, and rules for enemy abuse (human shields, disguise). The doctrine of double effect (intended vs merely foreseen) is central to all three and is what makes lethal force usable when combatants are mixed with civilians.","type":"meta"},{"q":"What is terrorism? Reflective exercise 7.1: What makes something an act of terrorism? Is there anything that all terrorist acts have in common?","week":7,"idea":"The first of the three big questions: defining the topic area. Philosophers seek necessary and sufficient conditions; terrorism may be a 'cluster' or 'family resemblance' concept that resists tidy definition.","type":"define"},{"q":"Reflective exercise 7.2: Can terrorism ever be justified? If so, when? If not, why not?","week":7,"idea":"The second big question: the justification (or otherwise) of terrorism. Justification depends on the morality of ends and means (effectiveness, nature of means, availability of alternatives).","type":"probe"},{"q":"Why is it better to define 'an act of terrorism' first and only then define 'terrorists', rather than the other way around? What rhetorical work does the label 'terrorist' do?","week":7,"idea":"Defining acts before actors. Calling someone a 'terrorist' implies they are evil through-and-through and radically different from ordinary people who support political violence; governments prefer to talk about terrorists rather than terrorism.","type":"define"},{"q":"Explain the difference between a necessary and a sufficient condition, using your own examples, and say why both matter when defining terrorism.","week":7,"idea":"Philosophical method of definition. A necessary condition: no Xs that aren't Ys (all bats are warm-blooded). A sufficient condition: every Y is an X (every chameleon is a lizard). Ideally a definition gives conditions jointly necessary and sufficient.","type":"meta"},{"q":"Should the definition of terrorism build in that the act is unlawful, immoral, or unjustified? What goes wrong if we do?","week":7,"idea":"Whether to build justification into the definition. Defining terrorism as unjustified would make the ethics-of-terrorism debate impossible and would force every 'is this terrorism?' dispute to become a dispute about justification.","type":"argue"},{"q":"Walk me through the candidate features of terrorism (violence/threats, persons vs property, illegal/unauthorised, provoking terror, killing innocents, targeting non-combatants, political goals) and say which you would keep and which you would drop.","week":7,"idea":"Towards a definition: assessing candidate criteria. Each feature has problems, e.g. 'illegal' rules out state terrorism, 'kills innocents' is too broad since innocents always die in war, intention-based criteria raise hard cases.","type":"define"},{"q":"State and defend Primoratz's definition: 'Acts or threats of violence which target non-combatants with the aim of achieving political goals through coercion and intimidation.' What are its two main advantages?","week":7,"idea":"Primoratz's definition (slightly modified). Advantage 1: it doesn't prejudge justification (leaves a real debate open). Advantage 2: it is silent on the actor, so it allows for both state and non-state terror.","type":"debate"},{"q":"Reflective exercise 7.3: Does Primoratz's definition seem plausible? Can you come up with counterintuitive consequences, things it would count as terrorism that most people (or you) wouldn't, or things it wrongly excludes?","week":7,"idea":"Testing the chosen definition against intuitions. It loosens the link to actual terror (one can be coerced without being terrorised) and excludes acts historically called terrorism aimed at arguable combatants, e.g. the 9/11 Pentagon attack and attacks on US troops.","type":"probe"},{"q":"Compare the official Australian, US FBI, and Chinese definitions of terrorism. What does each get wrong or include too much, and why does Sparrow prefer Primoratz's?","week":7,"idea":"Official definitions and their flaws. The Australian definition would count attacks on the army and trade blockades; the FBI's 'violation of criminal law' clause exempts lawful police/army action; China's 'social panic / other purposes' is extremely broad.","type":"case"},{"q":"Reflective exercise 7.4: A man murders his children because his wife has announced she is leaving him for another man. Is this an act of terrorism? Why or why not?","week":7,"idea":"Applying the definition to a hard case. Tests whether the act targets non-combatants/innocents to coerce and intimidate for a (political?) goal, probing the political-motivation and coercion criteria.","type":"apply"},{"q":"Reflective exercise 7.5: Police attend a student demonstration in riot gear with batons and guns, announcing they are there to 'preserve order'. Are they terrorists?","week":7,"idea":"Threats of violence by the state and the 'illegal/unauthorised' criterion. The state's monopoly on force rests on threatening violence against all citizens; this probes whether lawful state coercion can be terrorism.","type":"apply"},{"q":"Can states be terrorists? Distinguish 'internal' from 'external' state terrorism and explain why the combatant/non-combatant language fits state terror badly.","week":7,"idea":"State terrorism. Two senses: internal (against one's own population) vs external (against other states, deferred to the terrorism-and-war discussion). Outside war no one is a combatant, so we speak of 'innocents' rather than the guilty/responsible.","type":"debate"},{"q":"Sparrow says 'a form of terrorism sits at the heart of state power.' Explain that claim, and explain why most people think it is 'a step too far.'","week":7,"idea":"Terror at the heart of sovereignty. Sovereignty is an effective monopoly on force; the state secures peace by threatening violence against all citizens. But making every state terrorist erases the distinction between legitimate democracies and regimes that survive only by terror.","type":"argue"},{"q":"Give examples of states terrorising their own citizens, and say what makes these clear cases of state terror.","week":7,"idea":"Historical cases of internal state terror. Bolshevik 'red terror', Stalin's 'great terror' (~750,000 killed, 1m+ in camps), Argentina/Guatemala/Chile dictatorships, Tiananmen Square, and Iran's suppression of protests.","type":"case"},{"q":"Some critics argue that rape, intimate-partner violence, and racist/homophobic intimidation are forms of terrorism. Lay out the argument and the strongest objection to it.","week":7,"idea":"'Domestic', racist, gendered, or homophobic terror. These fit the definition (violence/threats at innocents to coerce and intimidate). The main objection: the actor is a loose social group ('men', 'racists'), not an organisation with the requisite intentions/political goal, an objection that also threatens 'lone wolf' terrorism talk.","type":"apply"},{"q":"Reflective exercise 7.6: Are people ever justified in overthrowing the government? In using violence to overthrow a government?","week":7,"idea":"Justification of revolutionary/regime-change violence. Connects to the ultimate ends of non-state terrorists (national self-determination, revolution, regime change) and the parity argument that if state violence for such ends is justified, non-state violence might be too.","type":"probe"},{"q":"Reflective exercise 7.7: Does terrorism ever 'work'? Can you think of examples where terrorist acts helped political actors achieve their goals?","week":7,"idea":"Effectiveness of terrorist means. The 'terrorism doesn't work' argument vs historical counter-cases (Zionist terror driving Britain from Palestine, Hezbollah forcing Israel from Lebanon, constraints on US Mideast policy, Irish nationalist gains), complicated by mixed tactics and Gandhi-style non-violent successes.","type":"case"},{"q":"Distinguish the ultimate from the proximate goals of (non-state) terrorists, with examples of each, and explain why the distinction matters for justification.","week":7,"idea":"Ends of terrorism. Ultimate ends: self-determination, revolution, regime change, shifting the balance of power between groups. Proximate goals: publicise the cause, force concessions, raise the cost of occupation, demonstrate power, inspire rebellion, provoke repression/violence, free comrades. The morality of proximate goals depends on the ultimate ends they serve.","type":"debate"},{"q":"Outline the argument that terrorism cannot achieve some of its ultimate ends because of the kind of ends they are. Why might it still be justified?","week":7,"idea":"Means-ends tension. Revolution and national self-determination require mass democracy, but terrorism requires secrecy, isolating and militarising its practitioners; the state is always better at violence and surveillance. Yet terrorism may be necessary (if not sufficient) and may achieve proximate goals.","type":"argue"},{"q":"How do deontologists and consequentialists differ in their verdicts on terrorism?","week":7,"idea":"The nature of terrorist means. Deontologically, deliberately targeting non-combatants treats undeserving people as mere means, so terrorism is impermissible. Consequentialists assess it like any act of war: a prima facie case against, but justified if the alternative consequences would be worse and the stakes are high enough.","type":"debate"},{"q":"Reflective exercise 7.8: Imagine the only way to win a war fought in a just cause was to deliberately target enemy cities. Could this ever be justified?","week":7,"idea":"Bridges terrorism and war / supreme-emergency-style reasoning. Directly raises whether deliberately targeting non-combatants for a just end can be justified, the same structure as the obliteration-bombing cases.","type":"probe"},{"q":"Is terrorism always worse than conventional war? Lay out the case that war and terrorism are not so different.","week":7,"idea":"The third big question: terrorism vs ordinary war. Wars are won by breaking enemy morale (coercion to surrender); many combatants are 'innocent' conscripts; obliteration bombing and nuclear deterrence look like terrorism, so terrorism may not be distinctively worse.","type":"argue"},{"q":"Explain how Allied 'terror'/obliteration bombing (Dresden, Hamburg, Hiroshima, Nagasaki) and Cold War counterstrike nuclear deterrence appear to fit the definition of terrorism.","week":7,"idea":"'Our' governments defending terrorism. Firebombing and the atomic bombings deliberately targeted civilians to break morale and force surrender; nuclear deterrence threatens enemy cities to coerce leaders, both fitting 'threats/acts of violence targeting non-combatants to achieve political goals through coercion and intimidation'.","type":"case"},{"q":"How does just war theory distinguish terrorism from legitimate warfare, and on what does that distinction crucially depend?","week":7,"idea":"Terrorism and the just war tradition. Jus in bello forbids deliberate attacks on non-combatants; terrorists violate it while attacks on combatants (even conscripts) are permitted. The condemnation rests on non-combatant immunity and the independence of jus ad bellum from jus in bello, so terrorists in a just cause have no more right to attack civilians than those in an unjust one.","type":"debate"},{"q":"Sparrow says it is hard to find a definition of terrorism that doesn't include the behaviour of our own governments, and that our answer to the terrorism-and-war question shapes our answers to the other two. Why, and what is the upshot for anyone who wants to condemn terrorism?","week":7,"idea":"Meta-structure of the three big questions. The definition, the justification, and the terrorism-war relation are interdependent; condemning terrorism ultimately requires defending Just War Theory and the moral weight of the combatant/non-combatant distinction.","type":"meta"},{"q":"What does it mean to say a weapon is 'mala in se' (an evil in itself)? Define the concept and explain how the jus in bello prohibition on evil means differs from the principles of distinction and proportionality.","week":8,"idea":"Mala in se / evil means as a distinct jus in bello category: not just WHO we kill (distinction) or HOW MANY (proportionality) but HOW we kill those we kill.","type":"define"},{"q":"Distinguish the responses to the ethics of means given by the pacifist, the advocate of 'total war', the political realist, and 'the rest of us'. Why does the question of evil means only really arise for the last group?","week":8,"idea":"Positioning the evil-means debate: for pacifists all war is wrong so the question doesn't arise; for total-war/realist nothing is off-limits if it helps win; only those who think some means are prohibited even in a just cause need an account of evil means.","type":"define"},{"q":"Sparrow lists three 'big picture' questions framing the whole topic. What are they, and how does each one threaten the very idea of a prohibition on evil means?","week":8,"idea":"The three framing questions: (1) does the WAY of killing matter once killing is justified? (2) can a weapon be 'inherently' evil rather than just badly used? (3) can any ethical principle be absolute? Different positions flow from different answers.","type":"debate"},{"q":"Walk me through the 'inherently indiscriminate' account of what makes a weapon evil. Why does Sparrow think it is, first, redundant, and second, implausible for most prohibited weapons?","week":8,"idea":"First candidate account (inherently indiscriminate): it collapses into distinction/proportionality (redundancy), and fails because poisoned weapons, serrated bayonets, dum-dum bullets, blinding lasers are no more indiscriminate than legal weapons.","type":"argue"},{"q":"Sparrow argues that whether a weapon can satisfy distinction and proportionality often depends on circumstances rather than the weapon's nature. Apply this: how could low-yield nuclear weapons, chemical weapons, or landmines be used discriminately? (Consider the US minefields in South Korea.)","week":8,"idea":"Against 'inherently indiscriminate': circumstance, not character, often determines discriminate use — low-yield nukes/chemicals far from civilians, fenced-and-mapped landmines (South Korea) — so these weapons are at most harder to use lawfully, not inherently indiscriminate.","type":"apply"},{"q":"Explain the 'unnecessary suffering' account of evil means. Why does it succeed where the 'indiscriminate' account fails, especially for weapons like mustard gas, serrated bayonets, and dum-dum bullets?","week":8,"idea":"Second candidate account (unnecessary suffering): locates the wrong in HOW the weapon kills, not whom — explains weapons that can be aimed at combatants yet are still evil (mustard gas, serrated bayonets, dum-dum bullets designed to cause horrible wounds); makes evil inherent to the weapon.","type":"define"},{"q":"The hard problem for the 'unnecessary suffering' account is defining what makes suffering UNnecessary, since legal weapons also cause hideous deaths. Run through the candidate tests Sparrow canvasses — beyond hors de combat, beyond military necessity, disproportionate to military advantage — and the objection to each.","week":8,"idea":"The 'unnecessary' problem: 'beyond hors de combat' risks banning all lethal weapons; 'beyond military necessity' is context-dependent (blinding lasers vs temporary blinding); 'disproportionate to military advantage' (undetectable fragments) reintroduces a proportionality calculation that lapses back into consequentialism.","type":"argue"},{"q":"Sparrow notes that exacerbating suffering can itself confer a military advantage. Give his examples (wounding rather than killing; inducing terror) and explain why this undermines the 'unnecessary suffering' test.","week":8,"idea":"Why 'unnecessary suffering' falters: wounding ties up more enemy combatants than killing, and terror/panic yield military advantage — so weapons that worsen suffering can be militarily useful, and the proportionality fix collapses into consequentialism.","type":"apply"},{"q":"Explain the 'shock the conscience of mankind' account, and trace how it actually operates historically through the dum-dum bullet, poison-gas, and landmine/cluster-munition bans. What is the 'yuck factor' objection, and what does Sparrow say in partial defence of the reaction?","week":8,"idea":"Third candidate account (shock the conscience / public opprobrium): bans follow conflicts that horrify the world (dum-dum after British India wars; 1925 gas Convention after WWI trenches; landmine/cluster bans decades after Indochina). Objection: unprincipled 'yuck factor' — shock is fickle. Yet dispassionate pontificating about drowning in one's own lung fluid isn't obviously wisdom either.","type":"case"},{"q":"Reconstruct Nagel's argument that some weapons fail to respect the humanity of the enemy. How does it use the Kantian notion of treating persons as 'ends in themselves', and how can trying to KILL the enemy actually be an expression of respect?","week":8,"idea":"Nagel's respect-based, absolutist account: drawing on Kant (persons as ends, never mere objects), killing can express respect by taking the enemy's hostile aims seriously — but some weapons attack the enemy AS A PERSON, not just as an enemy, which is incompatible with respect.","type":"define"},{"q":"Apply Nagel's 'respect for humanity' test to the LOAC rule against booby-trapping food and drink. Why is attacking someone via the need to eat or drink different from killing them by other means?","week":8,"idea":"Nagel applied: booby-trapping food/drink attacks a basic human need that belongs to the enemy regardless of their choice to fight — so it attacks their humanity, not merely their combatant status; this is the case where Nagel's strategy looks most plausible.","type":"apply"},{"q":"What is Sparrow's central worry that Nagel is 'cooking the books'? In what sense might our prior intuitions about particular weapons be doing the real work in his account?","week":8,"idea":"Critique of Nagel: the respect framework is promising in general but the detailed verdicts on which weapons fail to respect humanity seem driven by pre-existing intuitions about those weapons rather than derived from the principle — so the principle isn't really doing the explanatory work.","type":"meta"},{"q":"Why does Sparrow insist that ANY account of evil means resting on consequentialist considerations is bound to fail as a basis for a COMPLETE prohibition? What is the deep tension between absolutism and consequentialism running through the whole topic?","week":8,"idea":"The absolutism-vs-consequentialism axis: a complete prohibition needs the weapon to be evil in itself (a feature of the weapon, absolute), because any consequentialist case lapses whenever the consequences of NOT using it are grave enough — hence the demand for a non-consequentialist ground.","type":"debate"},{"q":"[Reflective exercise 8.1] Is there anything so horrible to do to someone that you could not be justified in doing it in order to help win a war fought in a just cause? If so, what — make a list. If not, why not?","week":8,"idea":"Probing the intuition that some means are absolutely prohibited even in a just cause — testing whether the candidate's verdicts point toward absolutism or collapse into total-war/consequentialist thinking.","type":"probe"},{"q":"[Reflective exercise 8.2] Can you think of circumstances in which nerve gas could be used to target enemy combatants and not kill too many non-combatants? What about landmines?","week":8,"idea":"Testing the 'inherently indiscriminate' account against intuition: if discriminate uses are imaginable (nerve gas / landmines in isolated settings), then indiscriminateness can't be what makes them evil in themselves.","type":"probe"},{"q":"[Reflective exercise 8.3] Imagine you work in a weapons laboratory and your boss instructs you to modify a munition so it produces wounds that are more hideous and distressing, so that the weapon will terrify the enemy. Would you do it? Defend your answer.","week":8,"idea":"Designing a deliberately hideous weapon — probing the 'unnecessary suffering' intuition and the awkward fact that terror/horrific wounds can carry a genuine military advantage, forcing the candidate to locate the moral line.","type":"probe"},{"q":"[Reflective exercise 8.4] Can you imagine a situation where killing someone who is healthy and wants to live is an expression of respect for them? Could taking someone's views seriously require killing them? Could NOT killing someone ever express contempt for them?","week":8,"idea":"Pressure-testing Nagel's Kantian claim that killing can express respect — and its converse — to see whether 'respect' can really bear the weight of distinguishing acceptable from evil means.","type":"probe"},{"q":"Open Churchill's 1919 memo: he calls squeamishness about gas 'sheer affectation' and equates lacerating a man with shell fragments to making his eyes water with lachrymatory gas. Which account(s) of evil means is Churchill implicitly attacking, and how would each respondent reply?","week":8,"idea":"Connecting to a real text/event (Churchill's gas memo): a challenge to the very coherence of singling out particular weapons — does the 'unnecessary suffering' / 'respect' / 'shock' account survive the charge that legal weapons (shell fragments) are just as horrible?","type":"case"},{"q":"Why does Sparrow caution us to read Dinstein for the LAW (LOAC) but not treat law as settling the ETHICS? Give the list of weapons currently prohibited under LOAC and say whether legal status tracks moral evil.","week":8,"idea":"Law vs ethics distinction and the empirical list of mala in se candidates (rape, poisoned weapons, serrated bayonets, dum-dum bullets, certain booby traps, antipersonnel mines, undisarming naval mines, incendiaries in civilian areas, permanently blinding lasers, cluster munitions, chemical, biological) — Dinstein gives the LOAC, but the law could be wrong and is contested.","type":"define"},{"q":"Discuss the two contemporary campaigns Sparrow flags — the 2017 Treaty on the Prohibition of Nuclear Weapons (TPNW) and the 'stop killer robots' / autonomous weapons campaign. Why do supporters call these weapons evil means, why do major military powers resist, and what does the Melbourne/ICAN origin of the nuclear campaign illustrate?","week":8,"idea":"Live application of the evil-means framework to nuclear weapons (TPNW, in force 2021, no nuclear states signed, ICAN's Melbourne origins) and autonomous weapons systems — a 'better sense of what makes a weapon an evil means' is what would let us evaluate these contested bans.","type":"case"},{"q":"Sparrow's overall conclusion is that the intuition behind 'evil means' is compelling yet remarkably hard to cash out. This tempts us to treat the prohibitions as mere CONVENTIONS. Why does he resist the conventionalist reading, and what two costs does treating jus in bello as conventional incur?","week":8,"idea":"The 'problem of evil means' and the anti-conventionalism conclusion: the category resists a principled account, but jus in bello prohibitions are NOT meant to be conventional — they must bind even against an enemy who flouts them, and if seen as merely conventional they won't survive the pressure of military necessity.","type":"meta"},{"q":"Step back: across the four candidate accounts (indiscriminate, unnecessary suffering, shock the conscience, failure of respect), is there ANY single underlying principle that explains why exactly these weapons are prohibited and others are not? Argue for the strongest account and say what it still can't explain.","week":8,"idea":"Synthesis / meta-evaluation: each of the four accounts captures some cases but none captures all (the search for a unifying principle), and Sparrow's worry that we may be left with intuition-tracking rather than a principled ground for the whole class.","type":"debate"},{"q":"What does it mean to say a weapon is 'mala in se' (an evil in itself)? Distinguish this from a weapon that is merely used wrongly on a particular occasion.","week":9,"idea":"Mala in se: weapons evil in themselves vs. wrongful use","type":"define"},{"q":"Distinguish 'tactical' (battlefield) from 'strategic' nuclear weapons, and explain why this distinction matters for the ethics of use. What is a 'limited nuclear war'?","week":9,"idea":"Tactical vs strategic weapons; limited nuclear war and escalation","type":"define"},{"q":"Distinguish a 'first strike' from a 'second strike' (counterstrike), and explain why the notes claim a second strike is the harder of the two to justify morally.","week":9,"idea":"First strike vs second strike; second strike has no deterrent value once war has begun","type":"define"},{"q":"Are nuclear weapons mala in se? Make the case that they are AND the case that they are not, drawing on the notes' point that burn/blast deaths are no worse than those from conventional, incendiary, or thermobaric weapons, and that it isn't obviously worse to kill many with one bomb than the same number with many.","week":9,"idea":"Are nuclear weapons mala in se — both sides of the debate","type":"argue"},{"q":"REFLECTIVE EXERCISE 9.2 (verbatim): 'Is it worse to cause someone to die of radiation poisoning than to cause them to die of blood poisoning subsequent to being injured by shrapnel?' What is your intuition, and what does your answer imply about whether nuclear weapons are uniquely evil?","week":9,"idea":"Radiation vs shrapnel intuition pump — is the mode of death what makes nukes special","type":"probe"},{"q":"REFLECTIVE EXERCISE 9.1 (verbatim): 'Can you think of circumstances in which it would be possible to use a nuclear weapon to target enemy combatants and not kill too many non-combatants?' Walk through such a scenario and say what it shows about the principle of distinction applied to nuclear weapons.","week":9,"idea":"Distinction applied to nukes — isolated military targets (fleets, submarines, remote installations); the neutron bomb","type":"probe"},{"q":"Can nuclear weapons be used in accordance with the jus in bello principles of distinction and proportionality? Where does the notes' argument concede this is at least possible, and where does it become 'more debatable'?","week":9,"idea":"Distinction vs proportionality for nuclear use; radioactive fallout complicates proportionality","type":"apply"},{"q":"Apply just war theory to Hiroshima and Nagasaki: did the bombings violate distinction, proportionality, or both? Why does the note say that if you think they were justified you 'need to rethink any commitment you have to jus in bello'?","week":9,"idea":"Hiroshima/Nagasaki as jus in bello violations; consequentialist justification abandons just war theory","type":"apply"},{"q":"REFLECTIVE EXERCISE 9.6 (verbatim): 'Were the atomic bombings of Nagasaki and Hiroshima acts of (state) terrorism? If so, why? If not, why not?' Use the notes' definition: deliberate attacks on civilians to coerce a third party in pursuit of political goals.","week":9,"idea":"Hiroshima/Nagasaki as state terrorism; the nuclear-ethics/terrorism-ethics link","type":"apply"},{"q":"REFLECTIVE EXERCISE 9.7 (verbatim): 'Can it be ethical to threaten to do something that it would be unethical to do?' Apply this directly to nuclear deterrence — threatening to kill hundreds of millions of civilians in retaliation.","week":9,"idea":"The threaten-vs-do problem at the heart of deterrence; threats of immorality might be moral","type":"probe"},{"q":"REFLECTIVE EXERCISE 9.5 (verbatim): 'Imagine that you are very scared that the people living next door will kill you. However you know they love their children. Would it be ethical to hire a contract killer to kill their children should anything untoward happen to you (and tell your neighbours that you had done so)?' Explain how this analogy maps onto nuclear deterrence and whether the analogy is fair.","week":9,"idea":"Contract-killer analogy for deterrence — threatening innocents to coerce; deterrence resembles terrorism","type":"probe"},{"q":"Lay out the deterrence paradox in full using the notes' three questions: (1) can it be ethical to threaten what it is unethical to do; (2) can a threat be credible if you have no intention of carrying it out; (3) can one intend to do something one knows one would not (and should not) do?","week":9,"idea":"The deterrence paradox — credible threat requires intending an act one should not perform","type":"debate"},{"q":"If a second strike has no deterrent value (the war has already happened) and can only hit cities, morality says refrain from retaliating. But if there is no real threat of a second strike, what deters a first strike? How do nuclear states try to escape this bind — and why is 'binding oneself' (e.g. automated launch) dangerous?","week":9,"idea":"Self-binding / automated launch to preserve credibility; the rationality-of-irrationality problem","type":"debate"},{"q":"Can the THREAT to use nuclear weapons be moral even if the ACT would not be? Argue both sides, using the two scenarios where the notes say a moral case can be made: deterring conventional attack, and Mutually Assured Destruction.","week":9,"idea":"Threat vs act morality; deterrence of conventional war and MAD as the two pro-threat cases","type":"argue"},{"q":"Explain Mutually Assured Destruction and why the notes say only MAD, requiring rough nuclear parity, is 'safe' while any victory or perceived victory in a nuclear arms race is dangerous. Why are missile defence systems destabilising under this logic?","week":9,"idea":"MAD requires parity; missile defence destabilises by threatening the second-strike capacity","type":"apply"},{"q":"Does deterrence actually work? Set out Ward Wilson's-style skeptical case as the notes present it: we can't know what would have happened without nukes, we may have just been lucky given the close calls, nukes didn't stop proxy wars, and they don't deter the US's Middle East enemies. Then give the defenders' reply.","week":9,"idea":"Have nuclear weapons kept the peace — the empirical case for/against deterrence (Ward Wilson)","type":"debate"},{"q":"Connect to a real event: pick one of the Cold War close calls (the Soviet officer refusing to launch torpedoes in the Cuban Missile Crisis, the 1979 computer-simulation scare, 'Able Archer' 1983, the 1983 satellite false alarm). What does it show about 'launch on warning' and the claim that we were merely lucky to avoid nuclear war?","week":9,"idea":"Cold War close calls; launch-on-warning and false alarms as evidence against the 'deterrence kept the peace' thesis","type":"case"},{"q":"Evaluate the 'reputable vs rogue states' distinction. Is it plausible that some states can be 'trusted' with nuclear weapons and others can't? How do the realist claim that all states share the same motivational structure and the North Korea/US invasion comparison bear on this?","week":9,"idea":"Reputable vs rogue states; realism, double standards, and the right to a deterrent (Iran/Israel)","type":"debate"},{"q":"How does the nuclear case expose both the appeal of, and the tensions within, realism? Why does it seem against any state's interest for nuclear war to be possible, yet also irrational for any state to give up its weapons?","week":9,"idea":"Realism's nuclear tension — national interest both forbids and demands nuclear arsenals","type":"debate"},{"q":"Walk through the 'logic of rational action' the notes describe (rational to have nukes, rational to threaten to use them, rational to maintain the intent to use them) and explain how, combined with the threat of nuclear winter, this logic seems to point toward human extinction. Where, if anywhere, would you break the chain?","week":9,"idea":"The rational chain toward extinction; nuclear winter and the collapse of deterrence logic","type":"debate"},{"q":"What ethical issues arise from TESTING and POSSESSION alone, before any use? Address indigenous/colonial testing grounds (Maralinga, Marshall Islands, Kazakhstan, Algeria/Pacific), human radiation experiments, opportunity cost, nuclear waste, proliferation to non-state actors, and the tension with democratic free speech and surveillance.","week":9,"idea":"Ethics of testing and possession — colonial harm, opportunity cost, proliferation, democracy","type":"apply"},{"q":"Connect to a real event: the 2017 Treaty on the Prohibition of Nuclear Weapons (and ICAN's Melbourne-founded, Nobel-winning campaign). Why does it matter that no nuclear-armed state supported it, and what does Australia's opposition reveal about the realist logic of disarmament?","week":9,"idea":"TPNW and ICAN; disarmament is possible (South Africa, post-Soviet states) but resisted by nuclear powers","type":"case"},{"q":"Meta: across the whole topic, does the nuclear case strengthen pacifism, vindicate realism, or break just war theory? What is the single deepest tension the week leaves unresolved, and how would you adjudicate it?","week":9,"idea":"Meta-synthesis — nuclear weapons as pressure test for pacifism, realism, and jus in bello","type":"meta"},{"q":"How does Sparrow define a 'targeted killing'? What makes it different from an ordinary military strike against key enemy personnel?","week":10,"idea":"Defining feature of targeted killing: lethal force used across international borders, outside a declared zone of armed conflict, against those deemed a threat to national interests","type":"define"},{"q":"Sparrow says 'targeted killing is a policy rather than a weapon.' What does he mean, and why does that imply that banning armed drones would not eliminate targeted killing?","week":10,"idea":"Targeted killing is a policy that can be carried out by Special Forces, death squads, snipers, cruise missiles, smart bombs or drones; the drone debate and the targeted-killing debate overlap but are not identical","type":"define"},{"q":"What is a 'signature strike' (an attack on the basis of a 'suspicious pattern of activity')? Why does Sparrow say it 'looks like a pretty low standard for killing someone'?","week":10,"idea":"Signature strikes: killing unknown persons whose actual identity is unknown, identified via surveillance, signals intelligence and social network analysis as showing a suspicious pattern of activity","type":"define"},{"q":"Sparrow lists several features that make US/Israeli targeted-killing campaigns controversial within just war theory. What are they? (Outside declared conflict; non-state actors; signature strikes; perpetual war.)","week":10,"idea":"Key controversial features: targeting outside declared conflict, targeting non-state actors not in uniform, signature strikes on unknown persons, and the threat of a perpetual war with no victory condition","type":"debate"},{"q":"Why does Sparrow think 'perpetual war' is a special problem for just war theory in the context of targeted killing?","week":10,"idea":"Perpetual war has no victory condition, which makes it impossible to evaluate reasonable chance of success or whether victory is worth the cost","type":"debate"},{"q":"REFLECTIVE EXERCISE (verbatim): 'Imagine that you are enjoying lunch at the new Monash University marketplace when the table next to you explodes. You wake up in hospital missing both your legs. You learn that the table next to you was struck by a Chinese missile launched from a Chinese remotely piloted aircraft, which was targeted at a Muslim student that the Chinese government alleged was a terrorist. How would you feel?'","week":10,"idea":"Intuition pump (the café/cruise-missile case): reversing the roles to test whether we'd accept another state conducting targeted killing on our soil, exposing the violation of sovereignty and risk to bystanders","type":"probe"},{"q":"REFLECTIVE EXERCISE (verbatim): 'Imagine that, because it was politically implausible for the Australian government to arrest the student, the Australian government had given the Chinese government permission to carry out the drone strike. How would you feel?'","week":10,"idea":"Intuition pump on consent/sovereignty: when the host government permits a strike there is no violation of sovereignty and it may not be an act of war — but does permission make it acceptable?","type":"probe"},{"q":"The notes raise the body-armour/fairness intuition: drones let the US and Israel kill enemies 'without any risk to themselves' and 'have made war risk-free for those who operate them.' Is there something deeply unfair about riskless, asymmetric killing? Make the case both for and against.","week":10,"idea":"The asymmetry/riskless-war objection vs Sparrow's reply that war isn't supposed to be fair, chivalry has vanished, and commanders are arguably obligated to seek technological asymmetry to protect their troops","type":"argue"},{"q":"Why does Sparrow regard the 'fairness' objection to riskless drone warfare as a weak argument? Do you agree?","week":10,"idea":"Weak arguments against drones: war isn't meant to be fair, the fairness intuition rests on obsolete chivalry, and seeking asymmetry/overwhelming force is appropriate and arguably obligatory","type":"debate"},{"q":"Critics charge drones with creating 'videogame warfare' — that distance makes killing too easy. How does Sparrow respond to this psychological version of the 'too easy to kill' argument?","week":10,"idea":"The 'too easy to kill' objection (psychological level) vs Sparrow's reply: operators watch their victims die so may be more reluctant; the objection would also condemn artillery/cruise missiles/bombing; proximity is no panacea (machetes)","type":"argue"},{"q":"Sparrow thinks the political version of the 'drones make killing too easy' argument 'may have more force' than the psychological version. What is the political version, and why is he still cautious about it?","week":10,"idea":"Political 'too easy' argument: no body bags lowers the domestic-political cost of going to war, tempting governments to 'do something' — but the same objection hits any casualty-reducing weapon, which militaries are right to want","type":"argue"},{"q":"Sparrow distinguishes three questions about targeted killings — legal, effective, ethical. Which is the course concerned with, and why does effectiveness still matter to the ethics?","week":10,"idea":"Legal vs effective vs ethical; effectiveness is relevant because if targeted killing doesn't work it is unlikely to be ethical, even though working wouldn't automatically make it ethical","type":"debate"},{"q":"How many civilians do drone strikes kill, and why is even this basic factual question so contested? (Consider the US definition of 'militant', the REPRIEVE 'You Never Die Twice' findings, and Larry Lewis's Afghanistan finding.)","week":10,"idea":"Contested civilian-casualty facts: the US counts most military-age males as militants; REPRIEVE found ~1,147 killed trying to kill 41 men; Lewis found drone strikes caused 10x more civilian casualties than manned aircraft in Afghanistan","type":"case"},{"q":"Sparrow says whether drones 'seem precise or not' depends entirely on the comparison class. Explain. (More civilians than not striking at all; far fewer than area bombardment/cruise missiles.)","week":10,"idea":"Precision is comparative: drones kill more civilians than launching no attack but far fewer than area bombardment or cruise missiles; Lewis's finding is explained by drones striking targets no one would hit with a manned aircraft","type":"debate"},{"q":"Lay out the Byman vs Boyle debate as the notes frame it: do drones win local hearts and minds or fuel blowback? Argue both sides.","week":10,"idea":"Byman (Brookings) — drones are better than the brutal alternatives and locals prefer them; Boyle/critics — civilian casualties are a recruiting tool and persistent drones are psychological warfare ('Living Under Drones')","type":"argue"},{"q":"How would you assess targeted-killing-by-drone through the jus ad bellum criterion of JUST CAUSE? Why did the case look strongest just after 9/11 and weaker over time?","week":10,"idea":"Jus ad bellum just cause: plausible as self-defence right after 9/11 but as the target list expands it looks like (forbidden) preventative war rather than (more respectable) pre-emptive war; the watch-and-wait time suggests no imminent danger","type":"apply"},{"q":"Why might a policy of drone strikes fail the jus ad bellum criterion of LAST RESORT? Walk through the alternatives Sparrow identifies (arrest by the host state, interception on arrival, changing US foreign policy).","week":10,"idea":"Last resort: drones may displace less-lethal options — asking the host government to arrest suspects, intercepting plotters when they travel, or removing grievances by altering foreign policy (cf. the US claim about Russia in Syria)","type":"debate"},{"q":"How do drone strikes fare on the jus in bello requirements of distinction and proportionality? What's the central problem with treating targets as 'combatants'?","week":10,"idea":"Jus in bello: strikes could satisfy distinction/proportionality IF targets are combatants, but members of 'terrorist' groups wear no uniform, lack command structure, and some are religious leaders/propagandists — not 'direct participation in hostilities'; a dangerous precedent to let a government just declare civilians unprotected","type":"debate"},{"q":"What is 'jus ad vim' (justice in the use of force short of war), and why is Sparrow sceptical that it rescues targeted killing?","week":10,"idea":"Jus ad vim (Brunstetter & Braun): a proposed third category between war and policing, since the US stops short of invasion and the target states don't retaliate; Sparrow's scepticism rests on the sovereignty violation and the US would treat a Yemeni strike on its soil as an act of war","type":"debate"},{"q":"Outline the 'Global War on Terror' justification for targeted killing and the three problems Sparrow raises against it (human-rights violation outside war; stricter police-style distinction/proportionality; dangerous precedent).","week":10,"idea":"GWOT justification vs three objections: (1) outside war, executing people without trial violates human rights and lacks legal basis; (2) outside war the policing standard is stricter (immediate threat to life, no 'acceptable' innocent deaths); (3) it sets a precedent inviting widespread rights violations and future wars","type":"debate"},{"q":"The Obama administration claimed a 'semi-judicial' process for deciding who could be killed. Why does Sparrow say this falls 'well short' of a real trial?","week":10,"idea":"If not at war, targeted killing is extrajudicial execution; Obama's process was secret and gave the condemned no opportunity to argue they should not be killed — far below the standard for a capital case","type":"apply"},{"q":"Sparrow notes the framework choice is forced: if the US is NOT at war, what does a targeted killing become? Why does whether one is 'at war' do so much moral work here?","week":10,"idea":"The framework fork: at war -> JWT applies; not at war -> extrajudicial execution / human-rights violation, with stricter policing standards; this is why Israel's expansive 'at war' framing and the US 'GWOT' framing matter so much","type":"debate"},{"q":"Apply Sparrow's definition to the US drone strikes on boats from Venezuela (Trump administration). Are these targeted killings or acts of war, and why does the 'narcoterrorist war' claim collapse the distinction?","week":10,"idea":"Applying the definition: if the US really is 'at war' with narcoterrorists the strikes aren't targeted killings, but because that war claim is 'radically implausible' the strikes should count as targeted killings and extrajudicial executions","type":"apply"},{"q":"Why is it significant that most US drone strikes occurred in Pakistan, a country the US 'isn't and wasn't at war with'? What does the role of Pakistani 'permission' add?","week":10,"idea":"Targeting outside declared conflict and the sovereignty question: Pakistani permission may not have been politically refusable, and Yemen/Libya/Somalia strikes occurred without permission or where there was no effective sovereignty","type":"apply"},{"q":"Sparrow's 'observation in passing': armed drones have almost exclusively killed people in North Africa, Central Asia and the Middle East, and almost none of the targeted have been 'white.' What moral question does he want us to sit with?","week":10,"idea":"The race observation: would the US public have tolerated their government killing as many white Europeans as people of colour? — raising whose lives are treated as expendable in targeted-killing policy","type":"probe"},{"q":"Connect the notes to the 2021 Kabul drone strike (or another real strike that killed civilians). How does that event illustrate the gap between the US 'weapons of unprecedented accuracy' claim and reality?","week":10,"idea":"Real-event connection: the contested civilian-casualty record — US precision claims vs documented mistaken strikes — showing that even 'precise' drones kill innocents and that the relevant comparison drives the judgement","type":"case"},{"q":"Does the fact that long-range drones don't risk the operator's life or capture make targeted killing MORE attractive to governments, and is that a reason to be suspicious of it? Argue both ways.","week":10,"idea":"Asymmetry's political pull: loiter capacity plus zero risk to friendly pilots/troops makes 'kill every enemy' attractive and lowers political risk — which is precisely what makes it tempting and arguably too easy to resort to","type":"argue"},{"q":"Is targeted killing an effective tool of foreign policy? Weigh the long list of countries struck (Pakistan, Yemen, Somalia, Libya, Gaza, etc.) against the claim that the campaign 'degraded' Al Qaeda's international capabilities.","week":10,"idea":"Effectiveness debate: the strike list is 'not a list of foreign policy success stories' and none of these states are more stable/friendly, but the relevant comparison (ground troops?) is unclear and Al Qaeda's capabilities were arguably degraded","type":"argue"},{"q":"Why does Sparrow think jus ad bellum has 'little to say' about the choice of drones specifically, and where does the weapon choice nonetheless become relevant?","week":10,"idea":"Jus ad bellum is about the decision to go to war, not how it's fought, so the weapon is largely irrelevant — except where fighting entirely with one weapon (drones) bears on proportionality and reasonable chance of success","type":"meta"},{"q":"Stepping back: does just war theory even fit conflicts between states and non-state actors across borders, or do targeted killings show JWT has run out? What would replace it?","week":10,"idea":"Meta question on JWT's adequacy: drone strikes on non-state actors outside declared conflict strain JWT, prompting alternatives (jus ad vim, policing/human-rights frameworks) and the deeper question of the moral significance of sovereignty","type":"meta"},{"q":"Sparrow ends by noting current targeted-killing drones would likely fail in a shooting war between advanced militaries, pointing toward autonomous weapon systems. Why does the targeted-killing debate set up next week's topic?","week":10,"idea":"Bridge to autonomous weapons: states' appetite for remote, risk-free killing has driven the technology toward autonomy, where a new set of ethical questions arises","type":"meta"},{"q":"What is an autonomous weapon system? Give the US DoD Directive 3000.09 definition and explain what each part of it commits you to ('once activated, can select and engage targets without further intervention by a human operator').","week":11,"idea":"Defining AWS (DoD 3000.09 'deflationary' definition); the activation and target-instruction caveats baked into it","type":"define"},{"q":"Sparrow says the definition of 'autonomous weapon' is highly contested and that debates 'turn on what participants mean by autonomy.' Distinguish the two competing 'poles': the critics' human-modelled (causal/moral agency) definition versus the defenders' 'deflationary' ('fire-and-forget') definition. What is at stake politically in choosing one over the other?","week":11,"idea":"Two poles of autonomy; the rhetorical move whereby 'radically new' vs 'incremental' framing is deployed to either ban or normalise the technology","type":"define"},{"q":"Sparrow sets a challenge: can you offer a definition of an AWS such that it is BOTH plausible humans could build it in the next couple of decades AND that it raises distinctive ethical issues? Why does he think this twin requirement matters, and what happens to the debate if no such definition exists?","week":11,"idea":"The definitional dilemma at the heart of the AWS debate; risk that the debate collapses into a rerun of cruise-missile/remote-warfare worries","type":"debate"},{"q":"Distinguish teleoperated (remotely piloted) weapons from autonomous weapons, and explain the military case for why advanced militaries are predicted to be 'forced' into an arms race towards autonomy. What are the three drivers Sparrow gives (communications vulnerability, tempo of battle/human nervous system, cost/operator factors)?","week":11,"idea":"The military case for autonomy; the predicted 'arms race' and why turning away may be hard","type":"define"},{"q":"What is the 'responsibility gap'? Lay out the three candidate locations for responsibility (commanding officer, programmer, the machine 'itself') and explain why S
