ctim's moral status.","Plus the proportionality doubt: 'fewer civilians' assumes the machine can weigh military advantage against civilian harm — but that's judgement, not recognition, and I don't think code can do it.","And the threshold worry: even if each strike is cleaner, making war cheaper to wage likely means MORE war overall, so the civilian-saving math may not hold at the strategic level.","Closing line: the pro-case wins the spreadsheet but loses the argument — accuracy can't supply accountability or respect, and those are what make killing in war bearable at all."]}]},{"group":"Q2","topic":"Foundations: relativism, realism, pacifism, just war theory","questions":[{"question":"This is an ethics unit, but someone might say morality is just relative — different cultures, different rules, who are we to judge? Why does the unit reject ethical relativism, and do you agree?","points":["My stance: I think the unit is right to set relativism aside — if we took it seriously we couldn't even get the ethics of war off the ground, so we have to assume some moral answers are genuinely better than others.","The main reason in plain words: if morality were just opinion, then saying 'a massacre is wrong' would only mean 'I personally dislike massacres' — but that's clearly too weak; we want to say it's actually wrong, full stop.","The other side: the relativist has a fair point that cultures really do disagree, and there's a worry about arrogantly imposing our values on others.","My reply: disagreement about morality doesn't prove there's no right answer — people disagree about facts too, and that doesn't make facts relative; we can still reason and argue toward better answers.","Concrete case: war crimes like Bucha in Ukraine or My Lai — we don't want to say those are just 'wrong-for-us'; we want to say they're wrong period, and relativism can't give us that.","Term/thinker to drop: the unit's 'anti-relativism ground rule' — and the descriptive-versus-normative distinction; relativism confuses how people DO behave with how they OUGHT to.","Closing line: so I'd say relativism is a non-starter for this unit — you can't condemn an atrocity if everything is just opinion, and the whole point of the ethics of war is that some things really are off-limits."]},{"question":"The realist says morality just doesn't apply to war — states do whatever it takes to survive. Is the realist right?","points":["My stance: the realist is partly right as a description of how states behave, but wrong to conclude morality is irrelevant — I'd reject the strong version.","The main reason: realists like Morgenthau argue the world is anarchic, there's no world police, so a state that fights morally while its enemies don't will simply lose — survival comes first.","The other side / why it's tempting: there's something honest about it — leaders DO act on national interest, and pretending otherwise can be naive.","My reply: even realists smuggle morality back in — they say a leader 'ought' to protect their people, which is itself a moral claim; and we clearly DO judge states, e.g. we condemn aggression and war crimes.","Concrete case: we don't just shrug at Russia invading Ukraine or at Bucha and say 'that's just power politics' — we make moral judgements, which shows morality isn't actually irrelevant.","Term/thinker: Morgenthau and Bacevich for realism; and note realism leans on a hard-nosed consequentialism about state survival — Orend is the just-war theorist who rebuts both realism and pacifism.","Closing line: so I'd say the realist describes a real pressure, but 'might makes right' isn't a moral theory — it's a refusal to do ethics, and that's exactly what this unit pushes back on."]},{"question":"People throw the word 'realism' around loosely. Can you explain the difference between descriptive and prescriptive realism, and why it matters?","points":["My stance: this distinction is crucial — descriptive realism can be true while prescriptive realism is false, so collapsing them is the big mistake.","Descriptive realism in plain words: it just says how states ACTUALLY behave — they pursue power and self-interest, morality often takes a back seat. That's an empirical claim, and it's largely accurate.","Prescriptive realism: it goes further and says states OUGHT to ignore morality — that ethics SHOULDN'T constrain them. That's a normative claim, and it's much more controversial.","Why it matters: even if you grant the descriptive bit, the prescriptive bit doesn't follow — 'states do behave selfishly' doesn't prove 'states should behave selfishly'; that's the classic is-ought gap.","The reply to prescriptive realism: it's basically self-defeating, because saying a leader OUGHT to put survival first is itself a moral 'ought' — so you can't escape ethics, you've just picked a thin one.","Term/thinker: Morgenthau's 'twilight of international morality' and Bacevich; tie it to the descriptive-versus-normative point — this unit is normative, so it targets prescriptive realism.","Closing line: so when someone says 'be realistic,' I'd ask which realism — the true-but-harmless descriptive one, or the prescriptive one that actually tries to cancel ethics and doesn't succeed."]},{"question":"What's the strongest version of pacifism you can give — and what's the best objection to it?","points":["My stance: I think the strongest pacifism is the absolute, principled version — that killing human beings is simply always wrong — but ultimately I find the objection to it decisive.","The strongest case in plain words: Tolstoy's line that violence only breeds more violence and that patriotism is the root of war — if every nation renounced force, you'd break the cycle; war is mass killing, and killing is wrong.","Distinguish two flavours to show range: absolute pacifism (killing is wrong in itself, a deontological view) versus contingent pacifism (the costs of war always outweigh the benefits, a consequentialist view).","The best objection — Anscombe: in 'War and Murder' she calls pacifism 'pernicious' because it blurs the line between killing combatants and murdering the innocent — if all killing is equally forbidden, you lose the crucial distinction that protects civilians.","Why the objection bites: if killing an armed aggressor is 'just as bad' as killing a baby, then a soldier who refuses to fire has no special reason to spare non-combatants — pacifism accidentally undermines the rule it should care most about.","Concrete case: a defensive war against an invader, or stopping a genocide — refusing all force can mean allowing a massacre, which looks like a worse moral outcome.","Thinker note used correctly: Anscombe is NOT a pacifist — she's a just-war Catholic who defends the Doctrine of Double Effect; she attacks pacifism precisely to PROTECT non-combatant immunity.","Closing line: so the strongest pacifism is morally serious, but Anscombe shows it proves too much — by forbidding all killing equally, it weakens the very protection of the innocent that should be its whole point."]},{"question":"So if realism and pacifism are both out, what is just war theory — and why is it the unit's main framework?","points":["My stance: just war theory is the sensible middle path — war is neither always fine nor always forbidden; it's sometimes justified, but only if strict conditions are met.","The main idea in plain words: it threads the needle between realism ('anything goes') and pacifism ('nothing goes') by saying war can be morally OK, but it's heavily constrained by rules.","The structure to name: it splits into jus ad bellum — the justice of GOING to war — and jus in bello — justice IN how you fight; and these are independent, so you can fight a just cause unjustly, or vice versa.","The ad bellum criteria to rattle off: just cause, legitimate authority, right intention, proportionality, last resort, and reasonable prospect of success.","The in bello core: discrimination — only target combatants, so non-combatant immunity — plus proportionality and not using methods that are evil in themselves (mala in se).","Why it's philosophically rich: it blends both master theories — deontological limits (never deliberately target the innocent) WITH consequentialist checks (is the good worth the cost, i.e. proportionality).","Concrete case / thinker: Orend defends just war theory against both realism and pacifism; and you can test it on a live case like the US/Israel strikes on Iran — was there just cause, was it last resort, was it proportionate?","Closing line: so I'd say JWT is the unit's backbone because it takes morality seriously WITHOUT being naive — it lets us actually judge a war as just or unjust instead of either excusing everything or condemning everything."]},{"question":"Just war theory tries to sit between realism and pacifism — but is it really a stable middle, or does it just borrow from both and please no one?","points":["My stance: I think it IS a stable and defensible middle — it's not fence-sitting, it's a principled combination, and that's a strength rather than a weakness.","The main reason: it answers the one question both extremes get wrong — realism says morality never applies, pacifism says it always forbids; JWT says morality applies AND can sometimes permit, which matches our actual moral judgements.","The objection from the realist side: they'd say the rules are unrealistic — in a real war, states will break them to survive, so JWT is just nice-sounding theory.","The objection from the pacifist side: they'd say once you permit ANY war, you open the door to endless justified killing — the criteria are too easy to fudge.","My reply: the fact that rules get broken doesn't make them wrong — we still use them to JUDGE and condemn, e.g. the Brereton report into alleged Australian war crimes used in-bello standards; and the criteria are demanding, not a rubber stamp.","Term/thinker: Orend explicitly defends JWT by rebutting both realism and pacifism; and the deontology-plus-consequentialism blend is what lets it borrow the best of each without collapsing into either.","Closing line: so I'd say it's not 'pleasing no one' — it's the only view that lets us say THIS war was just and THAT one wasn't, which is exactly what doing the ethics of war requires."]},{"question":"Suppose a friend says 'all this is just armchair philosophy — in a real war none of these moral rules survive contact with the enemy.' How would you defend the whole project of the ethics of war?","points":["My stance: I'd push back hard — the ethics of war isn't armchair stuff; it's exactly what we reach for when we judge real atrocities, so it's deeply practical.","The main reason: we obviously DO make these judgements — we call some acts war crimes, we prosecute them, we condemn aggression — and you can only do that if there are real moral standards, not just opinions.","The descriptive-versus-normative move: my friend is sliding from 'rules get broken' (descriptive) to 'rules don't matter' (normative) — but laws against theft get broken too, and we don't conclude theft is fine.","The realist objection acknowledged: yes, states under pressure cut corners — that's the grain of truth in Morgenthau's realism — but 'people misbehave' is a reason to HAVE standards, not to abandon them.","Why the standards bite in practice: international law, the Geneva Conventions, and tribunals all encode just-war ideas like distinction and proportionality — so the 'armchair' rules literally shape real prosecutions.","Concrete case: My Lai, Bucha, or the Brereton report — in each one we don't say 'war is war'; we say a line was crossed, which only makes sense if the line is real.","Term/thinker: Orend's rebuttal of realism is the textbook answer here — plus the anti-relativism ground rule, since both relativism and crude realism end up saying 'no real wrongs exist.'","Closing line: so I'd tell my friend the rules surviving 'contact with the enemy' isn't the test — the test is whether we can still call an atrocity an atrocity, and we plainly can, which is the whole point of doing this."]}]},{"group":"Q2","topic":"Starting a war + humanitarian intervention","questions":[{"question":"Is going to war in national self-defence morally the same as an individual defending themselves from attack? (Walzer vs Rodin)","points":["STANCE: I'd say it's NOT as simple as Walzer makes it sound — the analogy between a nation defending itself and a person defending themselves is shakier than it looks, and Rodin is right to press on it.","THE STANDARD VIEW (Walzer's 'legalist paradigm'): a state is like a person — aggression against its sovereignty or territory is like someone attacking you in the street, so the state has a clear right of self-defence, and that's what justifies going to war.","RODIN'S CHALLENGE ('the reductivist problem'): if national self-defence just reduces to a bunch of individuals defending their lives, it can't justify everything we think war can — e.g. fighting to the death over a border or territory when surrender would actually save more lives.","WHY THAT BITES: in personal self-defence you can only use lethal force to stop a lethal threat to a PERSON — but states often fight for things like territory, autonomy, or 'national honour', which aren't individual lives, so the analogy breaks.","REPLY / why self-defence still matters: you can say states are MORE than the sum of individuals — there's a 'common life' or shared political community worth defending, so defending the state isn't just defending bodies; but admit this needs an extra argument Walzer kind of assumes.","TERM/THINKER to drop: Walzer's 'domestic analogy' / 'legalist paradigm'; Rodin's 'reductivist challenge' — and note this is the same revisionist move McMahan makes about combatants.","CLOSING LINE: so I'd land on — self-defence is a real just cause, but Rodin shows we can't just lazily copy the individual case across; the state version needs its own justification."]},{"question":"Walk me through the jus ad bellum criteria — what has to be true for it to be just to GO to war?","points":["STANCE: jus ad bellum is the checklist for whether STARTING a war is justified — and the key point is you need ALL the boxes ticked, not just one, otherwise it's unjust even if your cause is good.","JUST CAUSE: there has to be a genuine wrong to respond to — classically defence against aggression; the textbook hard case is whether protecting foreigners (humanitarian intervention) counts.","LEGITIMATE AUTHORITY + RIGHT INTENTION: it has to be declared by a proper authority (a state, arguably the UN), and you have to actually be fighting FOR the just cause — not using it as a cover for grabbing oil or territory.","PROPORTIONALITY + LAST RESORT: the overall good has to outweigh the harm and destruction (this is Hurka's territory — what goods even count?), and you must have genuinely tried or exhausted peaceful options first.","REASONABLE PROSPECT OF SUCCESS: there's no point starting a war you'll lose — pointlessly spending lives is itself wrong, so a hopeless war fails the test even with a just cause.","WHY IT'S A PACKAGE: I'd stress these work TOGETHER — a war can have a just cause but fail on proportionality or last resort, and then it's still unjust; that's what makes it a real test, not a rubber stamp.","EXAMPLE/THINKER: I'd name-check the 2003 Iraq case for failed last resort / dodgy intention, or Libya 2011 for a war that arguably ticked the boxes going in but went wrong; Hurka as the proportionality guy.","CLOSING: so going to war is presumptively wrong and the criteria are hurdles you have to clear — the burden is on the one starting it."]},{"question":"What is proportionality in jus ad bellum, and why is it so hard to actually apply? (Hurka)","points":["STANCE: proportionality sounds simple — the good of the war has to outweigh the harm — but Hurka shows it's genuinely messy because you have to decide WHICH goods and harms even count, and that's a judgement call.","THE BASIC IDEA: you weigh the good you're trying to achieve (stopping aggression, saving lives) against the destruction, deaths and suffering the war will cause — if the harm is bigger, the war fails even if the cause is just.","WHY IT'S HARD (Hurka's point): which goods go on the scale? Just stopping the aggression, or also things like deterring future aggressors, or 'national honour'? Hurka argues only some goods are 'relevant' and you can't just throw everything in.","ANOTHER DIFFICULTY: you're weighing things that don't share a unit — lives against freedom against future risks — and you're doing it in advance, under huge uncertainty about how the war will actually go.","OBJECTION: a critic says this makes proportionality hopelessly vague — if you can't measure it, it's useless as a criterion.","REPLY: even rough, it still rules out the obvious cases — a massive war over a tiny grievance clearly fails — so it does real work as a constraint even without a precise formula.","TERM/THINKER: Hurka on 'relevant goods'; note proportionality appears in BOTH halves — jus ad bellum (the whole war) and jus in bello (each strike).","CLOSING: so proportionality is less a calculator and more a discipline that forces you to justify the costs honestly."]},{"question":"Does the 'Responsibility to Protect' (R2P) override a state's sovereignty? (Annan vs Coady)","points":["STANCE: I lean towards R2P having real force — sovereignty shouldn't be a shield for mass atrocity — but I take Coady's worries seriously enough that I'd want strict limits.","ANNAN'S CASE: 'sovereignty as responsibility' — a state earns its sovereignty by protecting its own people, so if it's slaughtering them (genocide, ethnic cleansing), it forfeits the right to be left alone, and the international community can step in.","THE CORE TENSION: this pits two values against each other — sovereignty / non-interference (the bedrock of international order) versus universal human rights that don't stop at borders.","COADY'S CRITIQUE: humanitarian war is dangerous — it can be a fig leaf for self-interested intervention, it often makes things worse, and 'we're saving them' is exactly what aggressors always say; good intentions don't guarantee good outcomes.","KRASNER ANGLE: sovereignty is already 'organised hypocrisy' — powerful states break it when it suits them and invoke it when it doesn't — so R2P risks being selectively applied to the weak.","REPLY / why the stance holds: the answer to abuse isn't to abandon R2P but to constrain it with the jus ad bellum criteria — legitimate authority (UN), last resort, reasonable prospect of success — so it can't just be unilateral cover.","EXAMPLE/THINKER: Libya 2011 as the test case — started as R2P, drifted into regime change (Kuperman's reassessment); Rwanda as the case where NOT intervening was the scandal.","CLOSING: so R2P can override sovereignty, but only as a tightly fenced exception, not a general licence."]},{"question":"Was NATO's 2011 intervention in Libya a success or a cautionary tale for humanitarian war?","points":["STANCE: I'd call Libya the cautionary tale that humanitarian-war sceptics point to — it shows how a just-cause intervention can satisfy the criteria going in and still end badly.","THE CASE FOR IT (going in): Gaddafi was threatening a massacre in Benghazi, there was a UN Security Council resolution (legitimate authority), and the stated aim was protecting civilians — textbook R2P.","WHAT WENT WRONG: the mission slid from 'protect civilians' into regime change and toppling Gaddafi, which went beyond the mandate; afterwards Libya collapsed into chaos, civil war and a failed-state vacuum.","KUPERMAN'S REASSESSMENT: he argues the original 'imminent massacre' threat was overstated, and the intervention actually prolonged and worsened the conflict — so even the good-cause premise is questionable.","WHY IT MATTERS FOR R2P: it's exactly Coady's fear realised — the gap between intention and outcome, and 'mission creep' from protection to regime change, which poisoned appetite for later interventions (e.g. Syria).","OBJECTION / the other side: a defender says doing nothing might have meant a Benghazi massacre, and the post-war collapse was a failure of follow-through, not of the decision to intervene.","REPLY: but 'reasonable prospect of success' and proportionality are jus ad bellum criteria — if you can't secure the peace afterwards, that counts against going in; intentions aren't enough.","CLOSING: so Libya is the worked example of why R2P needs the full jus ad bellum discipline, not just a noble motive."]},{"question":"Is sovereignty something we should really respect, or is it just 'organised hypocrisy'? (Krasner)","points":["STANCE: I'd say sovereignty matters as a principle of order, but Krasner's right that in practice it's applied so inconsistently it's partly a convenient fiction.","WHAT SOVEREIGNTY IS: the idea that a state runs its own affairs free from outside force — non-interference is the default rule of the international system and what aggression violates.","KRASNER'S 'ORGANISED HYPOCRISY': powerful states constantly breach others' sovereignty when it suits them and loudly defend it when it doesn't — so the norm is honoured selectively, not consistently.","WHY THIS BITES ON HUMANITARIAN WAR: if sovereignty is selectively enforced, then R2P interventions risk being applied only to weak states the powerful want to act against — never to allies doing similar things.","THE OTHER SIDE: you can defend sovereignty as still valuable even if imperfectly applied — it protects weak states from strong ones and gives smaller nations a seat at the table; hypocrisy doesn't make the rule worthless.","REPLY / balance: so I'd hold both — sovereignty earns respect as protection against aggression (Walzer's reason), but Krasner stops us treating it as sacred when it's shielding atrocities.","THINKER/LINK: tie Krasner to Annan's 'sovereignty as responsibility' — both agree sovereignty is conditional, not absolute, just from different angles.","CLOSING: so respect sovereignty, but with eyes open about who actually gets to break it."]},{"question":"Reflective one: is your nationality something you deserve — and does that change how you think about intervening to protect foreigners?","points":["STANCE: honestly, no — where I was born is pure luck, not something I earned, and once you admit that it gets much harder to say foreigners' suffering matters less than ours.","THE CORE INTUITION: nobody chooses their birthplace; a person born in Australia didn't do anything to deserve safety any more than someone born in a war zone deserved the war — it's a 'moral lottery'.","WHY IT BEARS ON INTERVENTION: if nationality is morally arbitrary, then the basic interests of foreigners — not being massacred — count just as much as ours, which pushes towards taking R2P seriously.","THE OTHER SIDE: but there's a real worry about partiality — we DO have special duties to our own (family, fellow citizens), and a government's first job is its own people, so 'everyone counts equally' can't be the whole story.","REPLY: special duties can coexist with basic universal duties — I can favour my own AND still owe strangers a floor of 'don't let them be slaughtered if I cheaply can'; arbitrariness undercuts indifference, not all partiality.","LINK TO SOVEREIGNTY: this is why Annan's 'sovereignty as responsibility' is appealing — borders are partly arbitrary lines, so they shouldn't be an absolute moral wall against helping people on the other side.","CAUTION (Coady): but caring about foreigners doesn't license reckless war in their name — good intentions plus arbitrary luck still have to clear proportionality and prospect of success.","CLOSING: so the arbitrariness of nationality doesn't force open borders or constant intervention — it just stops me pretending strangers' lives weigh less, which is enough to take humanitarian duties seriously."]}]},{"group":"Q2","topic":"How you fight: distinction, terrorism, evil weapons","questions":[{"question":"What makes someone a legitimate target in war? Is it the uniform they wear or the threat they pose?","points":["My stance: I lean towards McMahan's view that it's about the threat you pose and your responsibility for it, not just the uniform you happen to be wearing.","The plain reason: distinction (also called discrimination) says you can only deliberately kill combatants, not civilians, because combatants are the ones doing the fighting and posing the threat.","The traditional view, from Walzer, is simpler: anyone in uniform is fair game, because by becoming a soldier you've made yourself 'dangerous' and waived your right not to be attacked, regardless of which side is just.","The other side I'd push back on: that uniform-based test treats a conscript who was forced to fight the same as a willing aggressor, which feels wrong because they're not equally responsible.","McMahan's reply (revisionism): what really makes you liable to be killed is moral responsibility for an unjust threat, so a soldier fighting an unjust war is liable and a soldier fighting a just war is not, even though both wear uniforms.","Concrete example: a cook or a clearly surrendering soldier still wears the uniform but poses no threat, so the uniform alone can't be the whole story.","Term to drop: this is the difference between the 'moral equality of combatants' (Walzer) and 'liability' (McMahan).","Closing line: I'd say the uniform is a useful rough guide in the fog of war, but morally what justifies killing someone is the threat and the responsibility behind it."]},{"question":"Why are civilians immune from attack? Can you give me more than one reason?","points":["My stance: civilian immunity is one of the firmest rules in the ethics of war, and there are at least three separate grounds for it, which is why it's so strong.","First ground - they pose no threat: civilians aren't fighting you, so on a self-defence logic there's no threat to neutralise, and killing them isn't defending yourself against anything.","Second ground - they're not responsible: even in an aggressor nation, ordinary civilians didn't start the war and can't stop it, so they're not liable in McMahan's sense of being responsible for an unjust threat.","Third ground - their moral status / they're 'innocent': in the original sense 'innocent' means 'not harming' (from Latin nocere, to harm), and respect for persons means you can't just use them as a means to your military ends.","The other side: a consequentialist might say if killing some civilians ends the war faster and saves more lives overall, immunity should bend - this is the utilitarian pressure Nagel writes about.","The reply: that's exactly what absolutism resists - Nagel's point in 'War and Massacre' is that some things you simply may not do to a person no matter the numbers, because it fails to treat them as a person.","Example: bombing a residential suburb to break enemy morale (like area bombing in WWII) deliberately targets civilians, and we rightly call that a war crime.","Closing line: because immunity rests on three independent legs - no threat, no responsibility, and respect for persons - knocking out one doesn't bring the whole thing down."]},{"question":"Explain the Doctrine of Double Effect. Does it really get attackers off the hook for civilian deaths?","points":["My stance: double effect is a genuinely useful moral tool, but it's not a blank cheque - it only works if you take its conditions seriously.","The core idea in plain words: there's a moral difference between aiming at civilian deaths and merely foreseeing them as a side-effect of hitting a legitimate target, even when the same people die.","The conditions: you can't intend the civilian deaths as your aim, you can't use them as your means, and the harm has to be proportionate to the military good you're getting.","The strongest objection: critics say it's too easy to game - you just say in your head 'I didn't intend it, it was foreseen' and suddenly any collateral damage is fine, so it launders bad acts.","The reply: that's why the proportionality and 'not a means' conditions matter, and why thinkers like Walzer add 'due care' - you must actually accept risk to your own forces to reduce civilian harm, not just shrug.","Example: a cruise missile on a genuine military target that kills bystanders next door can pass double effect; deliberately shelling a marketplace to terrorise the population cannot, because there the deaths ARE the point.","Terms and thinkers to drop: intention versus foresight, and the doctrine is defended by Anscombe and discussed by Nagel.","Closing line: so it doesn't get you off the hook automatically - it draws a line, and plenty of real strikes fall on the wrong side of it."]},{"question":"How would you define terrorism? What's the key thing that makes an act terrorism rather than just ordinary warfare?","points":["My stance: I'd follow Primoratz - terrorism is the deliberate use of violence against innocent people in order to coerce or intimidate some other group into doing what you want.","The key feature: it's the deliberate targeting of the innocent - the victims aren't the real target, they're a means to pressure a government or population through fear.","Why that definition is good: it's morally neutral about who does it, so it doesn't just mean 'violence by people I dislike' - it focuses on the structure of the act, not the cause.","The other side: some say one person's terrorist is another's freedom fighter, so the word is just propaganda - any definition is biased.","The reply: Primoratz answers that even a just cause doesn't license deliberately killing innocents, so freedom fighters can be terrorists too - the cause and the method are separate questions.","Notice it tracks just war theory: terrorism is basically a violation of distinction or non-combatant immunity, the same rule that constrains armies.","Example: a bombing in a cafe to pressure a government is terrorism whether the bombers' grievance is just or not, because the dead bystanders are being used to send a message.","Closing line: so the heart of it isn't the politics or the size of the bang - it's that the innocent are deliberately attacked to frighten someone else."]},{"question":"Is terrorism morally worse than conventional war? Or should we judge them by the same standard?","points":["My stance: I'd side with Held - we should judge terrorism by exactly the same moral standard we use for war, not a special harsher one.","The plain reason: if deliberately killing innocents is what's wrong with terrorism, then states do that too - through area bombing, sieges, or 'collateral' deaths they could have avoided - so consistency demands one standard.","The common view I'm resisting: that terrorism is uniquely evil, a category apart, while what states do in war is somehow cleaner because it's official and uniformed.","Held's challenge: that's a double standard - if we condemn the rebel who kills 20 civilians, we can't wave through the state that kills 200 civilians and calls it unfortunate side-effects.","The reply to Held (for balance): defenders of the distinction say there really is a difference between intending civilian deaths and foreseeing them - double effect again - so terrorism's deliberateness is worse.","My counter: but states often foresee civilian deaths with near-certainty and proceed anyway, which starts to look a lot like intending them, so the gap narrows.","Example: compare a suicide bombing in a market with a deliberate WWII firebombing of a city - both deliberately kill civilians to break morale, so why call only one terrorism?","Closing line: I think honesty requires one yardstick - if it's wrong for the weak to deliberately kill the innocent, it's wrong for the strong too."]},{"question":"Can a state commit terrorism? What would state terrorism look like?","points":["My stance: yes, absolutely - there's no reason terrorism has to be the work of small groups; states can and do use terror as a deliberate tool.","The plain reason: if terrorism is defined by its structure - deliberately attacking innocents to coerce or intimidate, per Primoratz - then a government doing exactly that is committing terrorism, full stop.","Why people resist this: we tend to picture terrorists as non-state actors with bombs, and states control the language, so they call their own version 'security operations' or 'collateral damage'.","The argument for it: deliberately bombing civilian areas to break a population's will to resist is terrorism whether it's done by a militia or an air force - the uniform doesn't change the act.","Held's point applies here: insisting on one standard means we can't exempt states just because they're states - state terror should be named as terror.","Example: WWII area bombing of cities to crush morale, or a regime shelling its own civilians to intimidate the opposition, fit the definition cleanly.","The other side: some reserve 'terrorism' for non-state actors and call state versions 'war crimes' instead - but that's arguably just a labelling choice that lets states off lightly.","Closing line: I'd say if the act is the deliberate terrorising of innocents, it's terrorism regardless of who's wearing the suit - the state badge doesn't sanitise it."]},{"question":"What makes a weapon evil in itself - mala in se? Is it the weapon, or how it's used?","points":["My stance: a weapon is mala in se - evil in itself - when it can't be used without violating the basic rules of fighting, no matter how careful you try to be.","The plain reason: the in bello rules require you to discriminate between combatants and civilians and to be proportionate, so a weapon that can't do that - that inevitably hits the innocent - is wrong by its very nature.","The deeper point: 'mala in se' is a deontological verdict, not a body count - it says some means are off-limits in themselves, echoing Nagel's absolutism that there are things you simply must not do to people.","The other side: a consequentialist will say no weapon is evil in itself, it all depends on outcomes - even a terrible weapon could be justified if it saved more lives on balance.","The reply: Nagel's response in 'War and Massacre' is that treating a person as a mere target, or using a weapon that can't even aim at the guilty, fails to respect them as a person - and no good outcome buys that back.","Example: a nuclear weapon is the classic case - its blast and radiation can't distinguish soldier from child and the harm is wildly disproportionate, so many argue it's mala in se; chemical and biological weapons are similar.","Term to drop: this connects to 'no mala in se' as a rule of jus in bello, alongside distinction and proportionality.","Closing line: so it's not just how you use it - some weapons are built in a way that makes lawful, respectful use impossible, and that's what makes them evil in themselves."]},{"question":"If a weapon could be used precisely against only combatants, would that settle whether it's acceptable? Think about nuclear weapons and the deterrence puzzle.","points":["My stance: precision helps a lot, but it doesn't fully settle it - with nuclear weapons there's a second, weirder problem about merely threatening to use them.","The first point: if a weapon genuinely could hit only combatants and be proportionate, it would pass distinction and proportionality, so it wouldn't be mala in se - the problem with nukes is they can't do that.","Why nukes specifically fail: the blast radius and lingering radiation can't distinguish a soldier from a baby, and the scale is so vast that proportionality is basically impossible.","The deeper puzzle - the deterrence paradox: deterrence works by sincerely intending to do something - massacre civilians in retaliation - that it would be deeply wrong to actually do, so is it ethical to threaten what's unethical to carry out?","The other side: defenders say if the threat keeps the peace and you never fire, the good outcome justifies the conditional intention - and Hiroshima arguably ended a war and saved lives.","The reply: Ward Wilson, in 'The Gordian Knot', doubts deterrence even works and argues it may have been the Soviet invasion, not Hiroshima, that ended WWII - so the supposed benefit is shaky.","Extra angle to mention: Schlosser on accident risk - near-misses mean even a 'never used' arsenal threatens catastrophe - and Glover's moral-history lens on how we drifted into accepting this.","Closing line: so precision is necessary but not sufficient - even setting aside the blast, holding a city hostage with a threat you couldn't morally honour is its own ethical knot."]}]},{"group":"Q3","topic":"Synthesis","questions":[{"question":"Take the principle of distinction from jus in bello and apply it to autonomous weapons. Can a killer robot actually 'distinguish' combatants from civilians the way the laws of war require?","points":["STANCE: I'd say distinction is exactly where autonomous weapons run into deep trouble — recognising a target is not the same as judging one, and the law demands judgement.","MAIN REASON: distinction means only deliberately targeting combatants; a machine can do object-recognition (this shape is a person holding a rifle) but distinction in a messy battlefield needs context — is that a soldier surrendering, a farmer with a tool, a child?","OTHER SIDE: Arkin says a machine could actually do distinction BETTER — no fear, no rage, no self-preservation, no 'scenario fulfilment' that makes a scared soldier shoot first, so it might wrongly kill fewer civilians than a human.","REPLY: even granting Arkin on recognition, the in-bello demand isn't just 'hit fewer civilians' — it requires moral judgement about ambiguous cases, and code weighing a surrender or an ambiguous gesture is exactly what we don't trust it to do.","EXAMPLE: think My Lai for the human failure Arkin points to, versus the Kabul-type ambiguity where a man loading water jugs was read as loading bombs — would a robot have read that pattern any better?","TERM/THINKER: this is the principle of distinction (jus in bello) colliding with Sparrow's scepticism — and it links to proportionality too, which needs even more judgement than distinction.","CLOSING: so my view is recognition isn't distinction; until a machine can exercise genuine moral judgement, it can't satisfy the principle that's supposed to protect civilians."]},{"question":"Apply the Doctrine of Double Effect to a drone strike that kills civilian bystanders. Does double effect let the operator off the hook for collateral deaths?","points":["STANCE: Double effect can in principle justify some civilian deaths in a drone strike, but it's not a free pass — it only works if you genuinely don't intend the deaths and the strike is proportionate.","MAIN REASON: DDE says you may cause civilian deaths you FORESEE but don't INTEND, as a side-effect of a legitimate strike — so a drone killing a real combatant, with bystanders dying as an unwanted side-effect, can clear the bar.","OTHER SIDE: critics say in practice this gets abused — operators 'foresee' huge collateral counts and just shrug it off as side-effect, which makes DDE a rubber stamp rather than a real constraint.","REPLY: the proportionality clause is the teeth — even if the deaths are unintended, if 12 bystanders die to get one plotter, the military gain doesn't outweigh the harm and the strike fails DDE anyway.","EXAMPLE: walk the café case — fire a cruise missile at terror plotters in a London café and kill 12 innocents, or let them escape? You reason it out: real combatant target (intention ok), but are 12 deaths proportionate, and was it last resort?","TERM/THINKER: DDE rests on the intention-vs-foresight distinction (Anscombe, Nagel) — a deontological tool that lets just-war theory allow SOME collateral without abandoning civilian immunity.","CLOSING: so DDE is a real test, not an excuse — it permits the café strike only if the deaths are truly unintended AND proportionate, and often that second condition is what sinks it."]},{"question":"Realism says morality doesn't really apply to war. Apply that to nuclear deterrence — is the bomb just realism vindicated, or does morality still have a grip?","points":["STANCE: I think nuclear deterrence looks like the realist's home turf, but it actually shows morality still has its claws in — because we keep asking whether threatening mass death is right, not just whether it works.","MAIN REASON: realism (Morgenthau, Bacevich) says states pursue survival in an anarchic world, and the bomb is the ultimate survival tool — MAD keeps the peace through self-interest, no morality needed.","OTHER SIDE: but even hardened strategists won't say 'anything goes' — the whole deterrence debate is shot through with moral words like 'unthinkable', and we treat deliberately incinerating cities as a moral horror, not just a policy cost.","REPLY: realism is better read as DESCRIPTIVE (how states behave) than PRESCRIPTIVE (what they ought to do) — Orend rebuts the leap from 'states act on interest' to 'morality is irrelevant', and the deterrence paradox is a purely moral puzzle realism can't dissolve.","EXAMPLE: the US/Israel-Iran situation in 2026 shows states reaching for deterrence logic, but the global condemnation language proves we still judge it morally, not just strategically.","TERM/THINKER: realism leans on a hard-nosed consequentialism about state survival — Morgenthau's 'twilight of international morality' — but Ward Wilson even doubts deterrence WORKS, which knocks out the consequentialist foundation realists assume.","CLOSING: so my view is deterrence isn't proof morality is irrelevant — it's the case where the moral question (is threatening mass murder ever right?) refuses to go away."]},{"question":"The nuclear deterrence paradox is supposed to be a puzzle about intention versus action. Use the intention/foresight distinction from your foundations to unpack it — can it be ethical to THREATEN what it'd be wrong to DO?","points":["STANCE: My view is the deterrence paradox is genuinely hard, but I lean toward saying you can't cleanly separate the threat from the act — sincerely intending to do something monstrous is itself morally compromised.","MAIN REASON: deterrence only works if the threat is SINCERE — you must really intend to retaliate by incinerating cities — so this isn't a bluff; it's forming a conditional intention to do mass murder.","OTHER SIDE: the defender says intending isn't doing — if the threat succeeds, no one dies, so a conditional intention you hope never to act on, that saves millions by keeping the peace, is surely permissible.","REPLY: but deontology says intentions matter in themselves — if actually launching is murder of innocents (wrong in itself), then sincerely intending it conditionally seems to corrupt you too; you've made yourself ready to commit an atrocity.","EXAMPLE: this is Reflective Exercise 9.2 directly — 'can it be ethical to threaten to do what it would be unethical to do?' — and the conditional-intention problem is Kavka/Gauthier territory.","TERM/THINKER: this is the intention-vs-act puzzle (intending vs doing — the conditional-intention problem, Kavka/Gauthier) at full stretch — a consequentialist (outcomes only) says the threat is fine because it prevents deaths; a deontologist worries the intention itself is the wrong.","CLOSING: so I'd argue the paradox exposes the consequentialism/deontology split perfectly — if only results count, threaten away; if intentions can be wrong in themselves, deterrence stains you even when it works."]},{"question":"McMahan grounds who may be killed in liability — moral responsibility for an unjust threat, not the uniform. Apply that to signature drone strikes, where targets are picked by 'pattern of life' rather than identity.","points":["STANCE: I think McMahan's liability standard is actually the sharpest weapon AGAINST signature strikes — if liability tracks responsibility for an unjust threat, you can't be liable just for behaving like a 'pattern'.","MAIN REASON: McMahan says what makes you a legitimate target isn't a uniform — it's your moral responsibility for posing an unjust threat; so killing requires knowing the person IS responsible.","OTHER SIDE: signature strikes kill people whose identity you don't even know, on statistical behaviour — military-age males in a suspicious gathering — which is exactly NOT confirmation of individual responsibility.","REPLY: a defender might say patterns are good evidence of liability in a war zone, but McMahan's whole point is liability is individual and moral, not statistical — you can't infer one person's guilt from a crowd's profile.","EXAMPLE: the Pakistan drone war Coll documents in 'The Unblinking Stare', and signature strikes that killed unidentified people on pattern — versus the Kabul strike where pattern-reading killed 10 civilians.","TERM/THINKER: this is liability (McMahan) versus the older 'uniform/combatant' test — and it overlaps the war-vs-execution question, since outside declared war you're supposed to ARREST, not kill, unconfirmed suspects.","CLOSING: so my view is signature strikes flunk McMahan's test — they kill on the basis of looking dangerous, when liability demands actually BEING responsible for an unjust threat."]},{"question":"Walzer says all combatants are moral equals — they may kill each other regardless of whose cause is just. Does that idea even make sense when one 'combatant' is an autonomous killing machine?","points":["STANCE: I'd argue the moral equality of combatants basically breaks down with killer robots — a machine isn't a combatant who shares the soldier's risks and rights, so the symmetry Walzer relies on collapses.","MAIN REASON: Walzer's idea is that soldiers on both sides face each other as equals, each with the right to kill and the liability to be killed — a kind of mutual risk and mutual standing.","OTHER SIDE: you might say a robot is just a tool, like a rifle, so the human commander remains the 'combatant' and moral equality still holds between the two human sides.","REPLY: but if the machine genuinely selects and engages targets without meaningful human control, the human isn't really the one fighting — and a robot has no moral status to be a 'moral equal', which is exactly Sparrow's respect worry.","EXAMPLE: imagine your brother killed by an autonomous machine versus a human-piloted drone — Sparrow's intuition (Reflective Ex 11.5) is most people feel the robot case is worse, because no human equal faced him.","TERM/THINKER: Walzer's moral equality of combatants versus the revisionists (McMahan, Rodin) who already deny it — and AWS push even further by removing the human from one side of the duel entirely.","CLOSING: so my view is killer robots don't just challenge WHO counts as a moral equal — they remove the very thing (a risk-sharing human agent) that made the idea of combatant equality meaningful."]},{"question":"Primoratz defines terrorism as deliberate violence against innocents to coerce a wider group. Use that definition to test a signature drone strike — is the US doing something structurally like terrorism?","points":["STANCE: I'd say a signature strike isn't strictly terrorism by Primoratz's definition, but it sits uncomfortably close, and refusing to see that is too convenient for states.","MAIN REASON: Primoratz says terrorism = DELIBERATELY targeting innocents to terrorise/coerce a wider audience — the key word is 'deliberately', the innocents are the means.","OTHER SIDE: a signature strike supposedly targets combatants/threats, so civilian deaths are (claimed as) unintended side-effects — that's double effect, not deliberate targeting of innocents, so it's not terrorism.","REPLY: but if you strike on 'patterns' knowing you'll kill unidentified people, and the wider effect is to terrorise a whole region into fear of the sky, the line between foreseen and intended starts to blur — and Held argues we should judge state violence by the SAME standard as terrorism, not a softer one.","EXAMPLE: the Pakistan drone campaign — communities living in constant dread of strikes — looks coercive on a population even if each strike claims a specific target; Boyle's blowback point is that it radicalises exactly this way.","TERM/THINKER: Primoratz's responsibility-based account of immunity and his definition, versus Held's 'same standard' move and Sparrow's reply in 'Hands up who wants to die?' on responsibility and immunity.","CLOSING: so my view is the definition saves the drone strike from the 'terrorism' label only via the intention clause — and if we're honest about its coercive effect on civilians, we should at least hold it to the same standard Held demands of terrorists."]},{"question":"Sparrow's 'Robots and Respect' says being killed by a machine fails to respect your moral status. Doesn't a riskless drone — a human operator a continent away — raise the same worry? Apply respect to drone asymmetry.","points":["STANCE: I think the respect worry partly applies to riskless drones, but it bites harder on autonomous machines — a remote human still decides your death, even if he risks nothing.","MAIN REASON: Sparrow's point is that taking a human life should involve a moral agent who acknowledges the gravity of it — being killed by a thing that 'decides' your death fails to honour your moral status.","OTHER SIDE: with a drone there IS a human agent deciding, so respect is arguably preserved — the asymmetry is just about risk, and force-protection (keeping your own people safe) is plainly a good thing.","REPLY: but the asymmetry adds its own worry — when killing is utterly riskless, the killer never stakes anything, and Sparrow is sceptical that risk-free war respects the seriousness of taking life or keeps soldiers honest about it.","EXAMPLE: Reflective Ex 10.2 — should the SAS remove body armour to make the fight 'fair'? It probes whether riskless killing is troubling; and 11.5 — brother killed by a robot vs a piloted drone — isolates the pure respect intuition.","TERM/THINKER: this is moral status/respect feeding Sparrow's two arguments — the respect argument and his scepticism about asymmetric, riskless war.","CLOSING: so my view is the drone keeps a human in the loop, which preserves SOME respect — but it already strains the idea that killing should cost the killer something, and the robot severs it entirely."]},{"question":"Drone and autonomous warfare make war riskless for the attacker. Connect that asymmetry back to jus ad bellum — does making war cheap make it too easy to start?","points":["STANCE: My view is that riskless warfare is a jus ad bellum problem hiding inside a jus in bello technology — when war costs you no soldiers, the bar to GOING to war quietly drops.","MAIN REASON: jus ad bellum demands last resort and right intention — but those restraints partly held because war was costly in your own blood; remove that cost and leaders reach for force sooner.","OTHER SIDE: a defender says cheaper, safer war is GOOD — fewer of your own people die, strikes are precise (Byman), so lowering the cost of just action is no bad thing.","REPLY: but lowering the THRESHOLD of war means more wars, including unjust ones — and 'last resort' becomes hollow when force is the path of least resistance; the in-bello gain (precision) is bought with an ad-bellum loss (restraint).","EXAMPLE: the spread of drone strikes outside declared wars, and the 'killer robots' / Slaughterbots worry that armies with no human risk start conflicts a casualty-averse public would once have blocked.","TERM/THINKER: this links Week 10/11 asymmetry to jus ad bellum criteria (last resort, prospect of success) — and to the 'lowering the threshold of war' critique of AWS; Sparrow is sceptical of riskless war for exactly this reason.","CLOSING: so my view is the deepest danger of riskless weapons isn't how they're used in a war, but that they make starting wars too easy — an ad bellum failure dressed as an in bello upgrade."]},{"question":"Nagel's 'War and Massacre' frames the deep clash as absolutism versus utilitarianism. Show how that exact clash plays out BOTH in nuclear deterrence AND in the Arkin–Sparrow robot debate. Is it the same fight twice?","points":["STANCE: I'd argue it really is the same fight twice — Nagel's absolutism-vs-utilitarianism (which is just deontology vs consequentialism) is the engine under both the nuclear and the robot debates.","MAIN REASON: Nagel says the utilitarian asks only what produces the best outcome, while the absolutist insists some acts — like deliberately targeting the innocent — are forbidden whatever the payoff.","NUCLEAR SIDE: deterrence is utilitarian (threaten cities to save more lives on balance) versus absolutist (incinerating innocents is murder, so even intending it is wrong) — same structure as the deterrence paradox.","ROBOT SIDE: Arkin is the consequentialist (if robots kill FEWER civilians, build them, refusing is the immoral choice) versus Sparrow the deontologist (good body-counts don't fill the responsibility gap or restore dignity).","WHY IT'S ONE FIGHT: in both, the consequentialist says 'count the bodies and pick the lower number'; the deontologist says 'some things — murdering innocents, killing with no one responsible — are wrong in themselves regardless of the count'.","TERM/THINKER: Nagel 'War and Massacre' (W8) supplies the frame; it's the master key — and the concept hierarchy literally calls the robot debate 'a consequentialism-vs-deontology fight wearing a robot costume'.","CLOSING: so my view is once you see the master key, nuclear and robots stop looking like separate topics — they're the same two moral theories colliding over different weapons."]},{"question":"Pacifism says war is never justified. Could a pacifist actually WELCOME autonomous weapons if they reduce killing — or does pacifism still condemn them? Apply the pacifist lens to killer robots.","points":["STANCE: My view is it depends which pacifism — an absolute pacifist condemns AWS like all war, but a contingent 'costs always exceed benefits' pacifist faces a real dilemma if robots genuinely kill fewer.","MAIN REASON: absolute pacifism (a deontological version — killing is always wrong) doesn't care that robots are 'cleaner'; a more humane way to do an impermissible thing is still impermissible.","OTHER SIDE: a contingent pacifist, who opposes war because the costs always outweigh the gains, might in theory welcome a weapon that slashes civilian deaths — that's Arkin's challenge aimed at pacifists too.","REPLY: but even the contingent pacifist can reply that AWS LOWER the threshold of war, so you get more wars overall — net suffering rises even if each war is 'cleaner', so the contingent case against war survives.","EXAMPLE: Tolstoy's absolute renunciation of violence on one side; on the other, the Slaughterbots worry that cheap autonomous killing proliferates conflict rather than reducing it.","TERM/THINKER: Tolstoy (absolute pacifism) versus contingent pacifism; and recall Anscombe's 'War and Murder' attack — she calls pacifism 'pernicious' for blurring killing combatants and murdering the innocent, a charge AWS make newly relevant.","CLOSING: so my view is robots don't rescue war for the pacifist — the absolutist condemns them outright, and the contingent pacifist can point to a MORE warlike world, not a less violent one."]},{"question":"For the principle of distinction specifically — which is the bigger threat, a nuclear weapon or an autonomous weapon? Compare the two hard cases against the same foundational principle.","points":["STANCE: My view is the nuke is the worse offender against distinction in its very nature, while the robot's threat to distinction is about WHO (or what) is doing the judging — different failures, but the nuke is categorically indiscriminate.","MAIN REASON: distinction forbids deliberately or recklessly hitting non-combatants — a strategic nuke physically CAN'T be contained to combatants, so it fails distinction by design, arguably making it mala in se.","ROBOT SIDE: an AWS could in principle be precise — Arkin even says more precise than a panicking soldier — so its problem with distinction isn't blast radius, it's whether a machine can JUDGE ambiguous targets at all.","WEIGHING IT: a precise robot that occasionally misjudges a surrender is bad; a city-buster that vaporises a hundred thousand civilians can't even pretend to discriminate — so on distinction alone, the nuke is the clearer violation.","REPLY/NUANCE: but the robot adds a problem the nuke doesn't — even a 'good' kill leaves a responsibility gap and a respect failure, so it's worse on accountability even if better on blast.","TERM/THINKER: distinction and proportionality plus mala in se — the classic deontological \"evil in itself\" verdict (Nagel); Sparrow's own contribution is the responsibility gap + respect, a different kind of wrong; Hiroshima is the standing case for indiscriminate effect.","CLOSING: so my view is for distinction itself the nuke wins the 'worse' title because it's inherently indiscriminate — but the robot is uniquely bad in a different currency: no one to answer for the deaths."]},{"question":"Mala in se means 'evil in itself' — a deontological verdict. Nuclear weapons are often called mala in se. Could autonomous weapons be mala in se too, or is that the wrong category for them?","points":["STANCE: I'd argue nukes are a much better fit for mala in se than robots — the nuke is wrong in its very effects, whereas the robot's wrong is about agency and accountability, which is a different kind of objection.","MAIN REASON: mala in se (a deontological verdict, needs deontology) means a weapon is wrong INTRINSICALLY, not just for its consequences — torture, poison, rape, and arguably the nuke because it can't help being indiscriminate.","OTHER SIDE: you could call AWS mala in se because killing with no responsible agent, and killing in a way that disrespects moral status, are wrong-in-themselves features — that's Sparrow's flavour of objection.","REPLY: but those are objections to HOW the decision is made (no human answerable, no respect), not to the weapon's intrinsic destructive nature — so 'illegitimate' or 'disrespectful' fits AWS better than the classic mala in se of poison gas.","EXAMPLE: a nuke can never be aimed at only combatants — that's intrinsic; a robot rifle could in principle hit only a soldier, so its wrongness isn't baked into the physics the way the nuke's is.","TERM/THINKER: mala in se (deontology) — Nagel's absolutism backs calling something evil-in-itself; Sparrow's responsibility gap and 'Robots and Respect' supply a NEW category of intrinsic wrong, not the old effects-based one.","CLOSING: so my view is nukes are mala in se in the classic effects sense, while robots may be intrinsically wrong in a fresh way — wrong because of who's NOT responsible, not because of what they do to bodies."]},{"question":"The jus ad bellum / jus in bello independence rule says a war can be just to start but fought wrongly, or unjust to start but fought cleanly. Use that distinction to analyse the deployment of killer robots — is the AWS debate an in-bello or an ad-bellum question?","points":["STANCE: My view is the killer-robot debate is sneaky because it straddles BOTH halves — Sparrow's core argument is in-bello, but the deepest danger (lowering the threshold of war) is ad-bellum.","MAIN REASON: the independence rule says how you START a war and how you FIGHT it are separate moral questions — and AWS raise distinct problems on each side, so you have to keep them apart.","IN-BELLO SIDE: Sparrow's responsibility gap and the distinction/proportionality worries are all about CONDUCT — can the weapon fight justly, and can anyone be held responsible when it doesn't?","AD-BELLUM SIDE: but if robots make war riskless and cheap, they erode last resort and right intention — leaders go to war too readily, which is an ad-bellum corruption, not a conduct one.","WHY IT MATTERS: this means a country could deploy AWS in a war that's perfectly just to START, yet fight it illegitimately (responsibility gap); or fight 'cleanly' with robots in a war it should never have begun — the two failures don't cancel.","TERM/THINKER: jus ad bellum vs jus in bello independence; Sparrow's responsibility gap and 'Robots and Respect' on the in-bello side; the 'lowering the threshold of war' critique on the ad-bellum side.","CLOSING: so my view is you can't settle the robot question with one verdict — it fails in-bello on accountability AND threatens ad-bellum on restraint, and the independence rule is what lets you see both."]}]}],"quiz":[{"q":"A general argues: \"We should firebomb the enemy city. Yes, tens of thousands of civilians will die, but it will break enemy morale and end the war six months sooner, saving more lives overall.\" Is this reasoning results-based or rules-based?","answer":"Results-based — it judges the act purely by its overall outcome (fewer total deaths on balance), with no act treated as forbidden in itself.","distractors":["Rules-based — it appeals to a fixed duty not to prolong a war.","Neither — it's a jus ad bellum point about whether the war was just to start.","Rules-based — because it respects the principle of proportionality, which is a rule."],"why":"The tell is that nothing is off-limits as long as the totals come out ahead; that is consequentialist (only outcomes matter). The tempting wrong answer treats 'proportionality' as making it rules-based, but weighing harm against gain to maximise net good IS the consequentialist move — a true rules-thinker would say deliberately killing innocents is forbidden no matter how the totals look.","kind":"results-or-rules"},{"q":"Someone says: \"Even if torturing this one prisoner would reveal the bomb's location and save a thousand people, you still must not do it — deliberately torturing a person is wrong in itself.\" Is this reasoning results-based or rules-based?","answer":"Rules-based — it names an act as wrong in itself and refuses it even though the outcome would be better.","distractors":["Results-based — because saving a thousand lives is the outcome being weighed.","Results-based — it accepts that torture is bad because of the suffering it causes.","Rules-based — but only because the speaker thinks torture won't actually work."],"why":"The signature of rules-based thinking is exactly this: holding to a prohibition even when breaking it would produce a better result. The tempting wrong answer points at 'a thousand lives' and concludes it's results-based, but the speaker explicitly refuses to let that outcome override the rule — the better result is acknowledged and still rejected, which is the deontological move.","kind":"results-or-rules"},{"q":"A student writes: \"Deliberately bombing a munitions factory, knowing some civilians next door will die, is exactly the same kind of act as deliberately bombing the civilians to terrify the population. Both are just 'choosing to cause civilian deaths.'\" What's the mistake?","answer":"It collapses intention and foresight: in the factory case the civilian deaths are foreseen side-effects, while in the terror case they are intended (as the very aim or means) — and that difference is precisely what the double-effect rule turns on.","distractors":["The mistake is confusing jus ad bellum with jus in bello — one is about starting the war, the other about fighting it.","There's no mistake — if civilians die either way, the intention behind it makes no moral difference.","The mistake is ignoring proportionality — the factory strike is fine only if the gain is large enough."],"why":"Double effect hinges on whether the harm is meant (aim or means) or merely foreseen as a side-effect; treating both cases as 'the same' erases that line. The 'no mistake' option is the classic foreseen-equals-intended error the question targets — a rules-thinker holds that intending innocent deaths is always forbidden, while foreseeing proportionate ones can be permitted.","kind":"spot-the-mistake"},{"q":"To stop an advancing army, a commander blows up a dam. Plan A: flood the valley to wash away the troops; the village downstream is destroyed as an unavoidable side-effect. Plan B: flood the village deliberately, because drowning civilians will make the enemy government surrender. Under the double-effect rule, what's the key difference between A and B?","answer":"In A the civilian deaths are foreseen but not intended (a side-effect of a legitimate military strike), whereas in B they are intended as the means to the goal — so A can potentially be permitted and B cannot.","distractors":["There's no real difference — civilians drown in both, so both equally violate distinction.","A is worse, because it kills civilians without even trying to achieve a military aim through them.","B is acceptable too, as long as the number drowned is proportionate to ending the war."],"why":"Double effect permits proportionate foreseen harm but never intended harm: in A the deaths aren't part of the plan's aim or mechanism, in B they ARE the mechanism. The 'no real difference' option is the trap — it judges only by the outcome (people drown), ignoring that the rule treats meaning-the-death and merely-foreseeing-it as morally different even when the body count is identical.","kind":"scenario"},{"q":"Two people both oppose using a nuclear weapon on a city. Person 1: \"The fallout and instability would cost more lives in the long run than it saves.\" Person 2: \"Incinerating a city of innocents is murder — it would be wrong even if it somehow worked out for the best.\" How do their two arguments differ?","answer":"Person 1 is reasoning by results (it's wrong because the outcome is net worse), while Person 2 is reasoning by rules (it's wrong in itself, regardless of outcome).","distractors":["They don't really differ — both conclude the bombing is wrong, so both are rules-based.","Person 1 is rules-based (appealing to the value of life) and Person 2 is results-based (predicting it won't work).","Both are results-based, since both are talking about the consequences of dropping the bomb."],"why":"Same conclusion, opposite engines: one weighs consequences, the other invokes a prohibition that holds even if consequences favoured the act. The 'they don't really differ' option is the core misunderstanding — agreeing on the verdict doesn't make the reasoning the same. Notice only Person 2's style can call a weapon evil-in-itself (mala in se); a pure results-thinker has no room for that.","kind":"results-or-rules"},{"q":"Suppose you fully accept the rules-based claim that it is always wrong to deliberately kill innocent people, no matter the outcome. A government runs a deterrence policy that only works if it sincerely intends to incinerate enemy cities should it be attacked. What follows for your view of that policy?","answer":"You must judge the policy wrong, because sincerely intending to murder innocents is itself adopting a forbidden intention — even if the cities are never actually bombed.","distractors":["The policy is fine, because no innocents are actually killed unless the threat is carried out.","The policy is fine, because the intention is only conditional — it depends on being attacked first.","You can't judge the policy at all until you know whether deterrence actually prevents war."],"why":"If the rule forbids deliberately killing innocents, then genuinely intending to do so is already on the wrong side of the rule — that is the deterrence paradox: keeping peace by sincerely intending mass murder. The 'no one actually dies' option mistakes the rules-based view for a results-based one; on a results view an unused threat may be fine, but the premise here judges intentions, not just outcomes.","kind":"what-follows"},{"q":"In 2021 a drone strike in Kabul killed ten civilians, including children, after operators mistook an aid worker's car for a bomb threat. A defender says: \"The deaths weren't intended, they were a tragic side-effect of a strike aimed at a genuine threat, so the double-effect rule clears it.\" Even granting the deaths were unintended, why might double effect still NOT clear this strike?","answer":"Double effect also requires the foreseen harm to be proportionate to a real military gain — and killing ten innocents (with no actual threat present) is grossly disproportionate, so 'unintended' alone isn't enough.","distractors":["It can't be cleared because any civilian death at all automatically violates the distinction principle.","It can't be cleared because the operators clearly intended to kill those specific civilians.","It is cleared — once the deaths are unintended side-effects, double effect fully justifies the strike."],"why":"Double effect has more than one condition: the harm must be unintended AND proportionate to a genuine gain — here there was no real threat, so the harm bought nothing. The 'any civilian death violates distinction' option confuses distinction (don't deliberately target civilians) with proportionality (don't cause excessive collateral harm); distinction wasn't breached by aiming, but proportionality was.","kind":"apply"},{"q":"A country invades its neighbour to seize an oil field — clearly an act of aggression with no just cause. But its soldiers scrupulously follow the rules: they only fire on enemy troops, take prisoners humanely, and never touch civilians. A commentator says: \"Since they're fighting so cleanly, the war is actually justified.\" What is the mistake in this reasoning?","answer":"It confuses the two independent questions: whether it was right to START the war (jus ad bellum) and whether it is being FOUGHT fairly (jus in bello). Fighting cleanly is a jus in bello matter and cannot make an unjust invasion justified.","distractors":["There's no mistake — fighting cleanly by following distinction does make a war justified overall.","The mistake is that fighting cleanly is impossible during an invasion, so the claim is factually false.","The mistake is confusing distinction with proportionality — the soldiers also need to show the harm wasn't excessive."],"why":"The whole point of the ad bellum / in bello split is that the two questions are independent: a war can be unjust to start yet fought cleanly, or just to start yet fought with atrocities. Clean conduct (in bello) never retroactively justifies an aggressive war (ad bellum). The tempting wrong option treats good conduct as settling the justice of the whole war — exactly the conflation the distinction warns against. (The other distractors mix in unrelated principles or deny the premise.)","kind":"spot-the-mistake"},{"q":"A defence minister argues: \"We were attacked first, so going to war was clearly justified — and that justification covers everything our forces did once the fighting began.\" Which principle is being misapplied, and how?","answer":"Having a just cause to GO to war (jus ad bellum) is being wrongly treated as a blanket licence for HOW the war is fought (jus in bello). A justified start does not excuse war crimes committed during the fighting.","distractors":["No principle is misapplied — if you have a just cause, then by definition everything done in pursuit of it is also just.","The principle of last resort is misapplied: being attacked first means war was the last resort, which is all that matters.","The principle of proportionality is being misapplied: as long as the overall war is proportionate, individual acts within it need no separate scrutiny."],"why":"This is the same conflation in the other direction: a just start (ad bellum) does NOT automatically justify the conduct (in bello). A country attacked first can still commit atrocities — and those are judged separately. The tempting wrong option ('just cause covers everything') is precisely the error; the independence of the two questions means in bello conduct gets its own assessment regardless of how just the cause was.","kind":"spot-the-mistake"},{"q":"The classic case for going to war in self-defence treats a country defending itself like a person defending their own life against an attacker. Someone presses this analogy: \"A country is just like a person — it has the right to defend itself with lethal force.\" What is the STRONGEST objection to relying on this analogy?","answer":"When a country fights, it is often defending its institutions, borders, or sovereignty rather than the actual lives of its people — so the analogy to a person defending their life strains, because killing to protect institutions is harder to justify than killing to save a life.","distractors":["The objection is that countries, unlike persons, can never really be 'attacked', so self-defence never applies to states at all.","The objection is that individual self-defence is also wrong, so the analogy fails because both sides of it are unjustified.","The objection is that a country defending itself violates the other state's sovereignty, which always outweighs any right to self-defence."],"why":"The strongest challenge to the self-defence analogy is that national defence usually protects political institutions and territory, not directly the lives of citizens — and killing to defend institutions is far harder to justify than a person killing to save their own life. That gap is what makes the person-to-country analogy strain. The tempting wrong option overshoots by claiming states can never be attacked, which is plainly false; the objection isn't that defence never applies, but that what's being defended often isn't lives.","kind":"best-objection"},{"q":"A government justifies invading another country this way: \"That regime is slaughtering its own minority population. Sovereignty cannot be a shield for mass murder — we have a responsibility to protect those people, even though they are foreigners.\" Which jus ad bellum debate is this appealing to, and what is the standard worry about such justifications?","answer":"It appeals to humanitarian intervention (protecting foreigners' human rights over the target state's sovereignty); the standard worry is that 'humanitarian' aims can be a cover for a powerful state pursuing its own strategic interests.","distractors":["It appeals to national self-defence; the worry is that the invading country itself wasn't attacked, so no defence applies.","It appeals to the doctrine of double effect; the worry is whether the civilian deaths are intended or merely foreseen.","It appeals to distinction; the worry is whether the invading forces will be able to tell combatants from civilians."],"why":"Justifying war to protect foreign civilians from their own government is the humanitarian intervention debate — human rights versus sovereignty. The well-known worry is that 'humanitarian' language can mask a power grab (e.g. the contested reading of Libya). The tempting wrong option misfiles this as self-defence, but no one is claiming the invader was attacked — the whole point is that the victims are foreigners, which is what makes it humanitarian rather than defensive.","kind":"scenario"},{"q":"Reasoning sample: \"We should intervene militarily in that country because, on balance, far more lives will be saved by stopping the massacre than will be lost in the fighting. The numbers come out positive, so we go.\" Is this argument for humanitarian intervention fundamentally results-based or rules-based?","answer":"Results-based (consequentialist): it justifies the intervention purely by weighing total lives saved against lives lost — the rightness depends entirely on the outcome.","distractors":["Rules-based, because it appeals to a duty to protect innocent people from being killed.","Rules-based, because saying we 'should' intervene invokes a moral rule about helping others.","Neither — it's a jus in bello argument about distinction, not a results-or-rules argument at all."],"why":"The argument rests entirely on a net tally of lives — that's the signature of consequentialist (results) reasoning: only the outcome matters. The tempting wrong option mistakes the talk of 'protecting innocents' for a deontological duty, but here protection isn't being treated as a rule that holds regardless of outcome — it's being cashed out in a body count. Using the word 'should' or 'duty' doesn't make reasoning rules-based; what matters is whether the justification appeals to outcomes (results) or to acts being right/wrong in themselves (rules).","kind":"results-or-rules"},{"q":"Apply the concepts to a real case. NATO's 2011 intervention in Libya was launched to protect civilians from the Gaddafi regime, but critics later argued the campaign went well beyond protection toward regime change and left the country worse off. Using the unit's framework, which TWO distinct questions should you keep separate when assessing Libya?","answer":"Whether it was just to LAUNCH the intervention in the first place (jus ad bellum — was the humanitarian cause genuine and proportionate?) versus whether the intervention was CONDUCTED justly once underway (jus in bello — distinction, proportionality in the actual strikes).","distractors":["Whether the civilians were innocent versus whether they were harmless — the two competing grounds for non-combatant immunity.","Whether the deaths were intended versus merely foreseen — the double-effect question about each airstrike.","Whether NATO had legitimate authority versus whether it used weapons that are mala in se."],"why":"Libya is a textbook case for keeping the start-versus-conduct questions apart: you can ask whether intervening at all was justified (ad bellum — and whether 'humanitarian' was a cover) separately from whether the bombing campaign was fought within the rules (in bello). The tempting wrong option (intended vs foreseen) is a real concept from the unit but it operates inside the in bello assessment of particular strikes — it isn't one of the two top-level questions you partition the whole case into.","kind":"apply"},{"q":"An air force bombs a working munitions factory to cut off the enemy's weapon supply. Everyone inside is a civilian factory worker. The strike will kill all 40 of them. The commander says the deaths are an unavoidable side-effect of destroying a legitimate military target, and the loss of life is small compared with the lives saved by halting weapon production. Which principle is the commander mainly relying on to justify the deaths?","answer":"Proportionality together with double effect: the workers' deaths are foreseen but not intended, and are weighed against the military gain.","distractors":["Distinction, because the factory is a military target rather than a residential one.","Distinction, because the workers are technically contributing to the war effort and so count as combatants.","Mala in se, because deliberately bombing a building full of people is evil in itself."],"why":"The deaths are a foreseen side-effect of hitting a legitimate target, and the commander is openly weighing them against the gain — that is double effect plus proportionality. The tempting wrong answer treats this as a distinction question, but distinction asks whether you are deliberately aiming at non-combatants; here the aim is the factory, not the workers, so distinction is satisfied and the live question is whether the foreseen harm is excessive (proportionality).","kind":"scenario"},{"q":"A general reasons: 'If we firebomb this residential district, the terror will break enemy morale and force a surrender within a week, ending a war that would otherwise drag on for a year and kill far more people overall. So the bombing is justified.' Is this reasoning results-based or rules-based
