<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>ATS2640 — Study App</title>
<style>:root { color-scheme: light dark; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; font:17px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#fbfbf8; color:#1c1c1e; }
.wrap { max-width:680px; margin:0 auto; padding:0 16px calc(60px + env(safe-area-inset-bottom)); }
.top { position:sticky; top:0; z-index:10; background:rgba(251,251,248,.94); backdrop-filter:saturate(180%) blur(8px); border-bottom:1px solid rgba(0,0,0,.1); padding:12px 16px 0; }
.top h1 { font-size:1.02rem; margin:0 0 9px; font-weight:800; }
.tabbar { display:flex; gap:6px; overflow-x:auto; }
.tab { flex:1 0 auto; padding:9px 14px; border:0; border-bottom:3px solid transparent; background:transparent; color:inherit; font:inherit; font-weight:700; font-size:.9rem; opacity:.55; white-space:nowrap; }
.tab.on { opacity:1; border-bottom-color:#0a63c2; color:#0a63c2; }
#app { padding-top:18px; }
.hint { opacity:.7; font-size:.9rem; }
.row { display:flex; align-items:center; gap:10px; margin:6px 0 14px; }
.row .count { font-weight:700; opacity:.6; font-size:.85rem; margin-left:auto; }
select, .mini { font:inherit; font-size:.85rem; padding:7px 10px; border-radius:9px; border:1px solid rgba(0,0,0,.18); background:transparent; color:inherit; font-weight:600; }
.btns { gap:8px; }
.nav { flex:1; padding:13px; border:1px solid rgba(0,0,0,.18); background:transparent; color:inherit; border-radius:12px; font:inherit; font-weight:700; }
.nav.primary { background:#0a63c2; color:#fff; border-color:#0a63c2; }
/* prose / learn */
.prose h1 { font-size:1.5rem; line-height:1.2; margin:.6em 0 .4em; }
.prose h2 { font-size:1.22rem; line-height:1.25; margin:1.5em 0 .45em; padding-bottom:.2em; border-bottom:1px solid rgba(0,0,0,.12); }
.prose h3 { font-size:1.05rem; margin:1.2em 0 .35em; }
.prose blockquote { border-left:4px solid #c9a227; margin:1em 0; padding:.45em 1em; background:rgba(201,162,39,.1); border-radius:0 8px 8px 0; }
.prose table { width:100%; border-collapse:collapse; display:block; overflow-x:auto; font-size:.9em; }
.prose th, .prose td { border:1px solid rgba(0,0,0,.2); padding:6px 9px; text-align:left; vertical-align:top; }
.prose code { background:rgba(0,0,0,.06); padding:1px 5px; border-radius:5px; font-size:.88em; }
.prose hr { border:0; border-top:2px dashed rgba(0,0,0,.18); margin:2em 0; }
/* flashcards */
.flash { background:rgba(10,99,194,.05); border:1.5px solid rgba(10,99,194,.22); border-radius:16px; min-height:230px; display:flex; align-items:center; justify-content:center; padding:22px; cursor:pointer; }
.flashinner { width:100%; }
.flabel { font-size:.68rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; opacity:.5; text-align:center; margin-bottom:14px; }
.ftext { font-size:1.12rem; line-height:1.45; text-align:center; }
.ftext p { margin:.4em 0; text-align:left; }
.ftext strong { color:#0a63c2; }
/* practice accordions */
.ph { font-size:1.12rem; margin:1.3em 0 .5em; padding-bottom:.2em; border-bottom:2px solid rgba(10,99,194,.3); color:#0a63c2; }
.ptopic { font-weight:800; opacity:.6; font-size:.8rem; text-transform:uppercase; letter-spacing:.03em; margin:1em 0 .3em; }
.qa { border:1px solid rgba(0,0,0,.13); border-radius:11px; margin:8px 0; overflow:hidden; }
.qa summary { padding:13px 15px; font-weight:600; cursor:pointer; list-style:none; font-size:.97rem; line-height:1.35; }
.qa summary::-webkit-details-marker { display:none; }
.qa[open] summary { background:rgba(10,99,194,.06); border-bottom:1px solid rgba(0,0,0,.1); }
.qa ul { margin:0; padding:12px 16px 14px 30px; }
.qa li { margin:.4em 0; font-size:.95rem; line-height:1.4; }
/* game */
.stats { display:flex; gap:9px; margin:0 0 14px; font-size:.82rem; font-weight:700; }
.stats span { background:rgba(10,99,194,.1); color:#0a63c2; padding:5px 11px; border-radius:20px; }
.gmode { display:flex; gap:8px; margin-bottom:14px; }
.gmode button { flex:1; padding:10px; border:1px solid rgba(0,0,0,.15); background:transparent; color:inherit; border-radius:11px; font:inherit; font-weight:700; font-size:.9rem; }
.gmode button.on { background:#0a63c2; color:#fff; border-color:#0a63c2; }
.card { background:rgba(0,0,0,.03); border:1px solid rgba(0,0,0,.1); border-radius:14px; padding:16px; margin-bottom:14px; }
.qlabel { font-size:.7rem; font-weight:800; letter-spacing:.05em; text-transform:uppercase; opacity:.5; margin-bottom:8px; }
.q { font-size:1.05rem; font-weight:600; line-height:1.35; }
.opts { display:flex; flex-direction:column; gap:9px; margin-top:6px; }
.opt { text-align:left; padding:13px 15px; border:1.5px solid rgba(0,0,0,.15); background:transparent; color:inherit; border-radius:12px; font:inherit; font-size:.95rem; line-height:1.3; }
.opt.correct { background:#1f9d5519; border-color:#1f9d55; }
.opt.wrong { background:#d92d2019; border-color:#d92d20; }
.feedback { margin-top:12px; padding:12px 14px; border-radius:11px; font-size:.92rem; line-height:1.4; display:none; }
.feedback.show { display:block; }
.feedback.good { background:#1f9d5515; border-left:4px solid #1f9d55; }
.feedback.bad { background:#d92d2012; border-left:4px solid #d92d20; }
.next { margin-top:12px; width:100%; padding:14px; border:0; border-radius:12px; background:#0a63c2; color:#fff; font:inherit; font-weight:800; display:none; }
.next.show { display:block; }
.board { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.col-h { font-size:.7rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; opacity:.5; padding:2px 2px 4px; }
.tile { padding:11px 12px; border:1.5px solid rgba(0,0,0,.15); background:transparent; color:inherit; border-radius:11px; font:inherit; font-size:.82rem; line-height:1.28; text-align:left; min-height:60px; }
.tile.name { font-weight:800; }
.tile.sel { border-color:#0a63c2; background:rgba(10,99,194,.12); }
.tile.done { background:#1f9d5519; border-color:#1f9d55; opacity:.6; }
.tile.bad { border-color:#d92d20; background:#d92d2019; }
.msg { text-align:center; font-weight:700; margin:14px 0; min-height:1.4em; }
.foot { text-align:center; margin:26px 0 0; font-size:.82rem; opacity:.7; }
.foot a { color:#0a63c2; text-decoration:none; }
@media (prefers-color-scheme: dark) {
  body { background:#0f1216; color:#e7e7ea; }
  .top { background:rgba(15,18,22,.92); border-bottom-color:rgba(255,255,255,.12); }
  .tab.on, .ph, .ftext strong, .foot a, select, .stats span { color:#9cc4ff; }
  .prose h2 { border-bottom-color:rgba(255,255,255,.14); }
  .prose th, .prose td, .opt, .tile, .nav, .qa, select, .mini, .gmode button { border-color:rgba(255,255,255,.18); }
  .prose code, .stats span { background:rgba(255,255,255,.08); }
  .prose blockquote { background:rgba(201,162,39,.14); }
  .card { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.12); }
  .flash { background:rgba(121,176,255,.08); border-color:rgba(121,176,255,.25); }
  .qa[open] summary { background:rgba(121,176,255,.08); }
}
textarea { width:100%; font:inherit; font-size:1rem; padding:13px; border-radius:12px; border:1.5px solid rgba(0,0,0,.2); background:transparent; color:inherit; resize:vertical; line-height:1.45; margin-bottom:6px; }
.recing { background:#d92d20 !important; color:#fff !important; border-color:#d92d20 !important; }
.vgrade { background:rgba(31,157,85,.07); border-color:rgba(31,157,85,.3); }
.vgrade strong { color:#1f9d55; }
@media (prefers-color-scheme: dark) {
  textarea { border-color:rgba(255,255,255,.2); }
  .vgrade { background:rgba(31,157,85,.12); }
  .vgrade strong { color:#5fd498; }
}
</style>
</head>

<script>window.DATA={"learn":"# Understand It — ATS2640 in Four Ideas\n*The whole unit, the way the professor actually means it. Read this twice. If you get these four moves, you can talk about anything they ask — because you'll be reasoning, not reciting.*\n\n---\n\n## The mindset (read this first)\n\nThis is a **conversation**, not a memory test. The tutors are friendly. There is **no right answer** to any of these questions — thoughtful people land on both sides of every one. So the examiner isn't checking whether you got \"the\" answer. He's checking one thing:\n\n> Can you take a genuinely hard question, see why smart people disagree, **pick a side, and give an honest reason for it?**\n\nThat's the entire skill. It's why understanding beats memorising here: you can't fake reasoning in a back-and-forth — but if you actually *get* the four ideas below, you never have to fake anything. You just think out loud.\n\n**The only habit you need:** *\"My view is ___, because ___. The best objection is ___, but I'd still say ___.\"* That's not a script to perform — it's just what clear thinking sounds like.\n\n---\n\n## The whole unit in one breath\n\n> Morality **does** apply to war (move 1) → so what are the limits? → the deepest question under every limit is **do the ends justify the means** (move 2) → the most important limit is the line between **who you may and may not kill** (move 3) → and the unit ends by watching **new technology hollow out the human responsibility** that all those limits assume (move 4).\n\n*(Out loud, say it as four short sentences — don't try to recite the whole chain in one breath.)*\n\nEverything else — every reading, every week — is detail hanging off those four.\n\n---\n\n## MOVE 1 — Morality applies to war at all\n\n**The idea:** Before you can argue about *rules* for war, you have to beat the view that says there are none.\n\n**The tempting opposing view (realism):** War is about survival. The stakes are existential, the enemy won't play fair, so morality is a luxury you can't afford — \"all's fair in war.\" On this view, talking about ethics in war is naïve.\n\n**Why the unit rejects it:** If that were *really* true, you couldn't call **any** atrocity wrong — not My Lai, not Bucha, not the Holocaust. You could only say you personally *dislike* them. But we plainly *can* judge those things wrong, and mean it. So moral reasoning has real grip even in war.\n\n**The sharp distinction to keep:** realism is half-right. States often *do* act selfishly and amorally (that's **descriptive** realism — frequently true). The claim that fails is that they *should*, that morality simply doesn't apply (**prescriptive** realism) — because the moment you say a state \"should\" do anything, even \"should look after its own people,\" you're already making a moral claim. Realism smuggles ethics back in through the back door.\n\n**A view you could defend:** \"Realism is a useful warning about how power actually behaves, but it can't be the whole story — because we obviously *do* judge wars right and wrong, and we're right to.\"\n\n---\n\n## MOVE 2 — Ends vs means (the master key — this is 80% of everything)\n\n**The idea:** Almost every hard question in this unit is the same fight wearing a different costume. Learn to see the costume and you are never lost.\n\n**The two sides:**\n- **Consequentialism** — judge an act by its *results*. The right thing is whatever produces the best overall outcome (fewest deaths, most lives saved). → *\"Bomb the city if it ends the war faster and saves more lives on the whole.\"*\n- **Deontology** (its hard-line version is called *absolutism*) — some acts are *wrong in themselves*, whatever the results. There are lines you must never cross. → *\"You may never deliberately kill an innocent person, even to win the war.\"*\n\n**Why neither side wins outright — and this is the point:**\n- *Pure consequentialism* licenses monstrosities: if only outcomes matter, you could torture one innocent to please a crowd, or harvest one person's organs to save five. It has no word for \"you must *never*.\"\n- *Pure deontology* can become paralysis or self-righteousness: you let a catastrophe happen rather than dirty your own hands, as if keeping your conscience clean matters more than the people who die.\n\n**Where the unit actually lands:** Just War Theory is a **blend** — deontological *limits* (never deliberately target civilians) policed by consequentialist *checks* (the harm must be proportionate to the good). The real skill the unit teaches is reasoning about **where the lines should sit** when the two pull against each other.\n\n*One heads-up that examiners like to test: \"proportionality\" shows up in **both** halves of Just War Theory — weighing whether the whole **war's** good is worth its harm (deciding to fight = ad bellum), and whether a single **strike's** gain is worth its collateral damage (how you fight = in bello). Same word, two jobs — don't say \"it's an in bello thing\" if they ask which.*\n\n**Two power tools that live inside this fight (worth really getting):**\n- **Intention vs foresight.** There's a difference between *aiming* at a harm and merely *foreseeing* it as a side-effect. Deontologists think this matters enormously — it's the difference between murdering civilians and a strike that regrettably kills some.\n- **The Doctrine of Double Effect (DDE).** Built on that distinction: it can be OK to cause civilian deaths you *foresee* but don't *intend*, if they're a side-effect of a legitimate strike and the harm is proportionate. You may **never** make civilian deaths your *aim or your means*. (The honest objection: \"foreseen-not-intended\" is suspiciously convenient — you can't kill 50 civilians and just shrug \"didn't mean to.\")\n\n**The move that makes you sound like you get it:** on *any* hard question, say — *\"There's a consequentialist way to look at this and a deontological way. The consequentialist would say… the deontologist would object… and my own view is…\"* That single move is genuine understanding, not a trick.\n\n---\n\n## MOVE 3 — The line between who you may and may not kill\n\n**The idea:** Once you're fighting, the single most important rule is **distinction** — you may target combatants, but **never deliberately target civilians**. This is the moral heart of the laws of war.\n\n**The question the professor wants you chewing on — *why* are civilians off-limits?** Is it because they're:\n- **innocent** (morally blameless)? — but plenty of civilians cheer the war on,\n- **harmless** (not a threat)? — but a sleeping soldier is harmless too, and still a target,\n- **not responsible** for the threat? — this is the strongest answer, and the one most of the unit leans toward.\n\nWhy does this abstract question matter? Because it decides the **hard cases**: is a munitions-factory worker a legitimate target? A voter who put the war-government in power? A drone \"pattern of behaviour\"? How you ground civilian immunity decides all of these.\n\n**One genuinely deep wrinkle (McMahan's challenge):** maybe what makes you a target isn't your *uniform* but your **moral responsibility for an unjust threat**. If that's right, a soldier fighting for an *unjust* cause is more like an armed robber than an honourable equal — and a civilian who's deeply responsible for an atrocity might lose some of their immunity. This breaks the comfortable old idea (Walzer's) that all soldiers are \"moral equals\" who may simply kill each other.\n\n**Why this is the spine of the back half of the unit:** every hard case is really \"what happens to the civilian line under pressure?\"\n- **Terrorism** = *deliberately* attacking that line. That's what makes it terrorism, not just violence — it targets innocents *on purpose* to frighten everyone else.\n- **Nuclear weapons** = *erasing* the line by sheer scale — you can't incinerate a city and pretend you discriminated.\n- **Drones** = *blurring* the line — is a \"military-age male behaving suspiciously\" a combatant or a civilian?\n- **Robots** = *can a machine even draw the line?*\n\n**A view you could defend:** \"Civilian immunity rests on non-responsibility for the threat — and that's exactly why the modern cases are so hard: they all make it harder to tell who's responsible.\"\n\n---\n\n## MOVE 4 — Technology is removing the human from the act of killing (Sparrow's real thesis)\n\nThis is the examiner's own field, and it's where the whole unit has been heading. Get this and you understand what he most wants conveyed.\n\n**The idea:** killing has always been a grave, *human* act that someone is present for and answerable for. New technology is quietly stripping the human out of it — in two steps.\n\n**Step 1 — Drones: killing with no risk and no presence.** The operator sits safe in a trailer thousands of miles away. Two worries:\n- **War or execution?** Killing happens *outside* a declared battlefield — so is the target a *combatant* (killable in war) or a *criminal* (who should be arrested, not executed)? **Signature strikes** — killing people by their *behaviour pattern* without even knowing their names — are the hardest case.\n- **Asymmetry / riskless killing.** War has always involved *mutual* danger. When one side bears zero risk, is it still war — or is it closer to hunting or extermination? Does killing lose its moral seriousness when it costs you nothing? (The counter: protecting your own troops is obviously good — why is *safety* a problem?)\n\n**Step 2 — Autonomous weapons: no human even makes the decision.** Now the machine *itself* picks and kills the target. Sparrow's two arguments — these are the headline of the unit:\n- **The responsibility gap.** A core rule of just conduct is that *someone* can be fairly held responsible when a wrongful killing happens. But with a genuinely autonomous weapon, **no one qualifies**: not the *programmer* (couldn't predict the specific act), not the *commander* (didn't make the decision), not the *machine* (you can't blame or punish a machine). A killing that *no one* can answer for is illegitimate.\n- **Robots and respect.** Being killed by a machine that \"decided\" you should die **fails to respect you as a person** — no human moral agent ever weighed the gravity of ending your life. (Intuition pump: would it matter if your *brother* were killed by an autonomous robot rather than a human pilot? Most people feel it *would* — Sparrow says that feeling tracks a real wrong.)\n\n**The strongest counter — you MUST be able to give this (Arkin):** robots could be **more** ethical than human soldiers. No fear, no rage, no revenge, no panic — the very emotions behind atrocities like My Lai. A well-built machine could follow the rules of war *more* reliably than a terrified 19-year-old. If autonomous weapons would kill *fewer* civilians, then *refusing* to build them is the morally worse choice.\n\n**Sparrow's reply — and notice what it is:** even if the outcomes were genuinely better, that doesn't *fill the accountability hole* or *restore the dignity* of the person killed. → **This is just Move 2 again.** Arkin is the consequentialist (look at the outcomes — fewer deaths). Sparrow is the deontologist (some things are wrong regardless of outcomes — killing with no one responsible, killing without respect). The robot debate is the master key in a metal costume.\n\n**The big question the unit leaves you with:** as killing becomes cleaner, more precise, more automated — are we quietly making it *less morally accountable*? Is there a catastrophe hiding inside what looks like an improvement?\n\n---\n\n## The hard cases are all the master key in costume\n\n| Case | The consequentialist says… | The deontologist says… |\n|---|---|---|\n| **Hiroshima** | It ended the war and saved more lives than an invasion. | It deliberately incinerated a city of innocents — forbidden, full stop. |\n| **Nuclear deterrence** | The threat kept the peace for 80 years. | It requires *sincerely intending* to murder millions — and intending evil is already wrong. |\n| **Drone collateral deaths** | Precise; fewer civilians than the alternatives. | If the deaths are foreseen-not-intended *and* proportionate, maybe OK — but signature strikes cross the line. |\n| **Killer robots (Arkin v Sparrow)** | They'd kill fewer civilians — build them. | No one's responsible and no one's respected — don't. |\n\nSpot which costume the question is wearing, name both sides, take yours. Done.\n\n---\n\n## Five reflexes for any question they ask\n\n1. **\"Is this a *going-to-war* question or a *how-you-fight* question?\"** (jus ad bellum vs jus in bello — never mix them up; a war can be just to start but fought wrongly, and vice versa.)\n2. **\"Which way does the master key cut here — outcomes or rules?\"** Name both lines.\n3. **\"Is the civilian/combatant line being respected, broken, or blurred — and on what basis?\"**\n4. **\"Where's the line, and what's the case just on the other side of it?\"** (Showing you see the edge case = real understanding.)\n5. **\"So what do *I* think — and what's my one honest reason?\"** Always land the plane. An answer with no opinion loses marks even if everything in it is true.\n\n---\n\n## How to actually be in the room\n\n- **Think out loud.** \"Hmm, two ways to look at this…\" is a *good* sentence. They want to watch you reason, not hear a finished essay.\n- **Take a side, even a tentative one.** \"On balance I lean toward… because…\" beats \"it depends\" every time. You're allowed to change your mind mid-answer — that *shows* thinking.\n- **A name is a bonus, never a crutch.** Only drop one if you genuinely get the idea behind it (see `2-THE-SIX-NAMES.md`). A name you can't back up is a trap.\n- **If they push back, don't panic — that's the good part.** \"That's a fair challenge — I think I'd still say… but you're right that…\" Engaging honestly with the objection is *exactly* what scores.\n- **If you blank:** fall back to the master key. \"Well, there's an outcomes-based way to see this and a rules-based way…\" — and you're moving again.\n","flashcards":[{"front":"The two basic ways to judge ANY action?","back":"By **results** (more good than harm?) or by **rules** (some acts are just wrong, whatever the result).<br>↪ *Say:* \"This is fundamentally a clash between a **consequentialist** view — judge by outcomes — and a **deontological** (or **absolutist**) view — some acts are wrong in themselves.\"","sec":"START HERE — the master key"},{"front":"The war example that shows the clash.","back":"You could end a war by deliberately bombing a city of innocents. Results view: maybe okay, fewer deaths. Rules view: never.<br>↪ *Say:* \"The consequentialist weighs the outcome; the deontologist holds that deliberately killing the innocent violates an absolute constraint, whatever the gain.\"","sec":"START HERE — the master key"},{"front":"Weakness of judging only by results?","back":"It can justify monstrous things (harm one to please many) — there's no \"you must never.\"<br>↪ *Say:* \"Pure consequentialism leaves no room for inviolable rights — in principle it could license atrocity if the sums came out right.\"","sec":"START HERE — the master key"},{"front":"Weakness of judging only by rules?","back":"You might let a disaster happen just to keep your own hands clean.<br>↪ *Say:* \"Strict absolutism risks privileging your own moral purity over the people you could have saved.\"","sec":"START HERE — the master key"},{"front":"Meaning a harm vs just knowing it'll happen?","back":"Meaning it = your aim or method; knowing = an unwanted side-effect. Meaning it is far worse.<br>↪ *Say:* \"That's the **intention/foresight distinction** — and it's the engine of the **Doctrine of Double Effect**.\"","sec":"START HERE — the master key"},{"front":"The two separate questions about ANY war?","back":"(1) Was it right to **start** it? (2) Are they **fighting** it fairly? Judge each alone — one can be yes, the other no.<br>↪ *Say:* \"We keep **jus ad bellum** — the justice of going to war — independent from **jus in bello** — justice in how it's fought.\"","sec":"START HERE — the master key"},{"front":"Argument that morality doesn't apply to war?","back":"War is about survival; fight nicely while the enemy doesn't and you lose, so anything goes.<br>↪ *Say:* \"That's **realism** — Morgenthau and Bacevich — morality has no purchase in an anarchic international order.\"","sec":"Q2 Foundations"},{"front":"What's wrong with it?","back":"If true you couldn't call any atrocity wrong, only say you dislike it — but we clearly can.<br>↪ *Say:* \"Separate **descriptive** realism (states often do act self-interestedly) from **prescriptive** realism (they *ought* to) — and as **Orend** argues, saying a state 'should' do anything already smuggles morality back in.\"","sec":"Q2 Foundations"},{"front":"Argument that war is always wrong?","back":"Killing is always wrong, and/or war's costs always outweigh the good.<br>↪ *Say:* \"That's **pacifism** — Tolstoy — and I'd distinguish **absolute** pacifism from **contingent** pacifism (war just never pays).\"","sec":"Q2 Foundations"},{"front":"Best objection to pacifism?","back":"Treating all killing as equal blurs the line between killing a soldier and murdering a baby.<br>↪ *Say:* \"**Anscombe's** point in *War and Murder* — pacifism is *pernicious* because it erases the distinction between the combatant and the innocent, which can actually license atrocity.\"","sec":"Q2 Foundations"},{"front":"The middle view the unit uses?","back":"War is sometimes okay, but only if it passes strict tests in why it's started and how it's fought.<br>↪ *Say:* \"**Just war theory** — it blends deontological *limits* (never target the innocent) with consequentialist *checks* (proportionality).\"","sec":"Q2 Foundations"},{"front":"Main accepted reason to start a war?","back":"Self-defence — a country defends itself like a person fighting off an attacker.<br>↪ *Say:* \"**Walzer's legalist paradigm** — aggression against sovereignty justifies defensive war, by analogy with individual self-defence.\"","sec":"Q2 Foundations"},{"front":"The clever challenge to that?","back":"A person defends a life; a country often defends institutions or borders, not lives — the analogy strains.<br>↪ *Say:* \"**Rodin's reductivist challenge** — national self-defence can't be reduced to individual self-defence, so the standard justification for war is shakier than it looks.\"","sec":"Q2 Foundations"},{"front":"Other checks before starting a war?","back":"Genuine reason? more good than harm? last resort? real chance of success?<br>↪ *Say:* \"The rest of the **jus ad bellum** criteria — just cause, legitimate authority, right intention, proportionality, last resort, reasonable prospect of success.\"","sec":"Q2 Foundations"},{"front":"Invading to save foreigners — case FOR?","back":"A country's right to be left alone shouldn't shield mass murder.<br>↪ *Say:* \"The **Responsibility to Protect (R2P)** — **Annan's** 'sovereignty as responsibility': sovereignty lapses when a state slaughters its own people.\"","sec":"Q2 Foundations"},{"front":"Case AGAINST?","back":"\"We're just helping\" is easily an excuse, and interventions often backfire.<br>↪ *Say:* \"**Coady's** critique, and **Krasner's** line that sovereignty is 'organised hypocrisy' — with Libya as the cautionary case.\"","sec":"Q2 Foundations"},{"front":"The most important rule once fighting starts?","back":"Only deliberately attack fighters — never deliberately attack civilians.<br>↪ *Say:* \"The principle of **distinction** (discrimination) — **non-combatant immunity** is the heart of *jus in bello*.\"","sec":"Q2 Foundations"},{"front":"Why are civilians off-limits (3 candidate reasons)?","back":"They're innocent, OR harmless, OR not responsible for the threat (the last is strongest).<br>↪ *Say:* \"The three grounds for immunity — innocence, harmlessness, or non-responsibility — and the **Primoratz–Sparrow** debate turns on which one does the work.\"","sec":"Q2 Foundations"},{"front":"What really makes someone a fair target?","back":"Whether they're responsible for an unfair threat, not just the uniform.<br>↪ *Say:* \"**McMahan's liability** account — targetability tracks moral responsibility for an unjust threat, which rejects **Walzer's moral equality of combatants**.\"","sec":"Q2 Foundations"},{"front":"Can civilians ever die \"okay-ly\"?","back":"Yes, if it's an unwanted side-effect and proportionate; deliberate killing never.<br>↪ *Say:* \"The **Doctrine of Double Effect** — civilian deaths may be permissible if *foreseen but not intended*, and proportionate.\"","sec":"Q2 Foundations"},{"front":"The catch with \"I didn't mean to\"?","back":"It can be a cop-out — must be genuinely unintended and proportionate.<br>↪ *Say:* \"The standard objection to Double Effect — 'foreseen not intended' can be a self-serving redescription.\"","sec":"Q2 Foundations"},{"front":"What is terrorism, plainly?","back":"Deliberately attacking innocent people to frighten or pressure a wider group.<br>↪ *Say:* \"**Primoratz's** definition — deliberate violence against non-combatants to terrorise and coerce.\"","sec":"Q2 Foundations"},{"front":"Why is terrorism wrong?","back":"It targets innocents on purpose.<br>↪ *Say:* \"It's a direct violation of **non-combatant immunity / distinction**.\"","sec":"Q2 Foundations"},{"front":"Is terrorism always worse than war?","back":"Not obviously — war kills innocents too.<br>↪ *Say:* \"**Held's** challenge — judge terrorism by the *same* standard as war; on a consistent standard it isn't automatically worse.\"","sec":"Q2 Foundations"},{"front":"Can a government be a terrorist?","back":"Yes.<br>↪ *Say:* \"Terrorism isn't only non-state — there's **state terrorism** too.\"","sec":"Q2 Foundations"},{"front":"What does \"an evil weapon\" mean?","back":"Wrong by its very nature, not just for the damage — poison gas, torture.<br>↪ *Say:* \"**Mala in se** — evil in itself — a charge only a deontologist can really make; **Nagel** frames it as absolutism vs utilitarianism in *War and Massacre*.\"","sec":"Q2 Foundations"},{"front":"Why are nukes such a hard case?","back":"Can't tell soldiers from civilians, can't be contained, wipe out whole cities.<br>↪ *Say:* \"They breach **distinction** and **proportionality** at once, and are arguably **mala in se** — they stress every *jus in bello* principle simultaneously.\"","sec":"Nuclear weapons"},{"front":"Are nukes \"evil in themselves\"?","back":"Strong yes — you can't use a big one without massacring innocents.<br>↪ *Say:* \"Strategic nuclear weapons are arguably *mala in se* — they cannot *in principle* satisfy distinction or proportionality, so they're intrinsically unusable within just war theory.\"","sec":"Nuclear weapons"},{"front":"The \"threaten vs do\" puzzle?","back":"Peace by threat only works if you'd really do it — but doing it is mass murder.<br>↪ *Say:* \"The **deterrence paradox** — can it be ethical to *threaten* (a sincere **conditional intention**) what it would be unethical to actually *do*?\"","sec":"Nuclear weapons"},{"front":"Why is that the rules-vs-results clash?","back":"Results: the threat kept peace. Rules: intending to murder millions is wrong.<br>↪ *Say:* \"It turns entirely on intention vs act — the consequentialist defends the outcome, the deontologist condemns the standing intention.\"","sec":"Nuclear weapons"},{"front":"A surprising doubt?","back":"Nukes may not actually keep peace; the bomb may not have ended WWII.<br>↪ *Say:* \"**Ward Wilson's** 'Gordian Knot' — deterrence may not work, and the Soviet invasion (not Hiroshima) may have caused Japan's surrender — so even the consequentialist defence is shaky.\"","sec":"Nuclear weapons"},{"front":"Basic worry about a drone killing?","back":"Off the battlefield — is it war (killing an enemy is allowed) or execution without trial?<br>↪ *Say:* \"**Targeted killing** blurs armed conflict with law enforcement — warfare or **extrajudicial execution**?\"","sec":"Drones / targeted killing"},{"front":"The worst version?","back":"Killing by behaviour pattern without knowing who they are.<br>↪ *Say:* \"**Signature strikes** — targeting by 'pattern of life', not confirmed identity.\"","sec":"Drones / targeted killing"},{"front":"The \"zero risk\" worry?","back":"No danger to you — it looks like hunting, and makes war too easy.<br>↪ *Say:* \"The problem of **asymmetric / riskless war** — **Sparrow** questions whether killing without mutual risk still counts as war.\"","sec":"Drones / targeted killing"},{"front":"Case FOR drones?","back":"Precise, fewer civilian deaths than the alternatives, protects your troops.<br>↪ *Say:* \"**Byman's** 'Why Drones Work' — precision and force-protection.\"","sec":"Drones / targeted killing"},{"front":"Case AGAINST drones?","back":"Civilian deaths radicalise populations and create more enemies.<br>↪ *Say:* \"**Boyle's blowback** argument — drone campaigns are strategically counter-productive.\"","sec":"Drones / targeted killing"},{"front":"Killer robot vs drone?","back":"A robot picks and kills its own targets; a drone still has a human firing.<br>↪ *Say:* \"**Autonomous weapon systems (AWS)** select and engage targets *without meaningful human control*.\"","sec":"Killer robots"},{"front":"The \"no one's responsible\" argument?","back":"If it kills wrongly, no one's fairly to blame — not programmer, commander, or machine.<br>↪ *Say:* \"**Sparrow's responsibility gap** — *jus in bello* requires someone be justly answerable for a wrongful killing, and with a truly autonomous weapon no one qualifies, so its use is illegitimate.\"","sec":"Killer robots"},{"front":"The \"disrespect\" argument?","back":"Being killed by a machine that \"decided\" treats your life as not mattering.<br>↪ *Say:* \"**Sparrow's 'Robots and Respect'** — being killed by a machine fails to respect your **moral status** as a person; no human agent weighs the gravity of your death.\"","sec":"Killer robots"},{"front":"Strongest argument FOR?","back":"Machines don't panic, rage, or seek revenge, so might kill fewer civilians.<br>↪ *Say:* \"**Arkin's** 'The Case for Ethical Autonomy' — an **'ethical governor'** could obey the laws of war more reliably than a frightened soldier (cf. My Lai); if AWS kill fewer civilians, refusing them is the worse choice.\"","sec":"Killer robots"},{"front":"How does Sparrow answer Arkin?","back":"Even fewer deaths leaves no one accountable and no respect.<br>↪ *Say:* \"Better outcomes don't fill the accountability gap or restore dignity — that's the deontological reply to Arkin's consequentialism.\"","sec":"Killer robots"},{"front":"Why does this topic matter most?","back":"It's the examiner's own field.<br>↪ *Tip:* name **Sparrow's two arguments** (responsibility gap; robots & respect) and **Arkin** as the counter — that alone shows you've read the W11 texts.","sec":"Killer robots"},{"front":"The one link behind most synthesis questions?","back":"\"Rules vs results\" in a new outfit each time.<br>↪ *Say:* \"The consequentialism/deontology clash recurs throughout — the deterrence paradox and the Arkin–Sparrow debate are structurally the same argument.\"","sec":"Q3 synthesis"},{"front":"\"Only attack fighters\" applied to nukes?","back":"A nuke can't aim at fighters only — it breaks the rule by its nature.<br>↪ *Say:* \"Apply **distinction** to W9 — nuclear weapons are inherently indiscriminate, which is the route to calling them *mala in se*.\"","sec":"Q3 synthesis"},{"front":"The \"side-effect\" rule applied to drones?","back":"Are drone deaths a real accident, or are signature strikes too reckless?<br>↪ *Say:* \"Apply **Double Effect** to W10 — are civilian deaths a proportionate foreseen side-effect, or effectively *intended* through recklessness about identity?\"","sec":"Q3 synthesis"},{"front":"Who's a fair target — applied to drones?","back":"A fair target is whoever's responsible for the threat, not who fits a pattern.<br>↪ *Say:* \"**McMahan's liability** vs signature strikes — killing by pattern-of-life severs targetability from established responsibility.\"","sec":"Q3 synthesis"},{"front":"Does \"no risk\" link fighting back to starting?","back":"Riskless war makes starting a war too cheap.<br>↪ *Say:* \"Asymmetry (W10/11) feeds back into *jus ad bellum* — it erodes last resort and lowers the threshold of war.\"","sec":"Q3 synthesis"},{"front":"Deterrence defended like a \"survival\" argument?","back":"A survival-first view defends it; the rules view says survival can't justify a plan to murder millions.<br>↪ *Say:* \"A realist (W3) might defend deterrence on *raison d'état*; the deontologist replies that survival can't license a standing conditional intention to commit mass murder.\"","sec":"Q3 synthesis"},{"front":"The shape of a good answer?","back":"Opinion → reason → best objection → reply → example.<br>↪ *Say it aloud:* \"My view is… because… The strongest objection would be… but I'd still hold that… For instance…\"","sec":"The exam habit"},{"front":"What the marker most wants?","back":"A clear position + a reason; there's no \"right\" answer.<br>↪ *Tip:* the rubric explicitly rewards **taking an intellectual position** and **supporting it with reasoned argument** — never fence-sit.","sec":"The exam habit"},{"front":"Rescue move if stuck?","back":"Ask: start-or-fight? results-or-rules?<br>↪ *Say:* \"Is this a *jus ad bellum* or a *jus in bello* question — and does it turn on consequences or on constraints?\"","sec":"The exam habit"},{"front":"**Sparrow** (examiner)","back":"Killer robots: the **responsibility gap** + **'Robots and Respect'**; also sceptical of riskless/asymmetric war.","sec":"Who said what — quick map"},{"front":"**Arkin**","back":"Pro killer robots — the **'ethical governor'** could be more humane than soldiers.","sec":"Who said what — quick map"},{"front":"**Walzer**","back":"The **legalist paradigm** (self-defence) + **moral equality of combatants**.","sec":"Who said what — quick map"},{"front":"**McMahan**","back":"**Liability** — responsibility, not the uniform, makes you a target (rejects Walzer).","sec":"Who said what — quick map"},{"front":"**Rodin**","back":"The **reductivist challenge** — national ≠ individual self-defence.","sec":"Who said what — quick map"},{"front":"**Primoratz**","back":"Defines **terrorism** (deliberate violence on the innocent) + responsibility-based immunity.","sec":"Who said what — quick map"},{"front":"**Held**","back":"Judge terrorism by the **same standard** as war.","sec":"Who said what — quick map"},{"front":"**Nagel**","back":"**Absolutism vs utilitarianism** (*War and Massacre*) — the master clash, + Double Effect.","sec":"Who said what — quick map"},{"front":"**Anscombe**","back":"Attacks pacifism as **pernicious** (*War and Murder*); defends just war + Double Effect.","sec":"Who said what — quick map"},{"front":"**Ward Wilson**","back":"Doubts nuclear **deterrence** works; the Soviet invasion (not the bomb) may have ended WWII.","sec":"Who said what — quick map"},{"front":"**Byman (pro) / Boyle (anti)**","back":"Drones: precision/force-protection **vs** strategic **blowback**.","sec":"Who said what — quick map"},{"front":"**Annan (R2P) / Coady (critique)**","back":"Humanitarian war: 'sovereignty as responsibility' **vs** easily abused.","sec":"Who said what — quick map"},{"front":"**Morgenthau / Bacevich; Orend**","back":"Realism **vs** the just-war rebuttal of it. · **Tolstoy** — pacifism.","sec":"Who said what — quick map"}],"practice":[{"group":"Q1","topic":"Nuclear weapons","questions":[{"question":"Are nuclear weapons mala in se -- evil in themselves -- or just very destructive?","points":["Stance: I think strategic nuclear weapons are arguably mala in se -- not just powerful, but wrong in themselves to use.","Main reason: a weapon is mala in se when you literally cannot use it without doing something intrinsically forbidden -- and you can't drop a city-busting nuke without killing huge numbers of innocent civilians, so it fails distinction and proportionality by its very nature.","Contrast with 'just destructive': a thousand-pound bomb is terrible but in principle you can aim it at a tank column; a strategic nuke's blast, fire and radiation can't be contained to combatants -- the indiscriminateness is baked in.","Other side: a defender might say it's the USE that's wrong, not the object -- a tiny tactical nuke on an isolated fleet at sea might in theory hit only combatants, so the weapon isn't intrinsically evil.","Reply: even granting that edge case, the weapons that actually exist and matter strategically are city-killers, and the radiation lingers for generations and crosses borders, so realistically they can never satisfy the in bello rules.","Term/thinker to drop: this is a deontological verdict -- mala in se sits alongside poison gas and torture, things Nagel in 'War and Massacre' would say absolutism forbids whatever the outcome.","Closing line: so my view is they're best understood as intrinsically unusable within just war theory -- evil in themselves, not merely big."]},{"question":"Can it be ethical to THREATEN to do something it would be unethical to actually do? (the deterrence paradox)","points":["Stance: this is the deterrence paradox, and my view is the threat is tainted by the act -- if actually incinerating cities is murder, then sincerely intending to do it is also morally compromised.","Main reason: deterrence only works if the threat is sincere -- you have to genuinely intend to retaliate, and forming a real intention to do something monstrous is itself a moral act, not a free pass.","The puzzle stated plainly: that's exactly Reflective Exercise 9.2 -- how can it be wrong to DO X but fine to form a firm conditional intention to do X?","Other side: the consequentialist says judge it by results -- if the threat is never carried out and it keeps the peace for decades, then threatening saved millions of lives, so the intention is justified by what it prevents.","Reply: but you're either bluffing -- in which case it's not real deterrence -- or you genuinely mean it, in which case you're a leader prepared to murder millions, and that conditional intention corrupts you whether or not the button is ever pushed.","Term/thinker to drop: this is the conditional-intention problem -- Kavka and Gauthier territory -- and it cuts cleanly along consequentialist (outcomes) versus deontological (the intention itself matters) lines.","Closing line: so I'd say deterrence forces you to choose between being ineffective and being willing to commit mass murder -- and that's a deeply uncomfortable place to stand."]},{"question":"Does nuclear deterrence even work -- and does it matter morally whether it does?","points":["Stance: I'm sceptical that deterrence works as cleanly as the standard story claims -- and that scepticism really weakens the moral case for keeping nukes.","Main reason: the whole justification for nuclear weapons is consequentialist -- 'they keep the peace' -- so if they DON'T actually deter, the main argument for tolerating these mala in se weapons collapses.","Key thinker: Ward Wilson in 'The Gordian Knot' challenges the standard story -- he argues nuclear weapons may not really deter, and that it was the SOVIET invasion, not Hiroshima, that actually forced Japan's surrender.","Why that bites: if even Hiroshima -- the textbook case -- didn't do the work we credit it with, then the empirical foundation of deterrence theory is shakier than everyone assumes.","Other side: defenders point to the long peace -- no great-power war since 1945, no nukes used in anger -- and say that track record is no accident, MAD made superpowers cautious.","Reply plus risk: correlation isn't proof, and Schlosser on 'World War Three by Mistake' shows how many near-accidents there have been -- deterrence also carries a permanent risk of catastrophe by error.","Closing line: so morally it matters enormously whether it works -- if the consequentialist payoff is illusory, you're left holding an intrinsically wrongful weapon for nothing."]},{"question":"Was the bombing of Hiroshima ever justifiable?","points":["Stance: I lean towards saying Hiroshima was NOT justifiable -- it deliberately targeted a city full of civilians, which is exactly what jus in bello forbids.","Main reason: distinction and non-combatant immunity say you may only target combatants, and a city is overwhelmingly non-combatants -- so this was the intentional mass killing of innocents, not collateral damage.","The standard defence: the consequentialist case is that the bomb ended the war fast and prevented a bloody invasion that would have cost far more lives on both sides -- fewer deaths overall.","Reply on the facts: Ward Wilson disputes even this -- he argues the Soviet entry into the war, not the bomb, actually triggered the surrender, so the lives-saved calculation may rest on a myth.","Reply on principle: even if it did save lives, an absolutist like Nagel would say you still can't deliberately incinerate a hundred thousand civilians to achieve it -- some acts are off the table whatever the maths.","Thinker to drop: Glover in 'Humanity' treats Hiroshima as a moral turning point -- the moment restraints on killing the innocent eroded -- which frames it as a fall, not a triumph.","Closing line: so my honest view is it might have been militarily effective and still morally wrong -- effectiveness doesn't launder the deliberate killing of the innocent."]},{"question":"Is it worse to die of radiation poisoning than of blood poisoning from shrapnel? (Reflective Exercise 9.1)","points":["Stance: my gut says radiation death feels specially horrifying, but when I think it through I'm not sure that intuition tracks a real moral difference.","The probe's point: this is Reflective Exercise 9.1, and it's testing whether there's something UNIQUELY wrong about nuclear death or whether we're just scope-blind and spooked by the unfamiliar.","Case for a difference: radiation is invisible, lingering, it harms unborn generations and contaminates land for decades -- it keeps killing long after the war ends, which shrapnel doesn't.","Case against a difference: dead is dead -- a soldier bleeding out from an infected shrapnel wound suffers just as much, so maybe we're inconsistent, recoiling at the new horror while accepting the familiar one.","Where it actually bites: the real moral wrong of nukes isn't the MANNER of death but WHO dies -- the indiscriminate killing of non-combatants -- so focusing on radiation-versus-shrapnel can distract from the distinction problem.","Term to drop: this connects to mala in se -- if radiation's uncontainable, cross-generational reach is what makes the weapon impossible to use proportionately, then the manner of death does feed back into intrinsic wrongness.","Closing line: so I'd say the special horror is partly real -- the lingering, borderless harm -- but the deeper wrong is still that nukes can't tell combatant from child."]},{"question":"Do tactical nuclear weapons change the moral picture, or are all nukes the same?","points":["Stance: tactical nukes complicate the easy 'all nukes are mala in se' line, but I still think the moral picture stays grim.","The distinction: strategic nukes are city-busters meant for deterrence and mass destruction; tactical nukes are smaller, battlefield weapons -- so in principle a tactical nuke aimed at a tank division in a desert might mostly hit combatants.","Why that matters: if a weapon CAN in principle satisfy distinction and proportionality, it's harder to call it intrinsically evil -- the wrong would be in the use, not the object, so the mala in se verdict weakens for the small end.","Other side -- the escalation problem: the real danger is that using ANY nuke shatters the nuclear taboo and invites tit-for-tat escalation up to strategic exchange, so even a 'clean' tactical strike risks the unthinkable.","Reply: that's a partly consequentialist worry about thresholds -- lowering the bar to first use -- and it means even militarily 'usable' nukes carry a catastrophic tail risk that a conventional weapon doesn't.","Term to drop: Quester is relevant here on whether you could substitute conventional for nuclear weapons -- if you can achieve the same military aim conventionally, the proportionality case for ANY nuke gets much harder to make.","Closing line: so tactical nukes blur the mala in se line, but the escalation risk drags the moral verdict right back towards 'don't'."]},{"question":"Is keeping a nuclear arsenal compatible with just war theory at all?","points":["Stance: I think it sits in deep tension with just war theory -- you're maintaining weapons you arguably could never justly USE.","Main reason: just war's in bello rules require distinction and proportionality, and strategic nukes fail both by design, so a JWT purist has to say the arsenal is built around an unusable weapon.","The deterrence wrinkle: but the whole point isn't to use them -- it's to threaten, to deter -- which is why this collapses straight into the deterrence paradox of intending what you must never do.","Other side: a realist like Morgenthau would say this is naive -- states exist in anarchy, security is survival, and you keep nukes because rivals have them, morality of war theory doesn't get a vote.","Reply: that's descriptive realism, not a justification -- Orend would push back that 'everyone does it' doesn't make it right, and JWT is exactly the framework for judging these choices morally.","Honest middle: many theorists land on a reluctant, conditional toleration -- deterrence as a temporary necessary evil pending disarmament -- which is more an uneasy truce with JWT than a clean fit.","Closing line: so my view is the arsenal is at best a deeply uncomfortable exception JWT tolerates rather than endorses -- and that discomfort should push towards reduction, not complacency."]},{"question":"If launching nukes is wrong, is the leader who builds a deterrent doing something wrong right now -- even in peacetime?","points":["Stance: I'd argue yes -- if the act would be wrong, a leader who genuinely intends to do it under conditions is already morally implicated, even before anyone fires.","Main reason: deterrence requires a SINCERE conditional intention -- the leader has to truly be prepared to incinerate millions if attacked -- and forming that settled intention is itself a morally serious act, not a neutral policy.","Plain version: a person who genuinely resolves 'if you hit me, I will murder your children' is already in a corrupt moral state, even if the trigger condition never arrives.","Other side: the consequentialist replies that what matters is outcomes, and if the threat keeps the peace and is never executed, then the standing intention has produced only good -- so blame is misplaced.","Reply: but you can't have the good outcome WITHOUT the genuine willingness -- a known bluff doesn't deter -- so the peace is purchased precisely by leaders being authentically ready to do the monstrous thing.","Term/thinker to drop: this is the conditional-intention problem again -- Kavka's puzzle -- and it shows deterrence can't separate clean hands from dirty intentions the way defenders want.","Closing line: so my answer is that nuclear deterrence implicates its wielders morally in peacetime -- the wrong of the act seeps back into the standing threat that makes it work."]}]},{"group":"Q1","topic":"Drones & targeted killing","questions":[{"question":"Is targeted killing by drone more like an act of war, or more like an extrajudicial execution? Where do you land?","points":["My view: it sits in an uncomfortable grey zone, but most drone strikes are best understood as closer to execution than war, because they usually happen OUTSIDE a declared armed conflict against a named individual.","The core distinction: in war you're allowed to kill enemy combatants on sight; in law enforcement you must arrest and try a criminal, not execute them. Targeted killing collapses that line.","Why it matters which one it is: if it's 'war', the just war rules (distinction, proportionality) apply and killing combatants is legitimate; if it's 'crime', you owe the target due process and you've skipped the courts.","The other side: defenders say modern terrorists ARE combatants in a real, ongoing armed conflict, just not one with front lines or uniforms, so it genuinely is warfare and the war rules apply.","My reply: even granting that, the fact it happens far from any battlefield, against someone who poses no immediate threat at the moment of the strike, makes it look much more like a premeditated killing of a specific person, which is what 'execution' means.","Definition to nail: targeted killing = the intentional, premeditated killing of a specific named individual by a state, typically outside a formally declared armed conflict, increasingly via drones (Coll's 'The Unblinking Stare' documents this reality in Pakistan).","Closing line: the deepest problem is that the technology lets states have it both ways, claiming the permissions of war while dodging the accountability of the courtroom."]},{"question":"What, if anything, is morally wrong with so-called signature strikes?","points":["My view: signature strikes are the most ethically indefensible part of the whole drone programme, because you're killing people whose identity you don't even know.","First, the definition: a signature strike targets people based on a 'pattern of life' or pattern of behaviour, military-age males meeting in a certain way, carrying weapons, rather than a confirmed identity, unlike a 'personality strike' on a named individual.","The main problem: the principle of distinction requires you to be sure your target is a legitimate combatant, and a behavioural 'signature' is just a guess that can sweep up wedding parties, tribal gatherings, or men carrying rifles for ordinary reasons in that region.","It also wrecks the combatant/criminal question from the other angle: you can't even ask whether they should be arrested rather than killed if you don't know who they are.","The other side: defenders argue that in practice you can almost never get a confirmed ID on a battlefield, and that the behavioural patterns are reliable enough to count as evidence someone is part of an armed group.","My reply: 'reliable enough' is a consequentialist gamble with innocent lives, and the burden of proof in killing should be on certainty, not on probability, which is exactly what distinction demands.","Thinker to drop: this connects to McMahan on liability, what makes you a legitimate target is your moral responsibility for an unjust threat, not your uniform or your demographic, and a 'signature' tells you almost nothing about responsibility.","Closing line: if you wouldn't convict someone in a court on a 'pattern of life', you certainly shouldn't kill them on one."]},{"question":"Drone warfare is radically asymmetric, the operator is in zero physical danger. Does that riskless quality raise a distinct moral problem?","points":["My view: yes, there's something genuinely troubling about riskless killing, and I'd side with Sparrow's scepticism here rather than dismissing the worry.","The plain version of the worry: warfare has traditionally involved mutual risk, two sides both putting themselves in harm's way; when one side faces zero danger, it starts to look less like a fight and more like an execution or even a hunt.","Why this might be a real moral problem: the willingness to risk your own life is part of what has historically justified taking life in war, and the courage and sacrifice that ennobled the soldier disappears when you're killing from an air-conditioned trailer.","It also lowers the threshold for war: if no body bags come home, leaders find it far too easy to start and prolong killing, which ties straight back to jus ad bellum, last resort and prospect of success.","The other side: force protection is a genuine moral good, you have a duty to your own soldiers' lives, and there's nothing noble about getting your people killed just to make the fight 'sporting'.","My reply: protecting your troops is fine, but the deeper unease isn't really about fairness to the enemy, it's that risk-free killing erodes the seriousness and restraint that should surround taking a human life.","Concrete probe to mention: Reflective Exercise 10.2 asks whether Australian SAS should remove their body armour to make the fight 'fair', which is obviously absurd, and that absurdity shows the worry isn't really about fairness but about what risk-free killing does to us.","Closing line: the asymmetry isn't wrong because it's unfair to terrorists, it's worrying because it makes war cheap, easy, and detached from its true gravity."]},{"question":"Daniel Byman argues 'Why Drones Work'. What's his case, and is he right?","points":["My view: Byman makes a strong consequentialist case and on precision he's partly right, but he understates the second-order costs, so 'they work' is too quick.","Byman's core claim: drones are the most precise weapon we have, they let you kill specific high-value terrorists while minimising both civilian deaths and risk to your own troops, compared to the brutal alternatives like full invasions, occupations, or letting Pakistan's army shell whole regions.","The force-protection point: you decapitate terrorist leadership, disrupt their planning, and you do it without putting a single soldier's life on the line, which on a pure cost-benefit view looks like an ethical win.","Why this is appealing: if the realistic alternative to a drone strike is a far bloodier ground operation or no action at all, then the drone genuinely is the least-harm option, and refusing it could cost more innocent lives.","The other side (Boyle): this ignores strategic blowback, every civilian death radicalises families and communities, breeds new recruits, and corrodes the legitimacy of the government you're propping up, so drones can be counter-productive and create more enemies than they kill.","My reply / where I land: Byman wins on the narrow tactical question (drones ARE precise relative to a B-52), but Boyle wins on the strategic one, precision at the point of impact doesn't redeem a programme that makes you less safe over a decade.","Term to drop: this is a classic consequentialist disagreement, both Byman and Boyle judge drones by outcomes, they just disagree about which outcomes (immediate kills vs long-run radicalisation) dominate.","Closing line: drones 'work' as a weapon, the real question Byman doesn't settle is whether the war they enable works as a strategy."]},{"question":"Walk me through the cafe cruise-missile case: you can fire a missile at a group of terror plotters in a London cafe, but it'll kill 12 innocent bystanders, or you can let them escape. How do you reason it?","points":["Opening move: I wouldn't just blurt yes or no, I'd reason it through with the two key tools, proportionality and the doctrine of double effect, because that's what the case is testing.","First, double effect: the deaths of the bystanders must be foreseen but NOT intended, not your aim and not your means; you're aiming at the plotters and the 12 deaths are a tragic side-effect, not the point of the strike.","Second, proportionality: even an unintended side-effect has to be worth it, so I'd weigh the harm prevented (how certain and how catastrophic is the plot?) against the certain harm caused (12 dead innocents).","The numbers matter but aren't decisive: 12 confirmed innocent deaths to stop a vague, uncertain plot fails proportionality, whereas 12 deaths to stop the certain detonation of a dirty bomb in a city might pass it, so I'd press on how imminent and how serious the threat really is.","Last resort and necessity: is killing genuinely the only option? A cafe in London means police, arrest, and surveillance are realistically available, which is exactly why this looks more like law enforcement than war, and that pushes me hard toward NOT firing.","Where I land: in the case as stated, a London cafe with 12 certain civilian deaths and an arrest plausibly on the table, I'd say don't fire, the proportionality and last-resort tests both fail.","Thinker / contrast to drop: a strict deontologist or absolutist like Nagel would say killing 12 innocents as a side-effect can still be impermissible regardless of the good outcome, while a utilitarian would just run the numbers, naming that clash shows I see the deeper theory fight underneath.","Closing line: the case is really a test of whether you can show your working, the answer matters less than reasoning aloud through intention, proportionality, and last resort."]},{"question":"The August 2021 Kabul drone strike killed ten civilians, including seven children, instead of an ISIS-K bomber. What does that case tell us about the ethics of drone warfare?","points":["My view: the Kabul strike is the clearest real-world illustration that drone 'precision' is a myth at the level that actually matters, the intelligence, not the missile.","What happened, briefly: in the chaotic final days of the Afghanistan withdrawal, the US tracked a car they believed carried an ISIS-K suicide bomber, struck it, and it turned out to be an aid worker, Zemari Ahmadi, ferrying water, ten civilians died including seven children.","The principle in play: this is a failure of distinction and of precautions in attack, even if the weapon hits exactly what it's aimed at, you've murdered the wrong people if your identification is wrong.","Why it punctures the Byman defence: defenders sell drones as surgically precise, but precision of the warhead is worthless when the 'pattern of life' analysis (jerry cans read as bomb components, normal movements read as hostile) is built on confirmation bias and time pressure.","It also showcases the asymmetry problem: operators thousands of miles away, under pressure, with grainy footage, made a fatal call about people they never really saw, no human on the ground to sanity-check it.","The accountability angle: notably, no one was disciplined, which previews Sparrow's responsibility-gap worry from Week 11, even with a human in the loop, real accountability for these killings is thin to non-existent.","Term to drop: this is a breach of 'precautions in attack', the in-bello duty to take feasible steps to verify your target and avoid civilians, and double effect can't excuse it because the bystanders weren't even a side-effect of hitting a real target, the target itself was innocent.","Closing line: Kabul shows the hardest problem in drone war isn't the trigger, it's the certainty behind it, and that certainty was catastrophically false."]},{"question":"Boyle warns of 'blowback' from drone strikes. Is the blowback argument a knockdown objection, or can a defender of drones answer it?","points":["My view: blowback is the single strongest objection to the drone programme, but it's an empirical claim, so it's powerful rather than strictly knockdown.","Boyle's argument: drone strikes, especially ones that kill civilians, radicalise the victims' families and communities, generate propaganda for the enemy, and erode the legitimacy of the local government, so over time you create more terrorists than you eliminate, it's counter-productive.","Why this bites so hard: it beats the defenders on their own turf, the whole pro-drone case from Byman is consequentialist ('fewer deaths, safer outcomes'), and Boyle says fine, let's count ALL the consequences, including the long-run ones, and now you're losing.","The defender's reply: blowback is hard to measure, you can't easily prove the strike created more enemies than the bomber it stopped would have killed, and maybe the radicalisation would have happened anyway, so the empirical case is contestable.","A second defender move: target selection and tighter rules could reduce civilian deaths and therefore reduce blowback, so the objection counts against bad drone practice, not drones as such (this echoes the 'in principle vs in practice' distinction, Dige).","My reply / where I land: even if blowback can't be proven to the last decimal, the strategic logic is compelling and matches what we saw in Pakistan, the burden should be on the state doing the killing to show it's NOT counter-productive, and it can't.","Thinker contrast to drop: Byman vs Boyle is the set-piece debate, both consequentialists, disagreeing about whether immediate tactical wins or long-run strategic costs dominate, naming that frames the whole question.","Closing line: blowback turns the drone advocates' own scoreboard against them, and that's why it's the objection they most need to answer and least can."]},{"question":"Defenders say drones are more discriminate and cause less harm than the alternatives, so refusing to use them is the immoral choice. How do you respond?","points":["My view: this 'lesser evil' argument has real force, but it smuggles in a loaded comparison and ignores costs that don't show up in the immediate body count.","The argument stated fairly: compared to carpet-bombing, artillery, or a full ground invasion, a drone strike kills far fewer civilians and risks no friendly troops, so if you're going to use force at all, drones are the most humane option and squeamishness about them costs lives.","Why it's tempting: it's a clean consequentialist case, on the narrow comparison the drone genuinely does minimise harm, and there's a real moral duty not to use more destructive means than necessary (the necessity principle).","First problem, the false menu: the choice is rarely 'drone strike vs invasion', it's often 'drone strike vs arrest, surveillance, or doing nothing', and once you widen the options, the drone is no longer obviously the least-harm path.","Second problem, it lowers the threshold of war: precisely because drones are cheap, riskless, and 'clean', they make killing the default first resort rather than a last resort, so the technology expands the total amount of killing even as it makes each strike smaller.","Third problem, the long run: Boyle's blowback means today's 'fewer deaths' can produce tomorrow's larger conflict, so the lesser-evil maths only works if you stop counting early.","Term / thinker to drop: this is a pure consequentialist 'minimise harm' argument, and the deontological reply is that some considerations, due process, accountability, the wrongness of executing people outside war, aren't cancelled just by a lower casualty count, which is the same structure as the Arkin vs Sparrow fight in Week 11.","Closing line: drones may be the lesser evil in a fixed two-option scenario, but their real danger is that they quietly create the very scenarios in which more killing looks reasonable."]}]},{"group":"Q1","topic":"Autonomous weapons / killer robots","questions":[{"question":"Explain Sparrow's 'responsibility gap' argument against autonomous weapons. Is it convincing?","points":["Stance: I find the responsibility-gap argument convincing — autonomous weapons should be banned because they kill people while leaving no one who can justly answer for it.","The core reason: a basic rule of fighting justly (jus in bello) is that if a wrongful killing happens, SOMEONE must be able to be held responsible for it — that's part of treating killing with the seriousness it deserves.","Sparrow's move: with a genuinely autonomous machine that picks its own targets, no one fits the bill — the programmer couldn't predict that specific act, the commander didn't make the decision, and you obviously can't blame or punish the machine itself.","So there's a 'gap' where responsibility should be — and using such a weapon is therefore illegitimate.","Strongest objection: maybe we just assign responsibility by rule — say the commander 'owns' whatever the machine does, like a CO is responsible for their troops. Sparrow's reply: that's unfair if the machine genuinely acted in a way the commander couldn't foresee or control — you'd be scapegoating someone for a choice they didn't make.","Concrete hook: the 2021 Kabul drone strike killed 10 civilians and almost no one was held accountable even WITH a human deciding — now imagine removing the human entirely; the gap gets worse.","Term/thinker to drop: this is Sparrow's argument from 'Killer Robots' / 'Robotic weapons and the future of war'; the precise label is the 'responsibility gap'.","Closing line: the deeper point is that responsibility isn't a nice add-on to warfare — it's part of what makes killing in war morally tolerable at all, so a weapon that erases it is wrong even if it's accurate."]},{"question":"Arkin says robots could actually be MORE humane than human soldiers. How does Sparrow respond, and who's right?","points":["Stance: Arkin makes a real point about outcomes, but I side with Sparrow — better statistics don't settle the moral question.","Arkin's case ('The Case for Ethical Autonomy'): robots feel no fear, anger, revenge or self-preservation, so an 'ethical governor' could follow the laws of war more reliably than scared, exhausted soldiers — and if they kill FEWER civilians, refusing to build them is the immoral choice.","Why that's powerful: human soldiers commit atrocities — My Lai is the classic case — precisely because of panic and rage that a machine doesn't have.","Sparrow's reply — this is a consequentialist argument, and his objections are deontological: even if the body-count is lower, it doesn't fill the responsibility gap (no one answers for the killings) and it doesn't restore the respect owed to the person being killed.","The clean way to frame it: it's the basic consequentialism-versus-deontology fight wearing a robot costume — outcomes versus the rightness of the act and who's accountable.","My judgement: I lean Sparrow, but honestly Arkin's challenge bites — if machines really did slash civilian deaths, a pure rules-based 'never' starts to look callous, so the responsibility/respect arguments have to carry the weight.","Term to drop correctly: Arkin's mechanism is the 'ethical governor'; Sparrow and Arkin are the two recognised poles of this debate and actually debated it directly.","Closing line: the question isn't just 'do robots kill fewer people?' — it's 'is a death decided by a machine the kind of death a human being is owed?'"]},{"question":"What is Sparrow's 'Robots and Respect' argument? Does being killed by a machine wrong you in a special way?","points":["Stance: yes — I think being killed by a machine is a distinct wrong, on top of the death itself, because no human agent ever acknowledges the gravity of taking your life.","The argument (Sparrow, 'Robots and Respect'): persons have a special moral status, and how you're treated can fail to respect that status even if the outcome is 'the same' — a machine that 'decides' your death treats you as a target to be processed, not a human whose life matters.","Plain version: there's something about a person choosing to kill you — and bearing the weight of it — that recognises you as a fellow human; a machine can't do that, so the killing disrespects you.","The intuition pump (Sparrow's reflective exercise): would it matter if your brother were killed by an autonomous robot rather than a human-piloted drone? Most people feel it WOULD matter — and Sparrow says that feeling tracks a real moral wrong, not just squeamishness.","Strongest objection: in a chaotic war the dead person never meets their killer anyway — a sniper a mile away or a cruise missile is just as impersonal, so why single out the robot?","Reply: there's still a human moral agent in the loop with the sniper or missile operator who has decided and is answerable; with full autonomy that agent is gone entirely — the difference is presence of a responsible chooser, not physical distance.","Term to drop: this rests on 'moral status' / dignity — a deontological idea about respecting persons, distinct from the responsibility-gap argument.","Closing line: so even a perfectly accurate killer robot could wrong you — not by missing, but by killing you as if no human judgement were owed."]},{"question":"Could an autonomous weapon ever satisfy the principles of distinction and proportionality?","points":["Stance: distinction is maybe achievable one day, but proportionality is the real wall — I doubt a machine can ever do it, and that's a strong reason to keep humans in control.","Quick definitions to anchor it: distinction means only deliberately targeting combatants and sparing non-combatants; proportionality means a strike's expected civilian harm mustn't outweigh the military advantage.","Why distinction is hard but conceivable: telling a soldier from a civilian is partly a recognition task — uniforms, weapons, behaviour — and AI is getting good at pattern recognition, so in clean cases a machine might manage it.","Why proportionality is the killer: it isn't recognition, it's JUDGEMENT — weighing 'how much military advantage' against 'how many civilian lives', and that's a contextual moral call, not something you can reduce to a number in code.","The objection from the other side: Arkin says a machine without fear or rage might actually apply these rules MORE consistently than a panicking soldier who shoots in scenario-fulfilment.","Reply: consistency isn't the same as correctness — a machine can reliably apply a bad weighting; and worse, if it gets proportionality wrong, you're back in the responsibility gap with no one to answer for it.","Real case to name-drop: the Kabul 2021 strike and the café/cruise-missile scenario both turn on a human agonising over whether the bystander deaths were 'worth it' — exactly the judgement we're unsure a machine can make.","Closing line: distinction is an engineering problem; proportionality is a moral one — and you can't compile a conscience."]},{"question":"Does it actually matter, morally, whether a human or a machine pulls the trigger?","points":["Stance: yes, it matters — and not for a sentimental reason but because the human in the loop is what makes the killing answerable and respectful.","The reason in plain words: when a person decides to kill, two things are present — someone who can be held responsible afterwards, and someone who recognises the human gravity of what they're doing; a machine deciding strips both away.","This bundles Sparrow's two arguments: the responsibility gap (no one to blame) and robots-and-respect (the dead person's moral status goes unacknowledged).","The intuition test: imagine your sibling killed by a 'killer robot' versus by a human operator — most people feel the robot version is worse, and Sparrow argues that reaction is tracking a genuine wrong.","Strongest objection (the sceptic / consequentialist): the bullet doesn't care what fired it — if the machine is more accurate and kills fewer innocents, fixating on 'who pulled the trigger' is fetishising the human and costing real lives.","Reply: the point was never accuracy — it's that some decisions are too morally heavy to delegate to a thing that can't be held to account or grasp what it's doing; outcomes don't dissolve that.","Thinker to drop: Sparrow says yes it matters; a strict consequentialist (the Arkin side) says no, only results matter — so this is the consequentialism-versus-deontology divide in miniature.","Closing line: if it would horrify you for a machine to decide your brother's death, you already believe the trigger-puller matters."]},{"question":"What does 'meaningful human control' mean, and is it the right solution to the killer-robot problem?","points":["Stance: 'meaningful human control' is the right demand in principle, but it's slippery — and unless it's genuinely meaningful, it just launders the same problems.","What it means: the policy idea is to keep a human 'in the loop' (approving each target) or 'on the loop' (able to veto), so a real person, not the software, is making the kill decision.","Why it's attractive: it directly plugs Sparrow's responsibility gap — if a human actually decides, that human is answerable — and it preserves the respect a human agent shows in taking a life.","Who's pushing it: the Campaign to Stop Killer Robots and the viral 'Slaughterbots' video popularised the demand for a human to stay in control.","The catch / objection: control can be 'meaningful' on paper but hollow in practice — a tired operator rubber-stamping a machine's recommendation in two seconds isn't really deciding; that's 'automation bias', and it recreates the gap while pretending to close it.","Reply / where I land: so the test has to be substantive — the human needs real time, real information, and real ability to refuse — not just a button; otherwise it's control in name only.","Link to drop: this connects to signature strikes from Week 10, where 'targeting by pattern of life' already pushes humans toward deferring to the system's judgement.","Closing line: 'meaningful human control' is the right flag to plant — the whole fight is over making the word 'meaningful' actually do some work."]},{"question":"One worry about autonomous weapons is that they 'lower the threshold of war.' Explain that, and how serious is it?","points":["Stance: I think this is one of the most serious worries — autonomous weapons make starting wars too easy, and that's a jus ad bellum problem, not just a battlefield one.","The reason: a big political brake on going to war is the cost of sending your own people home in body bags; if your soldiers aren't at risk because robots do the fighting, that brake is released.","So leaders face less domestic resistance and may reach for force where they'd previously have negotiated — war becomes a cheaper, more tempting tool.","This links to the asymmetry / 'riskless war' worry from Week 10 drones — Sparrow is sceptical that fighting with zero risk to yourself is the morality-free win it looks like.","Strongest objection: surely fewer of MY soldiers dying is just good? Force protection is a legitimate aim, and Byman's 'Why Drones Work' argues precision plus safety is a moral plus, not a minus.","Reply: the harm isn't to your soldiers — it's that lowering the cost of war means MORE wars and more civilian victims overall, plus Boyle's 'blowback' point that easy strikes breed resentment and future conflict.","Real cases: the proliferation of drones already shows states striking across borders with little political cost — autonomous systems would amplify that further.","Closing line: a weapon that makes war painless for the side that has it doesn't make war more humane — it just makes it more frequent."]},{"question":"Give me the strongest case FOR building autonomous weapons — then tell me whether it survives.","points":["Stance (steelman first): the strongest pro-case is genuinely strong — if killer robots reliably kill fewer civilians, building them could be a moral duty, not a crime — but I think it ultimately fails on accountability.","The pro-argument (Arkin): machines don't feel fear, rage, revenge or self-preservation, so an 'ethical governor' could follow the laws of war more consistently than stressed soldiers who panic — fewer My Lais.","Add the consequentialist clincher: if the data showed AWS halved civilian deaths, then refusing to deploy them means choosing MORE dead innocents out of squeamishness — that's a serious charge.","Throw in force protection: Byman's 'Why Drones Work' line that keeping your own people out of harm's way while striking precisely is a real ethical benefit.","Now the turn — why it doesn't survive for me: Sparrow's two replies stand untouched by the body-count — the responsibility gap means wrongful killings have no one to answer for them, and robots-and-respect means even 'correct' kills disrespect the vi
