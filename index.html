, and does it satisfy distinction?","answer":"It is results-based (consequentialist), and it violates distinction, because the civilians' deaths are the intended means of breaking morale.","distractors":["It is rules-based, because the general is appealing to the rule that you may do what shortens a war.","It is results-based, and it satisfies distinction, because the overall body count is lower.","It is rules-based, and it violates proportionality, because the harm is excessive."],"why":"Counting total deaths to decide what's allowed is pure consequentialism (results-based). Distinction is violated because the civilians are not a side-effect — their deaths are the very thing meant to break morale, so they are the intended means. The trap answer says distinction is satisfied because the total is lower, but a low total never makes deliberately targeting civilians count as distinction-respecting; that is double effect's intended-vs-foreseen line being missed.","kind":"results-or-rules"},{"q":"A missile strike on a tank column also kills two civilians standing nearby. An observer objects: 'That violated distinction.' What is the most accurate correction to the observer?","answer":"Distinction was not violated, because the civilians were not the deliberate target; the real question is whether their foreseen deaths were proportionate to the military gain.","distractors":["The observer is right: any strike that kills civilians violates distinction.","The observer is right, but only because two deaths is an excessive number.","The observer is wrong, because civilians near a military target lose their immunity entirely."],"why":"Distinction forbids deliberately aiming at civilians; it does not forbid every strike that foreseeably kills some. The tanks were the target, so distinction holds, and the live test is proportionality. The most tempting error — 'any civilian death violates distinction' — collapses distinction into proportionality and would make almost all warfare automatically a distinction violation, which is not what the principle says.","kind":"spot-the-mistake"},{"q":"Suppose you accept that what makes civilians immune from attack is that they are not responsible for the unjust threat the war poses (rather than that they are simply 'innocent' or 'harmless'). What follows about munitions-factory workers who knowingly build the enemy's bombs?","answer":"They become harder to classify as fully immune, since on a responsibility-based view they bear some responsibility for the threat even though they wear no uniform.","distractors":["Nothing changes: they are civilians, so they are automatically immune no matter what they do.","They are clearly legitimate targets, because anyone useful to the war effort is a combatant.","They keep full immunity, because they are unarmed and therefore harmless at the moment of attack."],"why":"A responsibility-based account ties immunity to responsibility for the unjust threat, so contributing knowingly to weapon production puts a worker's immunity in question — that's the whole point of choosing responsibility over 'innocence' or 'harmlessness' as the ground. The 'automatically immune' answer ignores that you adopted responsibility as the test; the 'harmless so immune' answer is exactly the rival ground you set aside, which a responsibility view rejects.","kind":"what-follows"},{"q":"A commander says: 'This strike will destroy a minor radar post but will also collapse an apartment block, killing roughly 200 civilians as a side-effect. The deaths aren't intended, so double effect clears us.' What is the strongest objection?","answer":"Double effect also requires the foreseen harm to be proportionate to the military gain, and 200 deaths for a minor radar post is plainly excessive — so the strike fails despite the deaths being unintended.","distractors":["Double effect never permits any civilian deaths, intended or not, so the commander has misused it entirely.","The deaths are actually intended, because the commander knew they would happen.","The strike violates distinction, because an apartment block is a civilian building."],"why":"Double effect has more than one condition: the harm must be unintended AND proportionate. Even granting the deaths are unintended, 200 dead for a trivial target fails proportionality, so the objection bites there. The tempting wrong answer — 'knowing they'll happen means intending them' — is the classic collapse of foresight into intention; foreseeing a side-effect is not the same as aiming at it, which is exactly the line double effect draws.","kind":"best-objection"},{"q":"Two strikes each kill exactly 5 civilians. In Strike A, the 5 die because shrapnel from an attack on a command bunker reaches a nearby street. In Strike B, the 5 are deliberately killed to send a warning that makes the enemy surrender. Someone says: 'Same number dead, so the two strikes are morally equivalent.' What is the mistake?","answer":"It ignores the intended-versus-foreseen distinction: in A the deaths are an unintended side-effect of a legitimate target, while in B they are intended as a means, which double effect forbids regardless of the matching body count.","distractors":["There is no mistake: identical outcomes mean identical moral status, since only results matter.","The mistake is that Strike A actually killed more people once you count the bunker's occupants.","The mistake is that Strike B is the proportionate one, since a warning that ends the war saves lives."],"why":"For a rules-thinker, how the deaths come about matters: A's deaths are foreseen side-effects of hitting a military target, while B's are the intended means of coercion, which double effect rules out no matter the total. The 'only results matter' answer is exactly the consequentialist assumption the question is testing — equating the strikes by body count erases the intention/foresight line that double effect is built on.","kind":"spot-the-mistake"},{"q":"A military designs a chemical agent specifically engineered to cause slow, agonising, disfiguring deaths in order to terrify enemy troops into surrender. A general defends it: 'We only fire it at uniformed soldiers on the battlefield, never at civilians, and it ends battles faster, so it saves lives overall.' Which principle does this weapon most clearly violate, even granting the general's claims are true?","answer":"Mala in se (the weapon is evil in itself) — the cruelty designed into it makes it wrong to use regardless of who it targets or how good the outcome is.","distractors":["Distinction — it is being aimed at civilians rather than combatants, so it breaks non-combatant immunity.","Proportionality — the suffering it causes is greater than any military advantage it gains.","Jus ad bellum just cause — using such a weapon shows the war was never justified to begin with."],"why":"Mala in se means a means is wrong intrinsically, by its nature, not because of who it hits or how the sums turn out. The general's defence actually concedes distinction (only soldiers) and offers a results-based proportionality/consequentialist case — so those aren't where it fails. It still fails because deliberately engineering hideous suffering is evil in itself. The tempting wrong answer is distinction: but the scenario explicitly says it's fired only at combatants, so distinction is satisfied. Note only a rules-based (deontological) thinker can call something mala in se at all; a pure consequentialist has no room for 'evil in itself.'","kind":"scenario"},{"q":"Sample reasoning: 'A nerve gas that drifts on the wind and kills everyone in an area, soldier and child alike, can't be aimed only at fighters. So no matter how we try to use it, it will slaughter innocents — that's why it should never be used.' Is this argument working in a results-based (consequentialist) way or a rules-based (deontological) way, and via which principle?","answer":"It is a rules-based objection running through distinction — the weapon is condemned because it inherently can't separate combatants from non-combatants, breaking civilian immunity by its very nature.","distractors":["It is results-based: it condemns the gas because the total death toll is too high relative to the military benefit (proportionality).","It is rules-based via mala in se: the gas is being called evil in itself, independent of who it happens to kill.","It is results-based via distinction: it weighs the outcome of civilian deaths against the outcome of winning faster."],"why":"The argument's core is that the weapon CANNOT discriminate combatants from civilians — that's the distinction principle, and condemning a means for inherently violating a rule (immunity of the innocent) is rules-based reasoning. The most tempting trap is reading it as proportionality: but the argument never weighs the death toll against military gain; it says the weapon is simply incapable of sparing innocents at all. 'Distinction' is about WHO you hit; 'proportionality' is about whether even justified collateral harm is excessive — don't fuse them. (Also note: indiscriminateness and mala in se are different charges — here the charge is indiscriminateness, not intrinsic evil.)","kind":"results-or-rules"},{"q":"Someone argues: 'Terrorism is no worse than ordinary war. Conventional armies kill huge numbers of innocent civilians too — think of the firebombing of cities. So condemning terrorists while excusing soldiers is just hypocrisy.' What is the STRONGEST reply that still takes the challenge seriously?","answer":"There's a real moral difference in the relationship to the killing: terrorism deliberately targets innocents as its means of coercion, whereas just war permits civilian deaths only as a foreseen, unintended, proportionate side-effect — so intending innocent deaths and merely foreseeing them are not morally the same.","distractors":["The reply fails — if both kill innocents, the outcomes are the same, so there's no real moral difference and the challenge wins.","Terrorism is worse simply because it is carried out by non-state groups, whereas states have legitimate authority to use force.","Terrorism is worse because it kills more people overall than conventional war does."],"why":"The strongest reply uses the intention-vs-foresight distinction (the basis of double effect): the terrorist AIMS at innocent deaths and uses them as a tool of coercion, while a just combatant may only foresee civilian deaths as an unintended, proportionate side-effect. That's a genuine moral difference even when raw body counts are similar. The 'reply fails' option mistakes equal outcomes for equal morality — exactly the foreseen/intended confusion the question targets. The 'non-state actor' option is weak because states can commit terrorism too (state terror/death squads), so legitimate authority doesn't draw the line. And 'kills more people' is just false as a general claim — war often kills far more.","kind":"best-objection"},{"q":"Suppose you accept that what makes terrorism distinctively wrong is that it DELIBERATELY targets innocent, non-responsible people to coerce others through fear. If you hold that view consistently, which of the following must you also accept?","answer":"A state can be guilty of terrorism — if a government deliberately attacks its own or another population's innocents to spread fear and coerce, it is doing the very thing that makes terrorism wrong.","distractors":["Terrorism is always morally worse than any conventional war, because conventional war never deliberately targets civilians.","An attack that kills civilians by accident or as a side-effect must count as terrorism, since the result is dead innocents either way.","Killing enemy soldiers in an ambush can count as terrorism if the aim is to frighten the enemy into surrender."],"why":"If the wrong of terrorism is the deliberate targeting of innocents to coerce through fear, then whoever does that — including a state — is committing terrorism; the definition is about the act, not the identity of the actor. The 'always worse than war' option doesn't follow: the definition pins down what's wrong, not that it always outranks every war's harms. The 'accidental/side-effect' option contradicts the definition's word 'deliberately' — foreseen side-effect deaths aren't terrorism. The 'frighten soldiers' option fails because soldiers aren't the innocent non-combatants the definition protects — coercive fear alone isn't enough; the targets must be innocents.","kind":"what-follows"},{"q":"Apply the idea to a real case: a strategic nuclear weapon is dropped on a city, killing mostly civilians, to shock the enemy government into surrendering. A student says, 'This is fine if it really shortens the war and saves more lives than it costs — and if it does, it can't be mala in se, because look how much good it did.' What is the mistake in this reasoning?","answer":"It collapses two separate questions: whether something is mala in se is about whether the act/weapon is wrong in itself, not about whether its consequences come out positive — so 'it did a lot of good' can't settle the mala in se charge, which a rules-based thinker presses precisely against good outcomes.","distractors":["The mistake is the arithmetic — the bombing didn't actually save more lives than it cost, so the consequentialist case simply fails on the numbers.","The mistake is ignoring jus ad bellum — whether the bomb is mala in se depends on whether the war was just to start.","The mistake is confusing distinction with proportionality — the real problem is that the strike was disproportionate, not that it was intrinsically evil."],"why":"The student is using a results-based (consequentialist) test to dismiss a rules-based (deontological) charge. Mala in se asks whether the means is wrong by its nature — indiscriminate, uncontainable mass killing of innocents — and that question stands even if the consequences are favourable. Saying 'it did good, so it's not evil-in-itself' just changes the subject. The 'arithmetic' option stays inside the consequentialist frame and so repeats the student's error rather than diagnosing it. The jus ad bellum option confuses starting-vs-fighting: mala in se is an in-bello question about means, independent of whether the war was just to begin. The proportionality option mistakes 'very harmful / excessive' for 'evil in itself' — the whole point of mala in se is that some acts are barred even when the proportion of gain to harm might look acceptable.","kind":"spot-the-mistake"},{"q":"A government argues: \"A strategic nuclear strike on an enemy city would kill so many civilians and spread fallout so far that there is simply no way to aim it only at fighters or to keep its effects within the battlefield.\" Taken on its own, which jus in bello principles does this argument say a city-busting nuke cannot satisfy?","answer":"Distinction (can't target only combatants) and proportionality (uncontainable effects make the harm excessive).","distractors":["Last resort and reasonable prospect of success.","Distinction and legitimate authority.","Right intention and just cause."],"why":"The argument has two prongs: it can't be aimed only at fighters (a distinction failure) and its effects can't be contained, so the harm dwarfs any gain (a proportionality failure). The tempting wrong pick swaps in last resort/prospect of success, but those are jus ad bellum tests about WHETHER to go to war, not about whether a particular strike spares civilians or keeps harm in bounds. Sorting in-bello (how it's fought) from ad-bellum (whether to fight) is the classic trap here.","kind":"scenario"},{"q":"Someone claims nuclear weapons are 'mala in se' (evil in themselves). What is the strongest objection a pure consequentialist would raise against even using that label?","answer":"A pure consequentialist thinks only outcomes matter, so nothing can be 'evil in itself' independent of its results — a nuke is just very destructive, and could in principle be permissible if it produced the best outcome.","distractors":["A consequentialist would object that nuclear weapons actually CAN be aimed precisely enough to satisfy distinction.","A consequentialist would object that the harm isn't really uncontainable, so proportionality is met.","A consequentialist would object that the threat of nukes is fine even if using them is wrong."],"why":"'Mala in se' is a rules-based (deontological) idea — it says an act is wrong by its nature regardless of consequences. A consequentialist, who judges purely by results, has no room for 'wrong in itself': the deepest objection isn't about the empirical facts of fallout but about the very category. The tempting distractors are factual quibbles about distinction/proportionality, but those concede the consequentialist's framework rather than attacking the 'in itself' label, which is the actual point of friction.","kind":"best-objection"},{"q":"Read this reasoning: \"We should keep our nuclear arsenal. Yes, actually firing it would be monstrous — but as long as everyone keeps their nukes, no one dares attack, fewer people die overall, and peace holds. So deterrence is justified.\" Is this argument primarily results-based or rules-based?","answer":"Results-based (consequentialist) — it justifies the arsenal entirely by the good outcome (peace, fewer deaths overall), not by any rule about the act itself.","distractors":["Rules-based, because it admits that actually firing would be monstrous.","Rules-based, because it appeals to a duty to protect one's own citizens.","Neither — it's about intention versus foresight, not results versus rules."],"why":"The justification rests entirely on the payoff — peace and fewer total deaths — which is the signature of consequentialist reasoning. The tempting wrong answer points to the line 'firing would be monstrous' and reads that as a rule, but conceding that the ACT is wrong while defending the POLICY by its outcomes is still results-thinking; it doesn't treat the act's wrongness as decisive. That gap between 'the act would be wrong' and 'but the outcome justifies the policy' is exactly what the deterrence paradox exploits.","kind":"results-or-rules"},{"q":"The deterrence paradox is often put as: 'Can it be ethical to threaten to do something it would be unethical to do?' Why does sincere nuclear deterrence make this a genuine puzzle, rather than an easy 'yes'?","answer":"Because for the threat to actually deter, the state must sincerely INTEND to incinerate cities if attacked — so it isn't merely bluffing; it has formed a real intention to do something that (as the mass murder of innocents) would be wrong to carry out.","distractors":["Because threatening is always exactly as wrong as doing, so there's no real distinction to puzzle over.","Because the threat itself already kills civilians through fallout, so it fails distinction before anything is fired.","Because deterrence confuses jus ad bellum with jus in bello."],"why":"The puzzle bites precisely because credible deterrence isn't a bluff — it requires genuinely intending the wrongful act, and many rules-thinkers hold that forming an intention to do an atrocity is itself corrupting, even if you never act. The first distractor dissolves the puzzle by denying any threaten-vs-do gap (then there'd be nothing to debate); the puzzle exists exactly because intending and doing usually feel different, yet here intending seems to inherit the wrongness of doing.","kind":"scenario"},{"q":"A student says: 'Deterrence is fine — you're only THREATENING to bomb cities, you're not actually bombing anyone, and a threat can't be murder.' What's the mistake in this reasoning?","answer":"It ignores that an effective deterrent requires sincerely intending to carry out the threat — so the person isn't morally 'clean'; they've committed to doing the very thing they admit would be wrong, which is the heart of the threaten-vs-do problem.","distractors":["The mistake is thinking nuclear weapons could ever satisfy proportionality.","The mistake is confusing whether it was right to start the war with how the war is fought.","The mistake is treating foreseen civilian deaths as if they were intended."],"why":"The student treats 'merely threatening' as morally costless, but a credible threat is backed by a real intention to act — you can't deter by intending NOT to follow through. So the gap between threatening and doing is far narrower than claimed. The 'foreseen vs intended' distractor is tempting because intention is in play, but here the problem is the opposite: the deterrer fully INTENDS the killing (conditionally), so this isn't a foresight-only side-effect case at all.","kind":"spot-the-mistake"},{"q":"Apply the concepts to Hiroshima. A defender says: 'Dropping the bomb was justified because it shocked Japan into surrendering and so saved more lives than a land invasion would have cost.' If a critic accepts that nuclear weapons are mala in se, what follows for how the critic must respond?","answer":"The critic must reject the defence even if the life-saving numbers were true, because 'evil in itself' means the act is wrong regardless of its outcomes — a good consequence can't redeem an intrinsically wrong act.","distractors":["The critic should agree the bombing was justified, since saving lives satisfies proportionality.","The critic must argue the bomb didn't actually cause Japan's surrender — that's the only available reply.","The critic should say it was wrong to start the war, so the bombing was wrong too."],"why":"Calling something mala in se is a rules-based commitment: the act is off-limits whatever the results, so the critic can grant the casualty math and STILL condemn it. The second distractor (disputing whether the bomb caused surrender) is a real consequentialist line of attack, but it isn't what 'mala in se' commits you to — that empirical move fights on the defender's results-based turf, whereas the mala in se critic's whole point is that the results are beside the point. The last distractor confuses ad bellum (starting the war) with in bello (the bombing's conduct).","kind":"apply"},{"q":"A state, while NOT in any declared war, uses a drone to kill a named man it has decided is a terrorist organiser. Critics call this 'extrajudicial execution,' while the state calls it 'an act of war.' What is the CENTRAL question this disagreement turns on?","answer":"Whether the killing falls under the rules of WAR (where you may kill enemy combatants on sight) or the rules of LAW ENFORCEMENT (where a suspect must be arrested and tried, not executed).","distractors":["Whether the strike was proportionate — i.e. whether the military gain outweighed the civilian harm caused.","Whether it was right to start the conflict in the first place (jus ad bellum) rather than how it was fought.","Whether the drone operator was at any personal risk when carrying out the killing."],"why":"Targeted killing happens OUTSIDE a declared war, so the live question is which rulebook applies: in war you may kill a combatant without trial, but in law enforcement you must arrest and try a suspect. That 'war or execution?' framing is exactly the dispute. The proportionality distractor is tempting because it's a real drone worry, but proportionality only kicks in once you've decided which rules apply — it doesn't settle whether this is a legitimate combatant-killing or an execution-without-trial.","kind":"scenario"},{"q":"A drone program runs 'signature strikes': instead of identifying a specific named person, it kills people whose PATTERN OF BEHAVIOUR (movements, gatherings, associations) matches that of militants. Why do critics single this out as especially troubling?","answer":"You may be killing people whose identity — and therefore whether they are actually a fighter at all — you do not even know, so you cannot be sure you are targeting a legitimate combatant rather than a civilian.","distractors":["Because behaviour-based killing is always disproportionate — the military gain can never outweigh the harm.","Because it kills people who have been correctly identified as combatants but without first giving them a chance to surrender.","Because the operator faces no personal risk, which makes any behaviour-based killing unfair."],"why":"The whole point of signature strikes is that you target by behaviour rather than confirmed identity, so you risk killing someone you can't even confirm is a fighter — a direct threat to DISTINCTION (only deliberately target genuine combatants). The 'always disproportionate' distractor confuses distinction with proportionality: the problem isn't that the harm outweighs the gain, it's that you can't be sure your target is a legitimate one in the first place.","kind":"scenario"},{"q":"Two intelligence officers debate firing a cruise missile at a café where terror plotters are meeting; the strike will kill 12 innocent bystanders. Officer A says: 'We aim ONLY at the plotters; the bystanders' deaths are a foreseen side-effect, not our goal, and 12 deaths are not excessive given the mass-casualty attack we'd prevent — so it's permissible.' Officer A's reasoning relies on which principle?","answer":"The doctrine of double effect: a foreseen-but-unintended harm to civilians can be permissible if it is not the means or the aim and is proportionate to the good achieved.","distractors":["Non-combatant immunity (distinction): the bystanders are civilians, so killing them is always forbidden regardless of intention or proportionality.","Mala in se: a cruise missile is a weapon evil in itself, so using it can never be justified.","Liability: the bystanders are responsible for an unjust threat, which is what makes them legitimate targets."],"why":"Officer A leans on TWO moves at once — intending only the plotters while merely foreseeing the bystander deaths (intention vs foresight), plus proportionality — which is precisely the doctrine of double effect. The distinction distractor is the tempting trap: it would say civilian deaths are flatly forbidden, but double effect's whole job is to explain when foreseen (not intended) civilian deaths can be permitted, so 'always forbidden' misstates the principle Officer A is actually using.","kind":"results-or-rules"},{"q":"Someone defends drone strikes like this: 'They are more precise than any other weapon, they kill fewer civilians than a ground invasion would, and they keep our own soldiers out of harm's way. On balance fewer people die, so we should use them.' Is this reasoning results-based or rules-based, and what is the strongest objection IN ITS OWN TERMS?","answer":"It is results-based (it judges drones purely by outcomes), and the strongest same-terms objection is blowback: if civilian deaths radicalise people and breed more enemies, drones may produce WORSE outcomes overall and so fail on their own consequentialist measure.","distractors":["It is rules-based, and the strongest objection is that precision violates non-combatant immunity.","It is results-based, and the strongest objection is that killing a suspect without trial is wrong in itself regardless of the numbers.","It is rules-based, and the strongest objection is that the operator faces no personal risk."],"why":"The defence counts up outcomes (more precise, fewer dead, troops safe), so it's consequentialist. To object 'in its own terms' you must beat it on outcomes — blowback does exactly that by arguing the body-count actually rises over time. The 'wrong in itself' option is a genuine objection but it's a RULES-based one; it changes the subject rather than defeating the results argument on its own ground, so it isn't the strongest reply 'in its own terms.'","kind":"best-objection"},{"q":"In August 2021 a US drone strike in Kabul killed 10 civilians, including children, after the target was wrongly assessed as an imminent threat. Suppose investigators conclude the operators genuinely tried to hit only a legitimate target but were careless in checking who else was present. Which principle is most directly at stake?","answer":"Precautions in attack: even when you intend to strike only a legitimate target, you must take adequate care to verify the target and avoid foreseeable civilian harm.","distractors":["Mala in se: the strike used a weapon evil in itself, so it was wrong no matter how carefully it was carried out.","Proportionality of starting the war (jus ad bellum): the deaths show the wider conflict should never have begun.","Moral equality of combatants: the civilians were as liable to be killed as any enemy soldier."],"why":"The stipulated facts — right intention but careless verification — point straight at precautions in attack, the in-bello duty to take real care to confirm targets and spare civilians. The jus ad bellum distractor is the classic START-vs-FIGHT confusion: whether the war should have begun is a separate question from whether this particular strike was carried out with due care, and the case is about the latter.","kind":"apply"},{"q":"A drone operator kills enemy fighters from thousands of miles away at zero personal risk. A student argues: 'There's something troubling about this asymmetry — risk-free killing seems to make the fight unfair, so we should make it more even, like asking our soldiers to remove their body armour.' What is the mistake in this reasoning?","answer":"It assumes 'fairness' between fighters requires equal risk, but protecting your own people (force protection) is normally a legitimate goal; the real worry about asymmetry isn't that one side is safer but whether riskless killing changes the moral character of the act or makes resorting to force too easy.","distractors":["The mistake is treating asymmetry as a problem at all — since outcomes are all that matter, a safer way to kill is simply better and raises no moral issue.","The mistake is confusing asymmetry with distinction — the only real question is whether the operator hit a combatant rather than a civilian.","The mistake is forgetting that lowering risk to your troops automatically violates proportionality."],"why":"The flawed step is equating moral fairness with equal danger, which would absurdly demand stripping off body armour; force protection is ordinarily fine, and the genuine asymmetry worry lies elsewhere (does risk-free killing degrade the act, or make war too easy to start?). The 'no moral issue at all' distractor over-corrects into pure consequentialism and throws away the real, distinct concern about riskless war that the topic is asking you to recognise.","kind":"spot-the-mistake"},{"q":"A fully autonomous weapon (no human picking the target) hits a wedding convoy it misclassified as fighters, killing 14 civilians. An investigation tries to find who should answer for the killing. The commander says \"I didn't choose this target, the machine did.\" The programmer says \"I couldn't have predicted this specific decision.\" And you obviously can't put a machine on trial. According to the responsibility-gap argument, what does this case show?","answer":"No one can be fairly held responsible for the wrongful killing, and since fighting justly requires that someone CAN be held responsible, using the weapon this way is illegitimate.","distractors":["The weapon simply failed the principle of distinction, so the problem is a targeting-accuracy bug that better sensors would fix.","The commander is automatically responsible, because anyone who deploys a weapon is liable for everything it does regardless of control.","The killing was proportionate or not depending on the military gain, so this is really a proportionality question, not a responsibility one."],"why":"The responsibility-gap argument is precisely that NONE of the three candidates (programmer, commander, machine) can fairly be held answerable, and that fighting justly requires someone be answerable for a wrongful death — so the gap itself makes the use illegitimate, separate from how good the sensors are. The tempting wrong answer treats it as a distinction/accuracy bug: but the argument's whole point is that even a perfectly accurate machine would leave the same gap whenever it DOES err, because accountability, not aim, is what's missing.","kind":"scenario"},{"q":"Someone argues: \"We should build autonomous weapons because, unlike scared, angry, exhausted soldiers, robots feel no fear, rage, or urge for revenge and won't commit atrocities like My Lai. If they end up killing fewer civilians overall, refusing to build them is the choice that gets more innocents killed.\" Is this reasoning results-based or rules-based?","answer":"Results-based — it judges the weapons entirely by their outcomes (fewer civilians killed on balance), concluding we ought to use whatever produces the better result.","distractors":["Rules-based — it appeals to the soldier's duty not to commit atrocities, which is a fixed moral rule.","Neither — it's purely a factual/engineering claim about robot capabilities, with no moral theory behind it.","Results-based, but only because it mentions My Lai; without the real example it would be a rules-based argument."],"why":"The argument's entire force is comparative outcomes: whichever option leaves fewer innocents dead is the one we're obligated to choose. That is consequentialist reasoning. The tempting 'rules-based' reading is fooled by the word 'atrocities' — but the argument doesn't say atrocities are wrong-in-themselves and forbidden whatever the cost; it says we should pick the option with the better body count. Mentioning My Lai is just evidence for the outcome claim, not a rule.","kind":"results-or-rules"},{"q":"A defender of autonomous weapons says: \"Even if no single person can be held responsible when a robot kills wrongly, that doesn't matter — what matters is whether the robots reduce total civilian deaths. Accountability is a nice-to-have; saved lives are what count.\" What is the strongest objection a rules-based critic would give?","answer":"Good outcomes don't fill the accountability gap: justice in war requires that someone can answer for a wrongful killing, and a lower body count doesn't supply the missing person to hold responsible — so the wrong remains even if fewer die.","distractors":["The robots probably won't actually reduce civilian deaths, because their sensors can't tell combatants from civilians as well as humans can.","The defender has confused jus ad bellum with jus in bello — accountability is about whether the war was just to start.","Accountability does exist, because the commander who switched the robot on is always fully responsible for whatever it does."],"why":"The rules-based critic's distinctive move is that some requirements (here, that a wrongful killing be answerable-for) hold regardless of outcomes — so pointing at a better body count simply doesn't address the wrong. The tempting distractor ('sensors aren't good enough') is itself a RESULTS argument; it concedes the defender's frame and just disputes the facts. The genuinely rules-based objection refuses the frame: even granting fewer deaths, the accountability requirement is unmet.","kind":"best-objection"},{"q":"Sparrow's second argument is that being killed by a machine that 'decides' your death fails to respect you as a person. A student restates it as: \"Autonomous weapons are wrong because they kill more civilians than human soldiers do.\" What's the mistake in this restatement?","answer":"It swaps a respect/dignity argument (a rules-based claim about HOW you're treated when killed) for an outcome claim about HOW MANY are killed — collapsing a deontological point into a consequentialist one.","distractors":["It's not a mistake; the respect argument just is the claim that robots kill more civilians.","The mistake is that it should say robots kill FEWER civilians, not more.","The mistake is that respect is a jus ad bellum concern, so it belongs to the decision to start the war, not to how killing is done."],"why":"The respect argument says something goes wrong in the manner of the killing — no human moral agent acknowledges the gravity of ending your life — and this wrong would stand even if the machine killed nobody extra. Recasting it as 'kills more civilians' turns a claim about treatment into a claim about totals, i.e. turns a rule into a result. That is exactly the consequentialism-vs-deontology confusion the topic warns against; the count of dead is a different argument altogether.","kind":"spot-the-mistake"},{"q":"Suppose you accept the responsibility-gap argument: a wrongful killing is illegitimate when no one can fairly be held responsible for it. A new autonomous weapon is proposed that keeps a human 'on the loop' — a trained officer must review and approve each target the machine proposes before it fires. If you're consistent, what follows?","answer":"This system is far less troubled by the gap argument, because an identifiable human makes (and can be held responsible for) each lethal decision — which is exactly why critics demand 'meaningful human control.'","distractors":["It changes nothing: any weapon with software in it falls under the responsibility-gap objection regardless of human involvement.","It makes things worse, because now both the human and the machine are responsible, so responsibility is split and no one is fully accountable.","The gap argument no longer applies because the weapon is now more precise, so it also automatically satisfies proportionality."],"why":"The gap argument targets killings where NO human makes the lethal choice. Restore a human who decides and can answer for each shot, and the gap closes — which is the rationale behind 'meaningful human control.' The tempting 'any software counts' distractor misreads the argument: it's about absence of a responsible decider, not the mere presence of code (drones run on software yet have a human pulling the trigger and remain accountable). Precision (third option) is a separate matter that doesn't settle responsibility.","kind":"what-follows"},{"q":"On the day the 2021 Kabul drone strike killed 10 civilians, a human operator made the call to fire based on faulty intelligence. A commentator says, \"This proves we should hand these decisions to autonomous machines, since the human got it wrong.\" Using the W11 concepts, what's the sharpest reply?","answer":"The Kabul case shows a human CAN be identified and held responsible for a mistaken strike — exactly what the responsibility-gap argument says we'd LOSE with a fully autonomous weapon, so it cuts against handing over the decision, not for it.","distractors":["The commentator is right: removing the fallible human is the obvious fix, since machines don't act on faulty intelligence.","The case is irrelevant to the robot debate because a drone with a human operator isn't an autonomous weapon at all.","The reply should be that the strike was disproportionate, which is a separate jus ad bellum failure."],"why":"The case is a clean illustration of accountability working: there's a human whose decision can be investigated, blamed, and answered for. Replacing that human with an autonomous system removes the one thing the gap argument says justice requires. The tempting first distractor assumes machines wouldn't err on bad intelligence — but a machine fed the same faulty data could make the same mistake AND leave no one to answer for it, which is worse, not better, on the gap view.","kind":"apply"},{"q":"A debate is set up as 'precision-loving futurists vs. technophobes.' One side says robots will kill fewer innocents so we should build them; the other says it's intrinsically wrong to let a machine choose who dies, whatever the body count. What is the deepest way to characterise this disagreement?","answer":"It's the same results-vs-rules clash that runs through the whole unit: one side judges by outcomes (fewer deaths), the other by a rule about what may never be done (a machine deciding a death), so they're applying two different moral theories, not just disagreeing about facts.","distractors":["It's a purely empirical dispute that will be settled once we know whether robots actually kill fewer civilians.","It's a disagreement about whether the war was just to start (jus ad bellum) versus how it's fought (jus in bello).","It's about whether the weapons satisfy distinction, with one side saying yes and the other saying no."],"why":"The two sides aren't really arguing about facts — one weighs outcomes (consequentialism), the other holds a line that may not be crossed regardless of outcomes (deontology). That's the master key dressed in a robot costume. The tempting 'purely empirical' distractor is wrong because even if everyone agreed robots kill fewer civilians, the rules-based side would still object — proving the disagreement is about which moral theory governs, not about the numbers.","kind":"results-or-rules"}],"viva":[{"q":"What are the three different sorts of questions Sparrow says we might ask about whether the US and Israel's attack on Iran was justified, and which one is this unit mainly concerned with?","week":1,"idea":"the three traditions / three questions: is it legal? is it ethical? does it advance national interest? — the unit focuses on the ethical question","type":"define"},{"q":"Sparrow says 'the law typically follows the ethics, and if it does not then so much the worse for the law.' Why does he claim the ethics matters more than the law — and can you give his example of a war being legal but unjust, or illegal but justified?","week":1,"idea":"why ethics matters more than law / legal vs ethical justification","type":"argue"},{"q":"Distinguish the three traditions Sparrow introduces — realism, pacifism, and just war theory — and explain what each says about whether the attack on Iran (and Iran's counter-attacks) could be justified.","week":1,"idea":"the three traditions (realism / pacifism / just war theory)","type":"define"},{"q":"What is the difference between jus ad bellum and jus in bello, and which one is Sparrow analysing in these notes? What is the third part of just war theory he mentions?","week":1,"idea":"jus ad bellum vs jus in bello (justice OF war vs justice IN war, plus just peace)","type":"define"},{"q":"List the jus ad bellum conditions a war must meet according to just war theory. Why does Sparrow stress that a war must meet ALL of them, not just the most-discussed one?","week":1,"idea":"jus ad bellum criteria are jointly necessary (just cause, last resort, proper authority, right intention, reasonable chance of success, proportionality)","type":"define"},{"q":"Apply the 'last resort' criterion to the US and Israel's attack on Iran. Why does Sparrow say it 'abundantly clearly' fails this test, and what does he mean by calling it 'a war of choice'?","week":1,"idea":"applying jus ad bellum: last resort","type":"apply"},{"q":"Apply the 'proper authority' criterion to the US decision to attack Iran. Whose authorisation does Sparrow say was required and missing — and what is the disagreement about who counts as the proper authority?","week":1,"idea":"applying jus ad bellum: proper authority (Congress vs President vs UN Security Council)","type":"apply"},{"q":"What does the 'right intention' criterion require, and why is Sparrow sceptical that the US's stated reasons (concern for democracy, civilian deaths) are its real reasons for attacking Iran?","week":1,"idea":"applying jus ad bellum: right intention vs ulterior motives (oil, regime change, deterring rivals)","type":"apply"},{"q":"Walk through how Sparrow applies the proportionality criterion ('the goods achieved should justify the evils that flow') to this war. Why does he say it is especially hard to calculate here, and what evils does he include?","week":1,"idea":"applying jus ad bellum: proportionality and the difficulty of weighing goods against evils","type":"apply"},{"q":"Sparrow notes that judgments about 'reasonable chance of success' and 'proportionality' depend heavily on empirical claims about the world. What does he mean, and why might two people who agree on just war theory still reach different verdicts on this war?","week":1,"idea":"the role of empirical/factual claims in jus ad bellum judgments","type":"meta"},{"q":"What does just war theory recognise as the possible 'just causes' for going to war? Sparrow lists several — name them, and note that you only need ONE.","week":1,"idea":"just cause: the recognised list (defence against aggression, defence of international order, punishment of aggression, balancing foreign intervention, humanitarian intervention)","type":"define"},{"q":"Sparrow argues that a state being undemocratic, sexist, homophobic, religiously intolarant — or even imprisoning and executing many people — does NOT count as a just cause for war. Why? What role does respect for sovereignty play in his argument?","week":1,"idea":"just cause and respect for sovereignty / 'regime change is a goal not a just cause'","type":"argue"},{"q":"Why does Sparrow say that a state wanting or possessing nuclear weapons does not itself count as a just cause for war? What 'irony' does he point to about the US and Israel attacking Iran on these grounds?","week":1,"idea":"just cause: possessing WMDs is not a just cause / the nuclear-powers irony","type":"argue"},{"q":"Could the attack on Iran be justified as a 'humanitarian intervention'? Lay out the case for and against — and explain Sparrow's objection that 'the airstrikes aren't preventing anything' and that you usually need 'boots on the ground.'","week":1,"idea":"just cause: humanitarian intervention and its limits","type":"argue"},{"q":"Distinguish pre-emptive war from preventative war. Why does just war theory accept the former (in rare cases) but reject the latter? Use Sparrow's examples of what would make a pre-emptive strike plausible.","week":1,"idea":"pre-emptive vs preventative war within 'defence against aggression'","type":"define"},{"q":"Sparrow reports Secretary of State Rubio's novel argument that the US was acting in 'pre-emptive self-defence' against missiles Iran would launch once Israel attacked. Why does Sparrow think this argument is strange — and what does he mean by saying the US 'transformed Iranian aggression into self-defence'?","week":1,"idea":"self-defence, imminence, and who counts as the aggressor","type":"apply"},{"q":"Sparrow repeatedly raises the realist challenge — 'Who cares whether it is ethical? What is this ethics stuff anyway? How does declaring a war unethical stop it or help anyone?' How would you respond on behalf of just war theory?","week":1,"idea":"realism vs the relevance of ethics (verbatim reflective challenge)","type":"probe"},{"q":"Sparrow gives three replies to the realist who says the US is only justified in fighting a war that is in its best interests. What are the three points — including the claim that 'whether the war is in the US's best interests is itself an ethical argument'?","week":1,"idea":"realism: the national-interest question is substantial AND is itself an ethical/normative argument","type":"argue"},{"q":"Sparrow asks: 'how do you identify the United States whose interests the war is supposed to serve?' Who benefits and who doesn't, on his account — and why does this matter for evaluating the war even in pure interest terms?","week":1,"idea":"realism: whose interests? (arms makers vs ordinary Americans) — interest-based arguments fail to motivate other parties","type":"probe"},{"q":"Sparrow keeps asking 'so what? Who is going to take the US to court?' about the war's illegality. What is he getting at, and how does it connect to the unit's key question of why arguments about law, ethics, or interest matter at all?","week":1,"idea":"why moral/legal arguments matter when no one can enforce them — the unit's framing question","type":"probe"},{"q":"Sparrow observes that both advocates and critics of wars 'typically end up using moral language' that appeals to universal considerations. Why does he take this as evidence in favour of doing ethics of war, and against pure realism?","week":1,"idea":"the universality of moral argument as a case for just war theory over realism","type":"argue"},{"q":"A committed consequentialist, Sparrow says, would simply ask whether the world will be better or worse for fighting this war. How does that approach differ from just war theory's checklist of conditions — and why does Sparrow think most people judge JWT superior to both consequentialism and pacifism?","week":1,"idea":"consequentialism vs deontology/just war theory; JWT developed in response to its rivals","type":"debate"},{"q":"On a pacifist view, neither the US/Israel's attacks NOR Iran's counter-attacks can be justified. State the central debate: is the pacifist's blanket rejection of war more defensible than just war theory's case-by-case approach, or less? Argue both sides.","week":1,"idea":"pacifism vs just war theory — the central debate of the introductory traditions","type":"debate"},{"q":"Sparrow walks through several recent and historical conflicts — the US attack on Venezuela, Russia's attack on Ukraine, the 1953 overthrow of Iran's elected government, the invasions of Iraq and Afghanistan, the strike on a girls' school killing 100+ children. Pick one and explain how Sparrow uses it to illustrate a just war point.","week":1,"idea":"connecting jus ad bellum principles to real events / the empirical track record of regime-change wars","type":"apply"},{"q":"Sparrow concludes the war is unjust even before settling the 'just cause' question, because it already fails last resort, proper authority and right intention — 'any of these is sufficient to render it unjust.' Explain the logical structure of this argument and why failing one criterion is decisive.","week":1,"idea":"jus ad bellum criteria as jointly necessary conditions — one failure is sufficient for an unjust war","type":"meta"},{"q":"Define pacifism. Why does Sparrow reject the loose definitions 'opposition to war' and 'the promotion of peace' in favour of the stronger 'the doctrine that war is never justified'?","week":2,"idea":"Master definition of pacifism: only 'war is never justified' (and for some, 'killing is never justified') stakes out a distinctive position, because every response to war except militarism is compatible with preferring peace.","type":"define"},{"q":"Distinguish personal (personal/individual) pacifism from political pacifism. In what sense is each the 'more radical' of the two?","week":2,"idea":"The central distinction of the week: personal pacifism = relations between individuals (no one may ever kill); political pacifism = relations between states (war is never justified). Personal is more radical morally; political is more radical because it rests on a deeper political analysis of war's nature.","type":"define"},{"q":"Sparrow lays out four possible attitudes to war: realism, pacifism, just war theory, and militarism. Place pacifism within that map and explain how it differs from each of the other three.","week":2,"idea":"The four-attitudes taxonomy: realism (don't morally evaluate war), pacifism (regret war, never justified), just war theory (regret war, necessary evil, build a framework), militarism (celebrate war). Pacifism is the 'never justified but morally evaluable' option.","type":"define"},{"q":"Is it morally permissible to kill an armed individual who would otherwise: take your last piece of chocolate? take your coat? lock you out of your house permanently? kill you? kill your neighbour? kill your neighbour and your neighbour's two children? take away your right to vote? change the Australian flag to the Jolly Roger? Where on this ladder does killing first become permissible, and what does the line you draw reveal?","week":2,"idea":"Reflective exercise 2.3 verbatim: the chocolate-to-murder escalation ladder. Probes the intuition that some interests are worth killing to defend and others are not, forcing you to locate and justify the threshold the (personal) pacifist denies exists.","type":"probe"},{"q":"Imagine executing the ~200 students in this unit by firing squad and picture the pile of corpses. Would you do it to overthrow the oppressive authoritarian government in Iran? Now do it 100 times over — same question. Now ask the same of yourself, but to preserve 'public order' in Iran instead. What do your answers show about what political ends could justify the killing of war?","week":2,"idea":"Reflective exercise 2.4 verbatim: forces an honest reckoning with the real human cost of war (the evil of war) and tests whether any political objective is 'worth the human lives lost' — the core political-pacifist argument.","type":"probe"},{"q":"How important is voting to you? How much would you pay to vote if you had to? Would you kill for the right to vote?","week":2,"idea":"Reflective exercise 2.5 verbatim: isolates a single concrete political value to test whether it could license killing, sharpening the political-pacifist claim that the stakes of war rarely justify its cost.","type":"probe"},{"q":"Think of a war Australia (or a country you know) was involved in over the last 30 years. State in one sentence what the war was supposed to achieve. Did it achieve it? Honestly weigh the costs to both sides — human life, environmental destruction, subsequent political events. Did the benefits justify the costs, for your side and for the other?","week":2,"idea":"Reflective exercise 2.1 verbatim: connects the abstract debate to a real conflict and builds the cost-benefit case that underwrites the consequentialist route to political pacifism (the issues wars are fought over are never worth the lives lost).","type":"apply"},{"q":"What does a sniper rifle look like? An AK-47? A Glock? An Uzi? Have you ever actually seen any of these — and what does your answer say about how war and weapons are made invisible or glamorised in your culture?","week":2,"idea":"Reflective exercise 2.2 verbatim: surfaces militarism in everyday culture (the 'opposite' of pacifism) and our distance from the real instruments of killing, which Sparrow uses to motivate why pacifism is worth taking seriously.","type":"probe"},{"q":"Set out the case FOR personal pacifism (religious; deontological/right-to-life; rule-consequentialist; the Platonic 'better to suffer evil than do it') and then the case AGAINST it (consequentialist self-contradiction; the deontologist's lapsing-right reply; the 'green light to evildoers'; psychological over-demandingness; 'moral squeamishness'). Which side carries the burden of proof, and why does Sparrow say it should be the anti-pacifist?","week":2,"idea":"Argue-both-sides on personal pacifism, plus Sparrow's burden-of-proof inversion: pacifism is a positive doctrine whose commitments (peace > war, killing is bad, military spending is obscene) seem right, so the person calling pacifists 'crazy' should have to justify themselves.","type":"argue"},{"q":"Set out the case FOR political pacifism (issues never worth innocent lives; the consequentialist 'war's consequences are always worse'; denial of the domestic analogy; the Marxist/Tolstoyan claim that patriotism makes the working class die for ruling-class interests) and the case AGAINST (disastrous-consequences hypotheticals; non-violent resistance only works on scrupulous invaders; the international green-light is worse than the personal one; the domestic analogy captures something real — physical liquidation, not just loss of a 'way of life').","week":2,"idea":"Argue-both-sides on political pacifism: the distinctive arguments turn on the NATURE OF WAR rather than the wrongness of killing, and the objections largely re-run the personal-pacifism objections at the level of states.","type":"argue"},{"q":"Reconstruct Elizabeth Anscombe's attack on pacifism in 'War and Murder'. Why does she call the biblical case for pacifism mistaken, why does she think a benevolent God would not oppose an institution (force) essential to social order, and what does she mean by saying pacifism gives a 'green light' to evildoers?","week":2,"idea":"Anscombe's 'pernicious' critique: social order is a condition of social life and is maintainable only through the threat (and occasional use) of force; therefore Christians may justly kill and go to war, and a blanket refusal to kill simply empowers the vicious.","type":"argue"},{"q":"Explain the deontologist's reply that the right to life can 'lapse'. How does this let a Kantian endorse killing in self-defence or defence of others while still grounding ethics in rights rather than consequences — and how does it defuse the deontological argument FOR pacifism?","week":2,"idea":"The lapsing-right move: the deontological injunction is against violating a right to life, not against killing per se; a person who forces a choice between lives forfeits their own right, so killing them violates no right — turning a deontological argument for pacifism into one against it.","type":"define"},{"q":"What is the 'domestic analogy', and why is it (as Sparrow flags) essential to the standard self-defence justification of war? Build the political pacifist's case for rejecting it — then state the strongest version of the objection that the analogy still 'captures something important'.","week":2,"idea":"The domestic analogy treats states as 'big individuals' whose 'self-defence' justifies war; pacifists ask what is really being defended (territory / self-government / way of life) and whether that is worth killing for, since e.g. 'Greek culture' survives in Melbourne — but physical liquidation of a people may revive a genuine self-defence claim.","type":"apply"},{"q":"Apply the political pacifist's preferred alternatives to a concrete case: the 2003 Iraq war cost the US an estimated $4 trillion, so Bush could have offered Saddam $1 trillion to step down and still come out ahead. Do negotiated settlements, financial buy-outs, arbitration, and sanctions really make war avoidable — and are sanctions always less destructive than war?","week":2,"idea":"The 'there are always alternatives to war' premise that strengthens the consequentialist road to political pacifism, tested against Sparrow's own qualifying questions about whether non-military means always work and whether sanctions are genuinely less harmful.","type":"apply"},{"q":"Lay out Tolstoy's anarchist/Marxist argument against war: that patriotism is a device for getting working people to die for banks and mining companies, and that ordinary soldiers have more in common with the enemy in the opposite trench than with their own rulers. Apply it to who profited from and who suffered in Iraq and Afghanistan.","week":2,"idea":"The political-pacifist class analysis (Tolstoy): the nation-state is an artificial entity that makes the working class identify with ruling-class interests; named winners (oil companies, Halliburton, KBR, Blackwater, arms makers) vs losers (Iraqi/Afghan farmers and workers, poor American enlistees).","type":"apply"},{"q":"Are modern wars morally distinctive enough that war 'can no longer be justified'? Assess the two grounds — modern democratic states tending toward 'total war' via propaganda and integrated economies, and the destructive potential of modern weaponry — and weigh Sparrow's skepticism (massacres were done with spears; small arms still kill most; 'smart bombs' may make war more discriminate) against the special case of two nuclear-armed states.","week":2,"idea":"The 'modern war is different' argument and its limits: to ground full pacifism one must show morally unjustifiable casualty levels are the INEVITABLE consequence of modern war — a claim that mostly fails except, arguably, in nuclear confrontation where escalation/use may be unavoidable.","type":"argue"},{"q":"State and explain the doctrine of double effect: what are its conditions (good outcome intended, bad outcome only foreseen not intended, bad not a means to the good, proportionality), and how does the 'would you be disappointed if the bad effect didn't occur?' test distinguish intending from merely foreseeing?","week":2,"idea":"The DDE master statement: responsibility attaches chiefly to intended consequences; an act with foreseen-but-unintended bad effects can be permissible if the bad is not a means to the good and is proportionate — the disappointment test marks the intend/foresee line.","type":"define"},{"q":"Use the doctrine of double effect to compare the terrorist who bombs civilians to change government policy with the bomber pilot who kills the same number of civilians while striking a military base. Why does the DDE judge them differently — and what is the strongest objection to the distinction it draws?","week":2,"idea":"DDE applied to war: civilian deaths intended as a means (terrorist) vs foreseen-but-unintended (bomber pilot); it answers the pacifist's 'innocents always die' charge — but collapses if the intend/foresee line can't be drawn or if (as for consequentialists) only outcomes matter.","type":"apply"},{"q":"What is 'structural violence', and how does it let the pacifist argue that 'peacetime' itself kills? Connect it to Eisenhower's 'Chance for Peace' point that arms spending is a theft from the poor.","week":2,"idea":"Structural violence: even in peacetime, resources devoted to military preparedness are resources not spent removing the causes of war (injustice, poverty), so the current order is 'remarkably deadly for the poor' — pacifism as a positive, justice-seeking doctrine, not mere abstention.","type":"define"},{"q":"Pacifists are accused of 'moral squeamishness' — preferring to let others kill and be killed rather than dirty their own hands. Why does Sparrow think this objection partly backfires, given that any plausible moral theory makes me especially responsible for my own actions?","week":2,"idea":"The agent-relative defence of pacifism: the squeamishness charge can't simply be that the pacifist prioritises what she becomes responsible for through her own actions, since every credible ethics weights one's own agency — the only actions one can reliably control.","type":"probe"},{"q":"Step back: Sparrow says pacifism is a 'demanding philosophy' and that students find it easy to argue against, yet he frames the burden of proof as resting on the anti-pacifist. Why does the debate's burden play out so lopsidedly in practice, and is that lopsidedness a reason to take pacifism more seriously or a sign of its weakness?","week":2,"idea":"Meta-reflection on the dialectic: pacifism is a positive doctrine whose premises are widely shared, so its defenders end up perpetually on the back foot — Sparrow's point that we should reconsider 'who should be having to justify what' before concluding pacifists are 'crazy'.","type":"meta"},{"q":"The central debate of the week, stated directly: Is war ever morally justified? Argue both the pacifist 'never' and the just-war 'sometimes', and say where you land and why.","week":2,"idea":"The week's master question — pacifism's defining thesis ('war is never justified') against the just-war alternative ('war as a necessary evil to be regulated'), which the whole unit pivots on after this topic and Realism.","type":"debate"},{"q":"What is Realism, and how does it differ from pacifism as a challenge to the ethics of global conflict? Why does Sparrow group them together as the two 'radical challenges'?","week":3,"idea":"Realism vs pacifism as the two radical challenges: pacifism says war is never justified, realism says moral justification is irrelevant to war","type":"define"},{"q":"Realism is both a theoretical position about war and morality AND a 'school' of international relations or diplomacy. Distinguish these two senses, and say where you'd find self-described 'Realists' in the real world.","week":3,"idea":"Realism as both a philosophical position and a school of IR/diplomacy (foreign affairs departments, military think tanks)","type":"define"},{"q":"Sparrow says we should be suspicious of the 'framing' achieved by calling a position 'realism'. What's the rhetorical trick, and how realistic is 'Realism' really?","week":3,"idea":"The framing of 'realism' vs 'idealism'/'naivety'; the question of whether Realists actually have an accurate picture of the world","type":"probe"},{"q":"Realism rests on two key claims, one about the world and one about ethics. State both. Why does Sparrow note that one reason to believe the ethical claim is that one believes the claim about the world?","week":3,"idea":"Realism's two claims: the empirical claim (the world) and the ethical claim, and the dependence of the latter on the former","type":"define"},{"q":"Explain the Realist claim that the international order is 'anarchic'. How does the absence of an international sovereign supposedly make conflict between states inevitable?","week":3,"idea":"International anarchy: no global sovereign, states must self-guard, must assume others are threats, so conflict is inevitable","type":"define"},{"q":"Sparrow points out a slippage: Realists present their claim as empirical ('the way the world is') but talk of what states 'must do' and what is 'inevitable'. Why does he say a purely descriptive claim would look different, and how do these claims smuggle in prescriptions about the present?","week":3,"idea":"The slide from descriptive ('what states do') to 'what states must do' to 'what states should do'; inevitability claims as covert prescriptions","type":"probe"},{"q":"Sparrow distinguishes three versions of the Realist claim about ethics: a philosophical (category-error) claim, a descriptive claim, and a prescriptive claim. Define each precisely and explain why this distinction matters.","week":3,"idea":"The three versions of the ethical claim: philosophical/category error, descriptive, prescriptive (and why clarity/rigour in distinguishing them is the philosophical method Orend models)","type":"define"},{"q":"What would you do if the police went on strike? Would you go out robbing banks and looting electronics stores? What do you think other people would do? Would you take extra security precautions at home?","week":3,"idea":"Reflective exercise 3.1 — testing intuitions about whether order/restraint depends on an external enforcer (the anarchy argument applied to domestic life)","type":"probe"},{"q":"What happens when one nation invades another to take its territory or resources? What does the UN do? What do other nations do?","week":3,"idea":"Reflective exercise 3.2 — probing whether the international order really is anarchic and whether enforcement mechanisms exist","type":"probe"},{"q":"What is someone asking if they ask whether a particular war was justified? Or if one state was justified in invading another? Can we understand the question? Can we answer it? What sort of considerations seem relevant to you?","week":3,"idea":"Reflective exercise 3.3 — testing the category-error claim directly: do moral questions about war make sense and can they be answered?","type":"probe"},{"q":"The category-error claim says asking whether a war is morally right is like asking 'how much the colour green weighs'. Lay out the three reasons Sparrow gives for why someone might think morality doesn't apply to states' actions.","week":3,"idea":"Strong Descriptive Realism / category error: the three supporting reasons — (1) ethics needs a final court of appeal, (2) moral argument is inert, (3) moral language is a 'con job'","type":"define"},{"q":"Explain the 'shark eating a surfer' analogy. What Realist claim does it illustrate, and how does Sparrow rebut it by pointing to leaders and the domestic case (e.g. psychopaths)?","week":3,"idea":"States as amoral agents (shark analogy) vs the rebuttal that leaders' actions are morally evaluable and we still morally criticise psychopaths/individuals","type":"argue"},{"q":"Sparrow uses the 2003 Iraq War 'weapons of mass destruction' justification as an example. What Realist argument does it support, and what's Sparrow's reply about good vs bad moral arguments?","week":3,"idea":"Moral language as a 'con job' (political-pacifist point); Iraq WMD hypocrisy; rebuttal distinguishing bad moral arguments from moral argument itself","type":"case"},{"q":"Do states ever act for moral reasons? Can you think of a historical example? Do states ever act against their self-interest? Can you think of a historical example?","week":3,"idea":"Reflective exercise 3.4 — the empirical test of the descriptive claim, which is falsified by a single genuine counterexample","type":"case"},{"q":"The descriptive claim is 'vulnerable to empirical falsification'. What exactly would it take to refute it, and why does the possibility that a state acts morally for long-term advantage make this hard to establish?","week":3,"idea":"Descriptive claim falsifiability: need a case of acting against immediate self-interest for moral reasons not reducible to long-term advantage (e.g. Australia abiding by treaties to encourage reciprocity)","type":"argue"},{"q":"Sparrow argues that even self-interest is already 'moralised' — concepts like wealth, property, territory, sovereignty and security presuppose moral notions. Explain this argument and what it does to the descriptive claim.","week":3,"idea":"Self-interest as already moralised: property/sovereignty/territory cannot be given content without moral concepts, so 'pure' self-interest is illusory","type":"probe"},{"q":"Does ethics prevent violence and social disorder or encourage it? If you were stranded on a desert island with limited resources with 100 other people, would it be better if people were sometimes willing to sacrifice their self-interest for the social group, or would it be better if everybody ruthlessly pursued their own self-interest?","week":3,"idea":"Reflective exercise 3.5 — testing the prescriptive claim's premise that morality makes you 'weak' vs that cooperation/self-sacrifice produces better outcomes","type":"probe"},{"q":"Prescriptive realism comes in a prudential and a moral version. Distinguish them, and explain Sparrow's dilemma argument that the prudential 'always pursue self-interest' claim is either circular or collapses into the moral version.","week":3,"idea":"Prescriptive realism split into prudential vs moral; the circularity/collapse dilemma for the prudential 'should always pursue self-interest' claim","type":"define"},{"q":"The moral version of prescriptive realism has two arguments. The first rests on leaders' duty to their own citizens. Explain it, then give Sparrow's two objections — the 'profound nationalism' problem and the 'deeply relativist' (France/Spain) problem.","week":3,"idea":"Moral prescriptive realism argument 1: leaders' duty to citizens; objections — implausible nationalism (Sudan vs Australian tourists) and relativism (leader-of-France vs leader-of-Spain)","type":"argue"},{"q":"The second argument for moral prescriptive realism is that if every nation looks after its own affairs there'll be fewer wars overall — 'an impartial concern for human rights justifies partiality'. Why is this argument better than the first, and why does Sparrow still find its empirical premise 'strong and unlikely'?","week":3,"idea":"Moral prescriptive realism argument 2: impartiality justifies partiality (consequentialist); avoids parochialism but rests on an implausible empirical claim (wealthy-small-nation vs poor-large-neighbour case)","type":"argue"},{"q":"Walk through the 'security dilemma' using Sparrow's Ecuador/Peru example. How does it show that the universal pursuit of self-interest can make states less secure, and why is the 'enlightened self-interest' reconciliation with just war theory less stable than it looks?","week":3,"idea":"The security dilemma (Ecuador/Peru arms race) as a self-undermining objection to prescriptive realism; enlightened self-interest reconciliation undermined because 'merely appearing' moral achieves the same effect","type":"apply"},{"q":"Sparrow repeatedly asks whether Realist arguments for scepticism about ethics between states would also be reasons for scepticism about ethics generally (within the nation state). Why is this the recurring 'domestic parallel' move, and what does he say you should do before concluding ethics is invalid everywhere?","week":3,"idea":"The recurring meta-strategy of testing Realist arguments against the domestic case; the warning to revisit the Topic 1 ethical-relativism readings before rejecting ethics wholesale","type":"meta"},{"q":"Orend's reading is the set rebuttal of realism and proceeds by distinguishing different things people mean by 'realism' and the arguments for each. Why does Sparrow hold this up as a model of philosophical method, and how does Orend's 'Strong Descriptive Realism' map onto Sparrow's category-error claim?","week":3,"idea":"Orend's rebuttal method (clarity, rigour, disambiguating versions of realism); mapping Orend's 'Strong Descriptive Realism' onto Sparrow's category-error/philosophical claim","type":"meta"},{"q":"In 'What can we rescue from realism?', Sparrow says weaker versions of the arguments survive and are compatible with just war theory. List what we should retain from realism, and explain why this leaves the door open to just war theory rather than closing it.","week":3,"idea":"What is salvageable from realism: states often act self-interestedly, moral arguments are used unprincipledly, moral argument alone prevents nothing, need institutional design + humility about force + caution about 'messianic' claims — all compatible with just war theory","type":"argue"},{"q":"If, after studying this topic, a student remained a committed Realist, what does Sparrow say they should get out of the rest of the course, and why does he expect most students to be convinced by neither realism nor pacifism?","week":3,"idea":"The pedagogical framing: realism/pacifism as motivation to study Just War Theory; the unconvinced realist must treat the course as learning to understand and criticise just-war opponents","type":"meta"},{"q":"Just war theory is divided into three parts. Name them, translate the Latin, and say what question each one answers.","week":4,"idea":"The tripartite structure of JWT: jus ad bellum (when it is just to resort to war), jus in bello (restrictions on how war is fought), jus post bellum (how wars end).","type":"define"},{"q":"Walzer holds that jus ad bellum and jus in bello are 'independent'. Explain what this independence thesis means and what Walzer calls the doctrine it gives rise to about soldiers.","week":4,"idea":"The independence thesis and the 'moral equality of soldiers' — both sides are accountable to the same in bello standards regardless of the justice of their cause.","type":"define"},{"q":"Distinguish the case of Rommel (fighting an unjust war morally) from that of 'Bomber' Harris (defending a just cause wrongly). What does each illustrate about how the ad bellum and in bello assessments come apart?","week":4,"idea":"The independence thesis applied: a war's overall justice requires meeting BOTH ad bellum and in bello criteria, so the two assessments can diverge in either direction.","type":"apply"},{"q":"Sparrow finds the independence thesis 'troubling': how can someone trying to kill me in an unjust cause have the same moral privileges as I have defending myself? Lay out the case for revisionist (McMahan-style) JWT that denies independence — and then give Sparrow's pragmatic reasons for rejecting it.","week":4,"idea":"Revisionist just war theory vs. traditional JWT — reducing war's ethics to relations between individuals vs. the pragmatic, war-limiting purpose of the traditional view (surrender, length/destructiveness of wars).","type":"argue"},{"q":"Sparrow says ordinary self-defence morality treats the attacker as having 'voided their right to life', yet JWT grants both sides equal moral standing. In what way does JWT 'depart significantly from ordinary morality', and why might that departure be defensible?","week":4,"idea":"The contrast between the asymmetric rights of attacker/defender in individual self-defence and the symmetric moral equality of soldiers — showing JWT is not a simple extension of interpersonal morality.","type":"argue"},{"q":"Sparrow says the fundamental purpose of JWT is 'to limit war and reduce its horrors', and that if there is doubt the presumption must be against war — so JWT should yield the result that most wars are unjustified. Explain how this practical purpose shapes the 'weird mix' of consequentialist and deontological concerns in the war convention.","week":4,"idea":"The action-guiding, war-limiting purpose of JWT (military necessity vs. humanity) and how it explains the mixed consequentialist/deontological character of the war convention.","type":"meta"},{"q":"The notes concede 'important claims emphasised by the Realist tradition'. Set out the realist picture of the international order — no sovereign, states in a Hobbesian state of nature, peace not justice — and then give the case that this is 'overly pessimistic' and untrue of today's order.","week":4,"idea":"Realism, sovereignty, and the international order as the background to jus ad bellum — and the contested degree of structure/norms/law that the order actually contains.","type":"argue"},{"q":"On the JWT account, the crime of 'international aggression' is fundamentally a violation of sovereignty (territory), not a threat to individuals — so an invasion can be aggression 'without anyone being killed'. Use the Norwegian/Viking invasion of Darwin example to explain this, and say why it is philosophically significant.","week":4,"idea":"Aggression as a crime against the state/sovereignty (territorial violation) rather than against persons — and the resulting tension in the domestic analogy.","type":"apply"},{"q":"Defence against aggression rests on the 'domestic analogy' — just as I may defend myself, so may a state. Sparrow thinks this analogy is more contestable than usually assumed. Argue both sides: is defending 'the Australian way of life' or 'the right to govern ourselves' relevantly like an individual defending their life?","week":4,"idea":"The domestic analogy and the reductivist challenge — the gap between a threat to an individual's life and a threat to the social/political order (sovereignty), e.g. ceding Tasmania without ending the Australian way of life.","type":"argue"},{"q":"Distinguish pre-emptive self-defence from preventative self-defence. What must be true for a pre-emptive attack to count as a just cause, and why is the preventative version (e.g. the 2003 Iraq WMD rationale, recent Israeli strikes on Iran and Lebanon) said to 'licence too much war'?","week":4,"idea":"Pre-emptive vs. preventative self-defence under 'defence against aggression' — imminence and evidence of an enemy already 'at war' vs. speculative future threats, given that on the realist view every state threatens every other.","type":"define"},{"q":"Walk through the remaining four just-cause sub-headings — defence of the international order, punishment of aggression, balancing foreign intervention in a civil war, and humanitarian intervention — and for each give the core danger or controversy Sparrow identifies.","week":4,"idea":"The just cause criterion is itself plural; a war needs only one sub-cause, but several (esp. punishment, balancing in civil wars, humanitarian intervention) are controversial because they legitimate many states going to war.","type":"define"},{"q":"Why does civil war create special difficulties for JWT, and on what grounds might a state be justified in intervening to 'balance' another power's intervention? Identify the three dangers Sparrow attaches to balancing intervention, including 'wars by proxy'.","week":4,"idea":"Balancing foreign intervention in a civil war —
