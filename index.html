, and does it satisfy distinction?","answer":"It is results-based (consequentialist), and it violates distinction, because the civilians' deaths are the intended means of breaking morale.","distractors":["It is rules-based, because the general is appealing to the rule that you may do what shortens a war.","It is results-based, and it satisfies distinction, because the overall body count is lower.","It is rules-based, and it violates proportionality, because the harm is excessive."],"why":"Counting total deaths to decide what's allowed is pure consequentialism (results-based). Distinction is violated because the civilians are not a side-effect — their deaths are the very thing meant to break morale, so they are the intended means. The trap answer says distinction is satisfied because the total is lower, but a low total never makes deliberately targeting civilians count as distinction-respecting; that is double effect's intended-vs-foreseen line being missed.","kind":"results-or-rules"},{"q":"A missile strike on a tank column also kills two civilians standing nearby. An observer objects: 'That violated distinction.' What is the most accurate correction to the observer?","answer":"Distinction was not violated, because the civilians were not the deliberate target; the real question is whether their foreseen deaths were proportionate to the military gain.","distractors":["The observer is right: any strike that kills civilians violates distinction.","The observer is right, but only because two deaths is an excessive number.","The observer is wrong, because civilians near a military target lose their immunity entirely."],"why":"Distinction forbids deliberately aiming at civilians; it does not forbid every strike that foreseeably kills some. The tanks were the target, so distinction holds, and the live test is proportionality. The most tempting error — 'any civilian death violates distinction' — collapses distinction into proportionality and would make almost all warfare automatically a distinction violation, which is not what the principle says.","kind":"spot-the-mistake"},{"q":"Suppose you accept that what makes civilians immune from attack is that they are not responsible for the unjust threat the war poses (rather than that they are simply 'innocent' or 'harmless'). What follows about munitions-factory workers who knowingly build the enemy's bombs?","answer":"They become harder to classify as fully immune, since on a responsibility-based view they bear some responsibility for the threat even though they wear no uniform.","distractors":["Nothing changes: they are civilians, so they are automatically immune no matter what they do.","They are clearly legitimate targets, because anyone useful to the war effort is a combatant.","They keep full immunity, because they are unarmed and therefore harmless at the moment of attack."],"why":"A responsibility-based account ties immunity to responsibility for the unjust threat, so contributing knowingly to weapon production puts a worker's immunity in question — that's the whole point of choosing responsibility over 'innocence' or 'harmlessness' as the ground. The 'automatically immune' answer ignores that you adopted responsibility as the test; the 'harmless so immune' answer is exactly the rival ground you set aside, which a responsibility view rejects.","kind":"what-follows"},{"q":"A commander says: 'This strike will destroy a minor radar post but will also collapse an apartment block, killing roughly 200 civilians as a side-effect. The deaths aren't intended, so double effect clears us.' What is the strongest objection?","answer":"Double effect also requires the foreseen harm to be proportionate to the military gain, and 200 deaths for a minor radar post is plainly excessive — so the strike fails despite the deaths being unintended.","distractors":["Double effect never permits any civilian deaths, intended or not, so the commander has misused it entirely.","The deaths are actually intended, because the commander knew they would happen.","The strike violates distinction, because an apartment block is a civilian building."],"why":"Double effect has more than one condition: the harm must be unintended AND proportionate. Even granting the deaths are unintended, 200 dead for a trivial target fails proportionality, so the objection bites there. The tempting wrong answer — 'knowing they'll happen means intending them' — is the classic collapse of foresight into intention; foreseeing a side-effect is not the same as aiming at it, which is exactly the line double effect draws.","kind":"best-objection"},{"q":"Two strikes each kill exactly 5 civilians. In Strike A, the 5 die because shrapnel from an attack on a command bunker reaches a nearby street. In Strike B, the 5 are deliberately killed to send a warning that makes the enemy surrender. Someone says: 'Same number dead, so the two strikes are morally equivalent.' What is the mistake?","answer":"It ignores the intended-versus-foreseen distinction: in A the deaths are an unintended side-effect of a legitimate target, while in B they are intended as a means, which double effect forbids regardless of the matching body count.","distractors":["There is no mistake: identical outcomes mean identical moral status, since only results matter.","The mistake is that Strike A actually killed more people once you count the bunker's occupants.","The mistake is that Strike B is the proportionate one, since a warning that ends the war saves lives."],"why":"For a rules-thinker, how the deaths come about matters: A's deaths are foreseen side-effects of hitting a military target, while B's are the intended means of coercion, which double effect rules out no matter the total. The 'only results matter' answer is exactly the consequentialist assumption the question is testing — equating the strikes by body count erases the intention/foresight line that double effect is built on.","kind":"spot-the-mistake"},{"q":"A military designs a chemical agent specifically engineered to cause slow, agonising, disfiguring deaths in order to terrify enemy troops into surrender. A general defends it: 'We only fire it at uniformed soldiers on the battlefield, never at civilians, and it ends battles faster, so it saves lives overall.' Which principle does this weapon most clearly violate, even granting the general's claims are true?","answer":"Mala in se (the weapon is evil in itself) — the cruelty designed into it makes it wrong to use regardless of who it targets or how good the outcome is.","distractors":["Distinction — it is being aimed at civilians rather than combatants, so it breaks non-combatant immunity.","Proportionality — the suffering it causes is greater than any military advantage it gains.","Jus ad bellum just cause — using such a weapon shows the war was never justified to begin with."],"why":"Mala in se means a means is wrong intrinsically, by its nature, not because of who it hits or how the sums turn out. The general's defence actually concedes distinction (only soldiers) and offers a results-based proportionality/consequentialist case — so those aren't where it fails. It still fails because deliberately engineering hideous suffering is evil in itself. The tempting wrong answer is distinction: but the scenario explicitly says it's fired only at combatants, so distinction is satisfied. Note only a rules-based (deontological) thinker can call something mala in se at all; a pure consequentialist has no room for 'evil in itself.'","kind":"scenario"},{"q":"Sample reasoning: 'A nerve gas that drifts on the wind and kills everyone in an area, soldier and child alike, can't be aimed only at fighters. So no matter how we try to use it, it will slaughter innocents — that's why it should never be used.' Is this argument working in a results-based (consequentialist) way or a rules-based (deontological) way, and via which principle?","answer":"It is a rules-based objection running through distinction — the weapon is condemned because it inherently can't separate combatants from non-combatants, breaking civilian immunity by its very nature.","distractors":["It is results-based: it condemns the gas because the total death toll is too high relative to the military benefit (proportionality).","It is rules-based via mala in se: the gas is being called evil in itself, independent of who it happens to kill.","It is results-based via distinction: it weighs the outcome of civilian deaths against the outcome of winning faster."],"why":"The argument's core is that the weapon CANNOT discriminate combatants from civilians — that's the distinction principle, and condemning a means for inherently violating a rule (immunity of the innocent) is rules-based reasoning. The most tempting trap is reading it as proportionality: but the argument never weighs the death toll against military gain; it says the weapon is simply incapable of sparing innocents at all. 'Distinction' is about WHO you hit; 'proportionality' is about whether even justified collateral harm is excessive — don't fuse them. (Also note: indiscriminateness and mala in se are different charges — here the charge is indiscriminateness, not intrinsic evil.)","kind":"results-or-rules"},{"q":"Someone argues: 'Terrorism is no worse than ordinary war. Conventional armies kill huge numbers of innocent civilians too — think of the firebombing of cities. So condemning terrorists while excusing soldiers is just hypocrisy.' What is the STRONGEST reply that still takes the challenge seriously?","answer":"There's a real moral difference in the relationship to the killing: terrorism deliberately targets innocents as its means of coercion, whereas just war permits civilian deaths only as a foreseen, unintended, proportionate side-effect — so intending innocent deaths and merely foreseeing them are not morally the same.","distractors":["The reply fails — if both kill innocents, the outcomes are the same, so there's no real moral difference and the challenge wins.","Terrorism is worse simply because it is carried out by non-state groups, whereas states have legitimate authority to use force.","Terrorism is worse because it kills more people overall than conventional war does."],"why":"The strongest reply uses the intention-vs-foresight distinction (the basis of double effect): the terrorist AIMS at innocent deaths and uses them as a tool of coercion, while a just combatant may only foresee civilian deaths as an unintended, proportionate side-effect. That's a genuine moral difference even when raw body counts are similar. The 'reply fails' option mistakes equal outcomes for equal morality — exactly the foreseen/intended confusion the question targets. The 'non-state actor' option is weak because states can commit terrorism too (state terror/death squads), so legitimate authority doesn't draw the line. And 'kills more people' is just false as a general claim — war often kills far more.","kind":"best-objection"},{"q":"Suppose you accept that what makes terrorism distinctively wrong is that it DELIBERATELY targets innocent, non-responsible people to coerce others through fear. If you hold that view consistently, which of the following must you also accept?","answer":"A state can be guilty of terrorism — if a government deliberately attacks its own or another population's innocents to spread fear and coerce, it is doing the very thing that makes terrorism wrong.","distractors":["Terrorism is always morally worse than any conventional war, because conventional war never deliberately targets civilians.","An attack that kills civilians by accident or as a side-effect must count as terrorism, since the result is dead innocents either way.","Killing enemy soldiers in an ambush can count as terrorism if the aim is to frighten the enemy into surrender."],"why":"If the wrong of terrorism is the deliberate targeting of innocents to coerce through fear, then whoever does that — including a state — is committing terrorism; the definition is about the act, not the identity of the actor. The 'always worse than war' option doesn't follow: the definition pins down what's wrong, not that it always outranks every war's harms. The 'accidental/side-effect' option contradicts the definition's word 'deliberately' — foreseen side-effect deaths aren't terrorism. The 'frighten soldiers' option fails because soldiers aren't the innocent non-combatants the definition protects — coercive fear alone isn't enough; the targets must be innocents.","kind":"what-follows"},{"q":"Apply the idea to a real case: a strategic nuclear weapon is dropped on a city, killing mostly civilians, to shock the enemy government into surrendering. A student says, 'This is fine if it really shortens the war and saves more lives than it costs — and if it does, it can't be mala in se, because look how much good it did.' What is the mistake in this reasoning?","answer":"It collapses two separate questions: whether something is mala in se is about whether the act/weapon is wrong in itself, not about whether its consequences come out positive — so 'it did a lot of good' can't settle the mala in se charge, which a rules-based thinker presses precisely against good outcomes.","distractors":["The mistake is the arithmetic — the bombing didn't actually save more lives than it cost, so the consequentialist case simply fails on the numbers.","The mistake is ignoring jus ad bellum — whether the bomb is mala in se depends on whether the war was just to start.","The mistake is confusing distinction with proportionality — the real problem is that the strike was disproportionate, not that it was intrinsically evil."],"why":"The student is using a results-based (consequentialist) test to dismiss a rules-based (deontological) charge. Mala in se asks whether the means is wrong by its nature — indiscriminate, uncontainable mass killing of innocents — and that question stands even if the consequences are favourable. Saying 'it did good, so it's not evil-in-itself' just changes the subject. The 'arithmetic' option stays inside the consequentialist frame and so repeats the student's error rather than diagnosing it. The jus ad bellum option confuses starting-vs-fighting: mala in se is an in-bello question about means, independent of whether the war was just to begin. The proportionality option mistakes 'very harmful / excessive' for 'evil in itself' — the whole point of mala in se is that some acts are barred even when the proportion of gain to harm might look acceptable.","kind":"spot-the-mistake"},{"q":"A government argues: \"A strategic nuclear strike on an enemy city would kill so many civilians and spread fallout so far that there is simply no way to aim it only at fighters or to keep its effects within the battlefield.\" Taken on its own, which jus in bello principles does this argument say a city-busting nuke cannot satisfy?","answer":"Distinction (can't target only combatants) and proportionality (uncontainable effects make the harm excessive).","distractors":["Last resort and reasonable prospect of success.","Distinction and legitimate authority.","Right intention and just cause."],"why":"The argument has two prongs: it can't be aimed only at fighters (a distinction failure) and its effects can't be contained, so the harm dwarfs any gain (a proportionality failure). The tempting wrong pick swaps in last resort/prospect of success, but those are jus ad bellum tests about WHETHER to go to war, not about whether a particular strike spares civilians or keeps harm in bounds. Sorting in-bello (how it's fought) from ad-bellum (whether to fight) is the classic trap here.","kind":"scenario"},{"q":"Someone claims nuclear weapons are 'mala in se' (evil in themselves). What is the strongest objection a pure consequentialist would raise against even using that label?","answer":"A pure consequentialist thinks only outcomes matter, so nothing can be 'evil in itself' independent of its results — a nuke is just very destructive, and could in principle be permissible if it produced the best outcome.","distractors":["A consequentialist would object that nuclear weapons actually CAN be aimed precisely enough to satisfy distinction.","A consequentialist would object that the harm isn't really uncontainable, so proportionality is met.","A consequentialist would object that the threat of nukes is fine even if using them is wrong."],"why":"'Mala in se' is a rules-based (deontological) idea — it says an act is wrong by its nature regardless of consequences. A consequentialist, who judges purely by results, has no room for 'wrong in itself': the deepest objection isn't about the empirical facts of fallout but about the very category. The tempting distractors are factual quibbles about distinction/proportionality, but those concede the consequentialist's framework rather than attacking the 'in itself' label, which is the actual point of friction.","kind":"best-objection"},{"q":"Read this reasoning: \"We should keep our nuclear arsenal. Yes, actually firing it would be monstrous — but as long as everyone keeps their nukes, no one dares attack, fewer people die overall, and peace holds. So deterrence is justified.\" Is this argument primarily results-based or rules-based?","answer":"Results-based (consequentialist) — it justifies the arsenal entirely by the good outcome (peace, fewer deaths overall), not by any rule about the act itself.","distractors":["Rules-based, because it admits that actually firing would be monstrous.","Rules-based, because it appeals to a duty to protect one's own citizens.","Neither — it's about intention versus foresight, not results versus rules."],"why":"The justification rests entirely on the payoff — peace and fewer total deaths — which is the signature of consequentialist reasoning. The tempting wrong answer points to the line 'firing would be monstrous' and reads that as a rule, but conceding that the ACT is wrong while defending the POLICY by its outcomes is still results-thinking; it doesn't treat the act's wrongness as decisive. That gap between 'the act would be wrong' and 'but the outcome justifies the policy' is exactly what the deterrence paradox exploits.","kind":"results-or-rules"},{"q":"The deterrence paradox is often put as: 'Can it be ethical to threaten to do something it would be unethical to do?' Why does sincere nuclear deterrence make this a genuine puzzle, rather than an easy 'yes'?","answer":"Because for the threat to actually deter, the state must sincerely INTEND to incinerate cities if attacked — so it isn't merely bluffing; it has formed a real intention to do something that (as the mass murder of innocents) would be wrong to carry out.","distractors":["Because threatening is always exactly as wrong as doing, so there's no real distinction to puzzle over.","Because the threat itself already kills civilians through fallout, so it fails distinction before anything is fired.","Because deterrence confuses jus ad bellum with jus in bello."],"why":"The puzzle bites precisely because credible deterrence isn't a bluff — it requires genuinely intending the wrongful act, and many rules-thinkers hold that forming an intention to do an atrocity is itself corrupting, even if you never act. The first distractor dissolves the puzzle by denying any threaten-vs-do gap (then there'd be nothing to debate); the puzzle exists exactly because intending and doing usually feel different, yet here intending seems to inherit the wrongness of doing.","kind":"scenario"},{"q":"A student says: 'Deterrence is fine — you're only THREATENING to bomb cities, you're not actually bombing anyone, and a threat can't be murder.' What's the mistake in this reasoning?","answer":"It ignores that an effective deterrent requires sincerely intending to carry out the threat — so the person isn't morally 'clean'; they've committed to doing the very thing they admit would be wrong, which is the heart of the threaten-vs-do problem.","distractors":["The mistake is thinking nuclear weapons could ever satisfy proportionality.","The mistake is confusing whether it was right to start the war with how the war is fought.","The mistake is treating foreseen civilian deaths as if they were intended."],"why":"The student treats 'merely threatening' as morally costless, but a credible threat is backed by a real intention to act — you can't deter by intending NOT to follow through. So the gap between threatening and doing is far narrower than claimed. The 'foreseen vs intended' distractor is tempting because intention is in play, but here the problem is the opposite: the deterrer fully INTENDS the killing (conditionally), so this isn't a foresight-only side-effect case at all.","kind":"spot-the-mistake"},{"q":"Apply the concepts to Hiroshima. A defender says: 'Dropping the bomb was justified because it shocked Japan into surrendering and so saved more lives than a land invasion would have cost.' If a critic accepts that nuclear weapons are mala in se, what follows for how the critic must respond?","answer":"The critic must reject the defence even if the life-saving numbers were true, because 'evil in itself' means the act is wrong regardless of its outcomes — a good consequence can't redeem an intrinsically wrong act.","distractors":["The critic should agree the bombing was justified, since saving lives satisfies proportionality.","The critic must argue the bomb didn't actually cause Japan's surrender — that's the only available reply.","The critic should say it was wrong to start the war, so the bombing was wrong too."],"why":"Calling something mala in se is a rules-based commitment: the act is off-limits whatever the results, so the critic can grant the casualty math and STILL condemn it. The second distractor (disputing whether the bomb caused surrender) is a real consequentialist line of attack, but it isn't what 'mala in se' commits you to — that empirical move fights on the defender's results-based turf, whereas the mala in se critic's whole point is that the results are beside the point. The last distractor confuses ad bellum (starting the war) with in bello (the bombing's conduct).","kind":"apply"},{"q":"A state, while NOT in any declared war, uses a drone to kill a named man it has decided is a terrorist organiser. Critics call this 'extrajudicial execution,' while the state calls it 'an act of war.' What is the CENTRAL question this disagreement turns on?","answer":"Whether the killing falls under the rules of WAR (where you may kill enemy combatants on sight) or the rules of LAW ENFORCEMENT (where a suspect must be arrested and tried, not executed).","distractors":["Whether the strike was proportionate — i.e. whether the military gain outweighed the civilian harm caused.","Whether it was right to start the conflict in the first place (jus ad bellum) rather than how it was fought.","Whether the drone operator was at any personal risk when carrying out the killing."],"why":"Targeted killing happens OUTSIDE a declared war, so the live question is which rulebook applies: in war you may kill a combatant without trial, but in law enforcement you must arrest and try a suspect. That 'war or execution?' framing is exactly the dispute. The proportionality distractor is tempting because it's a real drone worry, but proportionality only kicks in once you've decided which rules apply — it doesn't settle whether this is a legitimate combatant-killing or an execution-without-trial.","kind":"scenario"},{"q":"A drone program runs 'signature strikes': instead of identifying a specific named person, it kills people whose PATTERN OF BEHAVIOUR (movements, gatherings, associations) matches that of militants. Why do critics single this out as especially troubling?","answer":"You may be killing people whose identity — and therefore whether they are actually a fighter at all — you do not even know, so you cannot be sure you are targeting a legitimate combatant rather than a civilian.","distractors":["Because behaviour-based killing is always disproportionate — the military gain can never outweigh the harm.","Because it kills people who have been correctly identified as combatants but without first giving them a chance to surrender.","Because the operator faces no personal risk, which makes any behaviour-based killing unfair."],"why":"The whole point of signature strikes is that you target by behaviour rather than confirmed identity, so you risk killing someone you can't even confirm is a fighter — a direct threat to DISTINCTION (only deliberately target genuine combatants). The 'always disproportionate' distractor confuses distinction with proportionality: the problem isn't that the harm outweighs the gain, it's that you can't be sure your target is a legitimate one in the first place.","kind":"scenario"},{"q":"Two intelligence officers debate firing a cruise missile at a café where terror plotters are meeting; the strike will kill 12 innocent bystanders. Officer A says: 'We aim ONLY at the plotters; the bystanders' deaths are a foreseen side-effect, not our goal, and 12 deaths are not excessive given the mass-casualty attack we'd prevent — so it's permissible.' Officer A's reasoning relies on which principle?","answer":"The doctrine of double effect: a foreseen-but-unintended harm to civilians can be permissible if it is not the means or the aim and is proportionate to the good achieved.","distractors":["Non-combatant immunity (distinction): the bystanders are civilians, so killing them is always forbidden regardless of intention or proportionality.","Mala in se: a cruise missile is a weapon evil in itself, so using it can never be justified.","Liability: the bystanders are responsible for an unjust threat, which is what makes them legitimate targets."],"why":"Officer A leans on TWO moves at once — intending only the plotters while merely foreseeing the bystander deaths (intention vs foresight), plus proportionality — which is precisely the doctrine of double effect. The distinction distractor is the tempting trap: it would say civilian deaths are flatly forbidden, but double effect's whole job is to explain when foreseen (not intended) civilian deaths can be permitted, so 'always forbidden' misstates the principle Officer A is actually using.","kind":"results-or-rules"},{"q":"Someone defends drone strikes like this: 'They are more precise than any other weapon, they kill fewer civilians than a ground invasion would, and they keep our own soldiers out of harm's way. On balance fewer people die, so we should use them.' Is this reasoning results-based or rules-based, and what is the strongest objection IN ITS OWN TERMS?","answer":"It is results-based (it judges drones purely by outcomes), and the strongest same-terms objection is blowback: if civilian deaths radicalise people and breed more enemies, drones may produce WORSE outcomes overall and so fail on their own consequentialist measure.","distractors":["It is rules-based, and the strongest objection is that precision violates non-combatant immunity.","It is results-based, and the strongest objection is that killing a suspect without trial is wrong in itself regardless of the numbers.","It is rules-based, and the strongest objection is that the operator faces no personal risk."],"why":"The defence counts up outcomes (more precise, fewer dead, troops safe), so it's consequentialist. To object 'in its own terms' you must beat it on outcomes — blowback does exactly that by arguing the body-count actually rises over time. The 'wrong in itself' option is a genuine objection but it's a RULES-based one; it changes the subject rather than defeating the results argument on its own ground, so it isn't the strongest reply 'in its own terms.'","kind":"best-objection"},{"q":"In August 2021 a US drone strike in Kabul killed 10 civilians, including children, after the target was wrongly assessed as an imminent threat. Suppose investigators conclude the operators genuinely tried to hit only a legitimate target but were careless in checking who else was present. Which principle is most directly at stake?","answer":"Precautions in attack: even when you intend to strike only a legitimate target, you must take adequate care to verify the target and avoid foreseeable civilian harm.","distractors":["Mala in se: the strike used a weapon evil in itself, so it was wrong no matter how carefully it was carried out.","Proportionality of starting the war (jus ad bellum): the deaths show the wider conflict should never have begun.","Moral equality of combatants: the civilians were as liable to be killed as any enemy soldier."],"why":"The stipulated facts — right intention but careless verification — point straight at precautions in attack, the in-bello duty to take real care to confirm targets and spare civilians. The jus ad bellum distractor is the classic START-vs-FIGHT confusion: whether the war should have begun is a separate question from whether this particular strike was carried out with due care, and the case is about the latter.","kind":"apply"},{"q":"A drone operator kills enemy fighters from thousands of miles away at zero personal risk. A student argues: 'There's something troubling about this asymmetry — risk-free killing seems to make the fight unfair, so we should make it more even, like asking our soldiers to remove their body armour.' What is the mistake in this reasoning?","answer":"It assumes 'fairness' between fighters requires equal risk, but protecting your own people (force protection) is normally a legitimate goal; the real worry about asymmetry isn't that one side is safer but whether riskless killing changes the moral character of the act or makes resorting to force too easy.","distractors":["The mistake is treating asymmetry as a problem at all — since outcomes are all that matter, a safer way to kill is simply better and raises no moral issue.","The mistake is confusing asymmetry with distinction — the only real question is whether the operator hit a combatant rather than a civilian.","The mistake is forgetting that lowering risk to your troops automatically violates proportionality."],"why":"The flawed step is equating moral fairness with equal danger, which would absurdly demand stripping off body armour; force protection is ordinarily fine, and the genuine asymmetry worry lies elsewhere (does risk-free killing degrade the act, or make war too easy to start?). The 'no moral issue at all' distractor over-corrects into pure consequentialism and throws away the real, distinct concern about riskless war that the topic is asking you to recognise.","kind":"spot-the-mistake"},{"q":"A fully autonomous weapon (no human picking the target) hits a wedding convoy it misclassified as fighters, killing 14 civilians. An investigation tries to find who should answer for the killing. The commander says \"I didn't choose this target, the machine did.\" The programmer says \"I couldn't have predicted this specific decision.\" And you obviously can't put a machine on trial. According to the responsibility-gap argument, what does this case show?","answer":"No one can be fairly held responsible for the wrongful killing, and since fighting justly requires that someone CAN be held responsible, using the weapon this way is illegitimate.","distractors":["The weapon simply failed the principle of distinction, so the problem is a targeting-accuracy bug that better sensors would fix.","The commander is automatically responsible, because anyone who deploys a weapon is liable for everything it does regardless of control.","The killing was proportionate or not depending on the military gain, so this is really a proportionality question, not a responsibility one."],"why":"The responsibility-gap argument is precisely that NONE of the three candidates (programmer, commander, machine) can fairly be held answerable, and that fighting justly requires someone be answerable for a wrongful death — so the gap itself makes the use illegitimate, separate from how good the sensors are. The tempting wrong answer treats it as a distinction/accuracy bug: but the argument's whole point is that even a perfectly accurate machine would leave the same gap whenever it DOES err, because accountability, not aim, is what's missing.","kind":"scenario"},{"q":"Someone argues: \"We should build autonomous weapons because, unlike scared, angry, exhausted soldiers, robots feel no fear, rage, or urge for revenge and won't commit atrocities like My Lai. If they end up killing fewer civilians overall, refusing to build them is the choice that gets more innocents killed.\" Is this reasoning results-based or rules-based?","answer":"Results-based — it judges the weapons entirely by their outcomes (fewer civilians killed on balance), concluding we ought to use whatever produces the better result.","distractors":["Rules-based — it appeals to the soldier's duty not to commit atrocities, which is a fixed moral rule.","Neither — it's purely a factual/engineering claim about robot capabilities, with no moral theory behind it.","Results-based, but only because it mentions My Lai; without the real example it would be a rules-based argument."],"why":"The argument's entire force is comparative outcomes: whichever option leaves fewer innocents dead is the one we're obligated to choose. That is consequentialist reasoning. The tempting 'rules-based' reading is fooled by the word 'atrocities' — but the argument doesn't say atrocities are wrong-in-themselves and forbidden whatever the cost; it says we should pick the option with the better body count. Mentioning My Lai is just evidence for the outcome claim, not a rule.","kind":"results-or-rules"},{"q":"A defender of autonomous weapons says: \"Even if no single person can be held responsible when a robot kills wrongly, that doesn't matter — what matters is whether the robots reduce total civilian deaths. Accountability is a nice-to-have; saved lives are what count.\" What is the strongest objection a rules-based critic would give?","answer":"Good outcomes don't fill the accountability gap: justice in war requires that someone can answer for a wrongful killing, and a lower body count doesn't supply the missing person to hold responsible — so the wrong remains even if fewer die.","distractors":["The robots probably won't actually reduce civilian deaths, because their sensors can't tell combatants from civilians as well as humans can.","The defender has confused jus ad bellum with jus in bello — accountability is about whether the war was just to start.","Accountability does exist, because the commander who switched the robot on is always fully responsible for whatever it does."],"why":"The rules-based critic's distinctive move is that some requirements (here, that a wrongful killing be answerable-for) hold regardless of outcomes — so pointing at a better body count simply doesn't address the wrong. The tempting distractor ('sensors aren't good enough') is itself a RESULTS argument; it concedes the defender's frame and just disputes the facts. The genuinely rules-based objection refuses the frame: even granting fewer deaths, the accountability requirement is unmet.","kind":"best-objection"},{"q":"Sparrow's second argument is that being killed by a machine that 'decides' your death fails to respect you as a person. A student restates it as: \"Autonomous weapons are wrong because they kill more civilians than human soldiers do.\" What's the mistake in this restatement?","answer":"It swaps a respect/dignity argument (a rules-based claim about HOW you're treated when killed) for an outcome claim about HOW MANY are killed — collapsing a deontological point into a consequentialist one.","distractors":["It's not a mistake; the respect argument just is the claim that robots kill more civilians.","The mistake is that it should say robots kill FEWER civilians, not more.","The mistake is that respect is a jus ad bellum concern, so it belongs to the decision to start the war, not to how killing is done."],"why":"The respect argument says something goes wrong in the manner of the killing — no human moral agent acknowledges the gravity of ending your life — and this wrong would stand even if the machine killed nobody extra. Recasting it as 'kills more civilians' turns a claim about treatment into a claim about totals, i.e. turns a rule into a result. That is exactly the consequentialism-vs-deontology confusion the topic warns against; the count of dead is a different argument altogether.","kind":"spot-the-mistake"},{"q":"Suppose you accept the responsibility-gap argument: a wrongful killing is illegitimate when no one can fairly be held responsible for it. A new autonomous weapon is proposed that keeps a human 'on the loop' — a trained officer must review and approve each target the machine proposes before it fires. If you're consistent, what follows?","answer":"This system is far less troubled by the gap argument, because an identifiable human makes (and can be held responsible for) each lethal decision — which is exactly why critics demand 'meaningful human control.'","distractors":["It changes nothing: any weapon with software in it falls under the responsibility-gap objection regardless of human involvement.","It makes things worse, because now both the human and the machine are responsible, so responsibility is split and no one is fully accountable.","The gap argument no longer applies because the weapon is now more precise, so it also automatically satisfies proportionality."],"why":"The gap argument targets killings where NO human makes the lethal choice. Restore a human who decides and can answer for each shot, and the gap closes — which is the rationale behind 'meaningful human control.' The tempting 'any software counts' distractor misreads the argument: it's about absence of a responsible decider, not the mere presence of code (drones run on software yet have a human pulling the trigger and remain accountable). Precision (third option) is a separate matter that doesn't settle responsibility.","kind":"what-follows"},{"q":"On the day the 2021 Kabul drone strike killed 10 civilians, a human operator made the call to fire based on faulty intelligence. A commentator says, \"This proves we should hand these decisions to autonomous machines, since the human got it wrong.\" Using the W11 concepts, what's the sharpest reply?","answer":"The Kabul case shows a human CAN be identified and held responsible for a mistaken strike — exactly what the responsibility-gap argument says we'd LOSE with a fully autonomous weapon, so it cuts against handing over the decision, not for it.","distractors":["The commentator is right: removing the fallible human is the obvious fix, since machines don't act on faulty intelligence.","The case is irrelevant to the robot debate because a drone with a human operator isn't an autonomous weapon at all.","The reply should be that the strike was disproportionate, which is a separate jus ad bellum failure."],"why":"The case is a clean illustration of accountability working: there's a human whose decision can be investigated, blamed, and answered for. Replacing that human with an autonomous system removes the one thing the gap argument says justice requires. The tempting first distractor assumes machines wouldn't err on bad intelligence — but a machine fed the same faulty data could make the same mistake AND leave no one to answer for it, which is worse, not better, on the gap view.","kind":"apply"},{"q":"A debate is set up as 'precision-loving futurists vs. technophobes.' One side says robots will kill fewer innocents so we should build them; the other says it's intrinsically wrong to let a machine choose who dies, whatever the body count. What is the deepest way to characterise this disagreement?","answer":"It's the same results-vs-rules clash that runs through the whole unit: one side judges by outcomes (fewer deaths), the other by a rule about what may never be done (a machine deciding a death), so they're applying two different moral theories, not just disagreeing about facts.","distractors":["It's a purely empirical dispute that will be settled once we know whether robots actually kill fewer civilians.","It's a disagreement about whether the war was just to start (jus ad bellum) versus how it's fought (jus in bello).","It's about whether the weapons satisfy distinction, with one side saying yes and the other saying no."],"why":"The two sides aren't really arguing about facts — one weighs outcomes (consequentialism), the other holds a line that may not be crossed regardless of outcomes (deontology). That's the master key dressed in a robot costume. The tempting 'purely empirical' distractor is wrong because even if everyone agreed robots kill fewer civilians, the rules-based side would still object — proving the disagreement is about which moral theory governs, not about the numbers.","kind":"results-or-rules"}],"viva":[{"q":"Realism, pacifism and just war theory are the three big traditions for thinking about war. Lay out what each one says, and tell me which you find most convincing and why.","week":1,"idea":"the three traditions (realism / pacifism / just war theory)","type":"define"},{"q":"Just war theory says a war must meet a set of conditions (just cause, last resort, proper authority, right intention, reasonable chance of success, proportionality). Which of these do you think is the most important — and is it ever right to fight a war that fails one of them?","week":1,"idea":"jus ad bellum criteria are jointly necessary (just cause, last resort, proper authority, right intention, reasonable chance of success, proportionality)","type":"define"},{"q":"If declaring a war unethical or illegal doesn't actually stop it and no one can take a country to court, why does it matter whether we judge wars morally at all? What would you say to the realist who asks 'so what'?","week":1,"idea":"why moral/legal arguments matter when no one can enforce them — the unit's framing question","type":"probe"},{"q":"Is war ever morally justified? Make the case for the pacifist 'never' and the just-war 'sometimes', and tell me where you land.","week":2,"idea":"The week's master question — pacifism's defining thesis ('war is never justified') against the just-war alternative ('war as a necessary evil to be regulated'), which the whole unit pivots on after this topic and Realism.","type":"debate"},{"q":"Is it ever permissible to kill someone to defend something short of your own life — your property, your right to vote, your way of life? Where do you draw the line between an interest worth killing for and one that isn't, and what does that line reveal?","week":2,"idea":"Reflective exercise 2.3 verbatim: the chocolate-to-murder escalation ladder. Probes the intuition that some interests are worth killing to defend and others are not, forcing you to locate and justify the threshold the (personal) pacifist denies exists.","type":"probe"},{"q":"What's the difference between personal pacifism (no individual may ever kill) and political pacifism (states may never go to war)? Which is the more defensible position, and why?","week":2,"idea":"The central distinction of the week: personal pacifism = relations between individuals (no one may ever kill); political pacifism = relations between states (war is never justified). Personal is more radical morally; political is more radical because it rests on a deeper political analysis of war's nature.","type":"define"},{"q":"The realist says asking whether a war is morally right is like asking how much the colour green weighs — morality just doesn't apply to states. Is the realist right? Make the case and then say where it fails.","week":3,"idea":"Strong Descriptive Realism / category error: the three supporting reasons — (1) ethics needs a final court of appeal, (2) moral argument is inert, (3) moral language is a 'con job'","type":"define"},{"q":"Realists argue the international order is 'anarchic' — no world government, so states must look out for themselves and conflict is inevitable. Do you buy that picture of the world, and does it really follow that ethics drops out?","week":3,"idea":"International anarchy: no global sovereign, states must self-guard, must assume others are threats, so conflict is inevitable","type":"define"},{"q":"Even if realism is wrong overall, what should we take from it? What does the realist get right about how states actually behave, and how is that compatible with just war theory?","week":3,"idea":"What is salvageable from realism: states often act self-interestedly, moral arguments are used unprincipledly, moral argument alone prevents nothing, need institutional design + humility about force + caution about 'messianic' claims — all compatible with just war theory","type":"argue"},{"q":"Just war theory says a soldier fighting an unjust war has the same moral right to kill as the soldier defending against him — the 'moral equality of soldiers'. Is that defensible? How can someone trying to kill me in an unjust cause have the same rights as I do?","week":4,"idea":"Revisionist just war theory vs. traditional JWT — reducing war's ethics to relations between individuals vs. the pragmatic, war-limiting purpose of the traditional view (surrender, length/destructiveness of wars).","type":"argue"},{"q":"The standard defence of war rests on the 'domestic analogy' — a state may defend itself just as an individual may. Is defending 'the national way of life' or 'the right to govern ourselves' really like an individual defending their life? Argue both sides.","week":4,"idea":"The domestic analogy and the reductivist challenge — the gap between a threat to an individual's life and a threat to the social/political order (sovereignty), e.g. ceding Tasmania without ending the Australian way of life.","type":"argue"},{"q":"Walzer kept finding new wars to justify across editions of his book, and critics say a clever person can rationalise almost any war through just war theory. Does the flexibility of just war theory prove the pacifist's point that it just makes war too easy to justify?","week":4,"idea":"The pacifist/meta critique of JWT: that by allowing so many grounds for war it is prone to abuse and rationalisation, set against JWT's self-understanding as primarily a tool to dissuade states from war.","type":"meta"},{"q":"When a government is slaughtering its own people, should other states intervene militarily — or does respect for sovereignty rule that out? Make the strongest case on each side and say where you land.","week":5,"idea":"Central debate: sovereignty (Westphalian peace/stability by limiting causes of war) vs R2P (rights are universal); the imperialism/abuse objection and R2P's three replies.","type":"argue"},{"q":"Critics say humanitarian intervention is just a fig leaf for imperialism — powerful states picking and choosing where to intervene to suit themselves. Is that a fatal objection, or can the idea of humanitarian intervention survive it?","week":5,"idea":"Imperialism objection and replies: (1) it's early days — norms may bind powerful states too; (2) a principle isn't void just because it can be abused; (3) better some crises addressed than none.","type":"argue"},{"q":"Is your nationality something you deserve? Does someone born in Australia have any more right to be there than someone born in Afghanistan — and what does your answer imply about whether human rights are truly universal?","week":5,"idea":"Probing intuitions: the moral arbitrariness of nationality — tests whether human rights are universal and whether borders carry moral weight, the foundation of R2P's universalism.","type":"probe"},{"q":"In war, who counts as a legitimate target and who doesn't? Think about soldiers, munitions-factory workers, farmers who feed the army, voters who supported the war, propagandists — where exactly does the line fall, and can it be drawn cleanly at all?","week":6,"idea":"Forces the student to locate the combatant/non-combatant line on a continuum of war-involvement; surfaces the munitions-worker vs farmer puzzle, the status of medics/cooks, voters/supporters, and the 'as soldiers vs as people' distinction. Demonstrates that none of the three candidate criteria (personnel, innocence, combatant-status) draws a clean line.","type":"probe"},{"q":"What actually justifies killing an enemy soldier — that he's a threat to you, that he's responsible for an unjust war, or that he consented to the risk by signing up? Pick the account you find strongest and say what it can't explain.","week":6,"idea":"Three objections: (1) it assumes what it sets out to prove — we expect people to shoot at soldiers, but that isn't the same as their being justified, and the just-cause soldier is doing the right thing so shouldn't be liable; (2) it can't explain killing conscripts who had no choice; (3) it extends to civilians, who arguably also accept liability by not emigrating while standing to gain from victory. Also: many join the military only for a wage/training/education.","type":"argue"},{"q":"The rules of war seem to favour the militarily powerful, who can afford precision weapons, while weaker fighters using crude weapons get branded war criminals. Does this make the laws of war a tool of the strong — and does it mean the weak shouldn't fight back?","week":6,"idea":"Precision weapons make distinction/proportionality easy for the strong and near-impossible for the weak, so jus in bello may effectively demand the weak surrender; the claim that jus in bello is a tool of powerful states is used to justify attacks on non-combatants for political ends — i.e. terrorism, next week's topic. But: what is jus in bello worth if it rules nothing out?","type":"meta"},{"q":"What is terrorism? Is there anything all terrorist acts have in common — and can a state be a terrorist, not just non-state groups?","week":7,"idea":"The first of the three big questions: defining the topic area. Philosophers seek necessary and sufficient conditions; terrorism may be a 'cluster' or 'family resemblance' concept that resists tidy definition.","type":"define"},{"q":"Can terrorism ever be justified? If so, when — and if not, why not?","week":7,"idea":"The second big question: the justification (or otherwise) of terrorism. Justification depends on the morality of ends and means (effectiveness, nature of means, availability of alternatives).","type":"probe"},{"q":"Is terrorism always morally worse than conventional war? Make the case that war and terrorism aren't as different as we'd like to think.","week":7,"idea":"The third big question: terrorism vs ordinary war. Wars are won by breaking enemy morale (coercion to surrender); many combatants are 'innocent' conscripts; obliteration bombing and nuclear deterrence look like terrorism, so terrorism may not be distinctively worse.","type":"argue"},{"q":"What does it mean to say a weapon is 'evil in itself' (mala in se), rather than just used wrongly on some occasion? Can you actually explain what makes a weapon evil in itself — and does any weapon really fit?","week":8,"idea":"Mala in se / evil means as a distinct jus in bello category: not just WHO we kill (distinction) or HOW MANY (proportionality) but HOW we kill those we kill.","type":"define"},{"q":"Is there anything so horrible to do to an enemy that you could never be justified in doing it, even to win a war fought in a fully just cause? If so, what's on your list — and what do those things have in common?","week":8,"idea":"Probing the intuition that some means are absolutely prohibited even in a just cause — testing whether the candidate's verdicts point toward absolutism or collapse into total-war/consequentialist thinking.","type":"probe"},{"q":"Churchill dismissed squeamishness about poison gas as 'sheer affectation', saying making a man's eyes water with gas is no worse than tearing him apart with shell fragments. Is he right that there's nothing specially evil about gas — or is something missed by that comparison?","week":8,"idea":"Connecting to a real text/event (Churchill's gas memo): a challenge to the very coherence of singling out particular weapons — does the 'unnecessary suffering' / 'respect' / 'shock' account survive the charge that legal weapons (shell fragments) are just as horrible?","type":"case"},{"q":"Are nuclear weapons evil in themselves (mala in se), or are they just 'a very big bomb'? Make the case both ways and tell me your view.","week":9,"idea":"Are nuclear weapons mala in se — both sides of the debate","type":"argue"},{"q":"Is it worse to die of radiation poisoning than to die of blood poisoning after being hit by shrapnel? What's your intuition — and what does it tell us about whether nuclear weapons are uniquely evil?","week":9,"idea":"Radiation vs shrapnel intuition pump — is the mode of death what makes nukes special","type":"probe"},{"q":"Were the atomic bombings of Hiroshima and Nagasaki justified? Run them through the principles of distinction and proportionality — and if you think they were justified, what does that mean for your commitment to the rules of war?","week":9,"idea":"Hiroshima/Nagasaki as jus in bello violations; consequentialist justification abandons just war theory","type":"apply"},{"q":"Can it be ethical to threaten to do something that would be deeply unethical to actually do? Apply that directly to nuclear deterrence — threatening to kill millions of civilians in retaliation.","week":9,"idea":"The threaten-vs-do problem at the heart of deterrence; threats of immorality might be moral","type":"probe"},{"q":"Suppose you feared your neighbours might kill you, so you hired a contract killer to murder their children if anything happened to you — and told them so. Is that ethical? How well does this analogy capture nuclear deterrence, and is it fair?","week":9,"idea":"Contract-killer analogy for deterrence — threatening innocents to coerce; deterrence resembles terrorism","type":"probe"},{"q":"Does nuclear deterrence actually work? We can't run the counterfactual, there were terrifyingly close calls, and it didn't stop plenty of wars. Make the sceptical case and then the defender's reply.","week":9,"idea":"Have nuclear weapons kept the peace — the empirical case for/against deterrence (Ward Wilson)","type":"debate"},{"q":"When a state hunts down and kills a specific person with a drone far from any battlefield, is that an act of war or is it more like an execution without trial? Why does whether you're 'at war' do so much of the moral work here?","week":10,"idea":"The framework fork: at war -> JWT applies; not at war -> extrajudicial execution / human-rights violation, with stricter policing standards; this is why Israel's expansive 'at war' framing and the US 'GWOT' framing matter so much","type":"debate"},{"q":"Imagine you're having lunch at a campus food court when the table next to you is destroyed by a drone strike aimed at a student a foreign government called a terrorist — and you lose both legs. How would you feel, and what does your reaction tell you about targeted killing?","week":10,"idea":"Intuition pump (the café/cruise-missile case): reversing the roles to test whether we'd accept another state conducting targeted killing on our soil, exposing the violation of sovereignty and risk to bystanders","type":"probe"},{"q":"Drones let one side kill enemies with no risk to themselves at all. Is there something deeply unfair about riskless, one-sided killing — or is the 'fairness' objection actually weak? Argue both sides.","week":10,"idea":"The asymmetry/riskless-war objection vs Sparrow's reply that war isn't supposed to be fair, chivalry has vanished, and commanders are arguably obligated to seek technological asymmetry to protect their troops","type":"argue"},{"q":"Are drones precise weapons that spare civilians, or not? Sparrow says it depends entirely on what you compare them to. Compare them to (a) not striking at all and (b) old-fashioned area bombing, and say what you conclude.","week":10,"idea":"Precision is comparative: drones kill more civilians than launching no attack but far fewer than area bombardment or cruise missiles; Lewis's finding is explained by drones striking targets no one would hit with a manned aircraft","type":"debate"},{"q":"Does a policy of drone strikes fail the 'last resort' test, given alternatives like arresting the person, intercepting them, or changing the foreign policy that made them an enemy? Does this echo the pacifist's 'there are always alternatives' argument?","week":10,"idea":"Last resort: drones may displace less-lethal options — asking the host government to arrest suspects, intercepting plotters when they travel, or removing grievances by altering foreign policy (cf. the US claim about Russia in Syria)","type":"debate"},{"q":"Take a real strike that killed civilians, like the 2021 Kabul drone strike that killed an aid worker and seven children. How does it illustrate the gap between the official claim of 'unprecedented accuracy' and the reality of targeted killing?","week":10,"idea":"Real-event connection: the contested civilian-casualty record — US precision claims vs documented mistaken strikes — showing that even 'precise' drones kill innocents and that the relevant comparison drives the judgement","type":"case"},{"q":"Say you learned your brother had been killed by a Hellfire missile. Would it make any difference to how you felt if it had been fired by an autonomous weapon deciding on its own, rather than by a human drone pilot? What does your intuition reveal?","week":11,"idea":"Eliciting the respect intuition first-person; whether the difference (if any) tracks the absence of an interpersonal relationship/human decision; the intuition that motivates the mala in se case","type":"probe"},{"q":"If an autonomous weapon kills the wrong people, who is responsible — the commander, the programmer, or the machine itself? Is this 'responsibility gap' a genuinely new problem, or just the old question of who's responsible in war?","week":11,"idea":"The responsibility gap (Sparrow's 'Killer Robots' urtext; Matthias/Roff); blame, punishment and the injustice to the victim","type":"define"},{"q":"Could a machine ever do 'proportionality' — weigh likely civilian deaths against military advantage in the heat of battle? Why does Sparrow think this is even harder for machines than telling combatants from civilians?","week":11,"idea":"AWS and proportionality; military advantage; why the in bello reasoning resists machine implementation yet may still be supplied by the human authoriser at the time of launch","type":"apply"},{"q":"Arkin argues that if autonomous weapons kill fewer civilians than human soldiers do, we should use them. Sparrow replies that the right standard might be perfection, not 'better than humans'. Who's right — and even if robots are better, can that settle the ethics?","week":11,"idea":"The standard-of-performance dispute; perfection vs better-than-human; the statistical-performance-of-machines worry; Sparrow's own doubt","type":"argue"},{"q":"Is killing someone with a robot that decides for itself different from a soldier killing them with a tool? Sparrow argues an autonomous weapon disrespects the enemy — 'like setting traps for mice' — but critics say the robot is just a means by which a human kills. Where do you come down?","week":11,"idea":"'Killer robots' (machine as agent) vs 'killing with robots' (machine as tool); whether the interpersonal relationship survives; the tension between machine-autonomy hype and the tool-reading","type":"debate"},{"q":"Give me the strongest one-sentence arguments you can FOR autonomous weapons, then the strongest ones AGAINST — and tell me, on balance, whether they should be banned.","week":11,"idea":"The full pro/anti ledger for AWS (military, consequentialist, deontological, jus ad bellum and mala in se considerations)","type":"probe"},{"q":"Were Hiroshima and Nagasaki acts of state terrorism? And if you condemn them, must you also condemn nuclear deterrence, which threatens exactly the same thing? Trace the line from terrorism to second-strike doctrine.","week":"synthesis","idea":"State terrorism = targeting non-combatants to coerce a government (W7) applied to the atomic bombings and to counter-value deterrence (W9), which threatens enemy cities; if the bombings were terrorism, so is the standing deterrent threat","type":"synthesis"},{"q":"Is terrorism morally worse than a signature drone strike? Both impose lethal risk on people whose individual identity and responsibility are unknown, for political ends. Compare them.","week":"synthesis","idea":"Terrorism = targeting non-combatants to coerce (W7) vs signature strikes on unknown persons by pattern-of-life (W10); whether DDE/distinction genuinely separates them or whether both target the merely-suspected innocent","type":"synthesis"},{"q":"Outside a declared war zone, Sparrow says the rules on who you can kill get stricter — a police standard, not a military one. Explain how applying the rules of war to targeted killing flips the usual permission to kill.","week":"synthesis","idea":"Distinction and proportionality (W6) become the police 'urgent and immediate threat to life' / 'no innocent casualties at all' standard outside declared conflict (W10) — military collateral allowances don't apply","type":"synthesis"},{"q":"Can just war theory survive modern military technology, or have nuclear weapons, drones and killer robots overtaken it? Make the strongest case each way and give your verdict.","week":"synthesis","idea":"Whether JWT's structure (jus ad bellum + jus in bello, distinction/proportionality, absolute prohibitions) can still adjudicate perpetual war, riskless asymmetry, deterrence paradox and the responsibility gap","type":"meta"},{"q":"Does morality apply to war at all? Explain why rejecting both realism and pacifism — the two radical challenges — is the precondition for everything else in the unit, and say whether you're convinced both should be rejected.","week":"synthesis","idea":"Realism (war not morally evaluable) and Pacifism (war never justified) as the two radical challenges; rejecting both motivates JWT, the framework the rest of the unit applies","type":"meta"},{"q":"Of all the principles in this unit — distinction, proportionality, mala in se, the moral equality of soldiers, respect for sovereignty — which is the single most important, and what collapses without it?","week":"synthesis","idea":"Ranking the foundational principles by load-bearing role; e.g. distinction underwrites the condemnation of terrorism and the in-bello assessment of every weapon, but rests on the contested independence thesis","type":"meta"},{"q":"Throughout the unit the rules of war seem to advantage the powerful and ask the weak not to fight back. Is just war theory ultimately a tool of the strong? Connect this to terrorism, drones, and humanitarian intervention.","week":"synthesis","idea":"The 'who benefits' through-line: precision weapons make distinction easy for the powerful, JWT siding with the powerful; unites the terrorism-justification move (W7), drone asymmetry (W10), and the R2P imperialism charge (W5)","type":"meta"},{"q":"Sparrow argues that the more precise and plausible our account of who may be killed in war becomes, the more it pushes us toward either pacifism or 'total war'. Explain this dilemma and tell me which horn you'd take.","week":"synthesis","idea":"The distinction dilemma: a better account of who may be killed makes it harder to tell supporters from non-supporters in practice → pacifism or abandonment; the foundational tension that recurs in every modern case","type":"meta"}],"thinkers":[{"name":"Sparrow","idea":"Killer robots create a \"responsibility gap\" — no one (programmer, commander, or machine) can be fairly blamed for a wrongful killing","q":"Why might autonomous weapons be illegitimate even if they work?"},{"name":"Sparrow","idea":"Being killed by a machine that \"decides\" to kill you fails to respect your moral status (\"Robots and Respect\")","q":"What is wrong with a machine, not a human, choosing to kill you?"},{"name":"Arkin","idea":"Robots could be MORE ethical than soldiers — no fear or rage — via an \"ethical governor\"","q":"What is the strongest case FOR building autonomous weapons?"},{"name":"Walzer","idea":"The \"moral equality of combatants\" — any soldier may kill any enemy soldier, whatever the cause","q":"On the traditional view, who may soldiers kill?"},{"name":"McMahan","idea":"You are a fair target because you are responsible for an unjust threat — not just for wearing a uniform (liability)","q":"What really makes someone a legitimate target?"},{"name":"Rodin","idea":"National self-defence is NOT really like individual self-defence (the \"reductivist\" challenge)","q":"What is the deep challenge to the usual reason for starting a war?"},{"name":"Primoratz","idea":"Terrorism = deliberately attacking innocents to terrorise/coerce a wider group","q":"How is terrorism defined?"},{"name":"Held","idea":"Judge terrorism by the SAME standard as war — so it is not automatically worse","q":"Is terrorism always worse than regular war?"},{"name":"Nagel","idea":"The clash of absolutism vs utilitarianism (\"War and Massacre\")","q":"Who frames the core \"rules vs results\" clash for war?"},{"name":"Anscombe","idea":"Pacifism is \"pernicious\" — it erases the line between killing a soldier and murdering the innocent","q":"What is the sharpest objection to pacifism?"},{"name":"Tolstoy","idea":"Pacifism — war is never justified","q":"Who holds that war is never justified?"},{"name":"Morgenthau","idea":"Realism — morality does not really apply to war; states pursue power and survival","q":"Who says morality has no place in war?"},{"name":"Orend","idea":"Rebuts BOTH realism and pacifism, defending just war theory","q":"Who answers both \"anything goes\" and \"war is always wrong\"?"},{"name":"Ward Wilson","idea":"Nuclear deterrence may not even work — the Soviet invasion, not Hiroshima, may have ended WWII","q":"Who doubts that nuclear weapons actually keep the peace?"},{"name":"Byman","idea":"\"Why Drones Work\" — drones are precise and protect your own troops","q":"What is the case FOR drones?"},{"name":"Boyle","idea":"Drones cause \"blowback\" — civilian deaths radicalise people and create more enemies","q":"What is the case AGAINST drones?"},{"name":"Annan","idea":"\"Responsibility to Protect\" — sovereignty is conditional on a state protecting its people","q":"What justifies invading to stop a government slaughtering its people?"},{"name":"Coady","idea":"Critiques humanitarian war — \"we are just helping\" is easily abused","q":"What is the worry about humanitarian intervention?"}],"concepts":[{"term":"Doctrine of Double Effect","q":"Can foreseen-but-unintended civilian deaths ever be acceptable?"},{"term":"Distinction","q":"Which rule says: only target fighters, never deliberately civilians?"},{"term":"The deterrence paradox","q":"Is it ethical to THREATEN what it would be unethical to actually DO?"},{"term":"Mala in se","q":"What is the term for a weapon or act that is \"evil in itself\"?"},{"term":"Consequentialism","q":"Judging an act purely by whether it produces the best outcome?"},{"term":"Deontology","q":"The view that some acts are wrong in themselves, whatever the result?"},{"term":"Jus ad bellum","q":"The justice of whether it was right to START a war?"},{"term":"Jus in bello","q":"The justice of how a war is FOUGHT?"},{"term":"Proportionality","q":"The rule that harm caused must not be excessive vs the military gain?"},{"term":"Signature strike","q":"Killing someone by their behaviour pattern, without knowing who they are?"},{"term":"Responsibility gap","q":"The problem that no one can be blamed when an autonomous weapon kills wrongly?"},{"term":"Non-combatant immunity","q":"The principle that civilians may not be deliberately attacked?"}],"grade":{"url":"https://vibe-toolkit-prod.tail2c370e.ts.net/grade","token":"ats2640-viva-7q3z9k"}};</script>
<script>(function () {
  const DATA = window.DATA || {};
  const app = document.getElementById('app');
  const render = (s) => (window.marked ? (marked.parse ? marked.parse(s) : marked(s)) : s);
  const esc = (s) => String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  const shuffle = (a) => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; };
  const sample = (arr, n, ex) => shuffle(arr.filter(x => !ex.includes(x))).slice(0, n);

  let TAB = 'learn';
  const TABS = [['learn', 'Learn'], ['viva', 'Viva 🎤'], ['cards', 'Flashcards'], ['practice', 'Practice'], ['game', 'Game']];

  function renderTabs() {
    document.getElementById('tabbar').innerHTML = TABS.map(([k, l]) =>
      '<button class="tab' + (k === TAB ? ' on' : '') + '" data-k="' + k + '">' + l + '</button>').join('');
    document.querySelectorAll('.tab').forEach(b => b.onclick = () => { TAB = b.dataset.k; renderTabs(); route(); window.scrollTo(0, 0); });
  }
  function route() {
    if (TAB === 'learn') renderLearn();
    else if (TAB === 'viva') renderViva();
    else if (TAB === 'cards') renderCards();
    else if (TAB === 'practice') renderPractice();
    else if (TAB === 'game') renderGame();
  }

  // ---------- LEARN ----------
  function renderLearn() {
    app.innerHTML = '<div class="prose">' + render(DATA.learn || '') + '</div>'
      + '<p class="foot">Offline copies: <a href="https://github.com/Maximiseperformanc/ats2640-prep">PDF downloads on GitHub</a></p>';
  }

  // ---------- FLASHCARDS ----------
  let deck = [], ci = 0, flipped = false, secFilter = 'All';
  function buildDeck() { deck = (DATA.flashcards || []).filter(c => secFilter === 'All' || c.sec === secFilter); ci = 0; flipped = false; }
  function renderCards() {
    const secs = ['All', ...new Set((DATA.flashcards || []).map(c => c.sec))];
    if (!deck.length) buildDeck();
    const c = deck[ci] || { front: '(no cards)', back: '' };
    app.innerHTML =
      '<div class="row"><select id="secf">' + secs.map(s => '<option' + (s === secFilter ? ' selected' : '') + '>' + esc(s) + '</option>').join('') + '</select>'
      + '<span class="count">' + (deck.length ? ci + 1 : 0) + ' / ' + deck.length + '</span>'
      + '<button class="mini" id="shuf">Shuffle</button></div>'
      + '<div class="flash" id="flash"><div class="flashinner">'
      + '<div class="flabel">' + (flipped ? 'ANSWER' : 'PROMPT — say it aloud, then tap') + '</div>'
      + '<div class="ftext">' + (flipped ? render(c.back) : esc(c.front)) + '</div></div></div>'
      + '<div class="row btns"><button class="nav" id="prev">← Prev</button>'
      + '<button class="nav primary" id="flip">' + (flipped ? 'Hide' : 'Reveal') + '</button>'
      + '<button class="nav" id="next">Next →</button></div>';
    document.getElementById('flash').onclick = () => { flipped = !flipped; renderCards(); };
    document.getElementById('flip').onclick = (e) => { e.stopPropagation(); flipped = !flipped; renderCards(); };
    document.getElementById('prev').onclick = (e) => { e.stopPropagation(); ci = (ci - 1 + deck.length) % deck.length; flipped = false; renderCards(); };
    document.getElementById('next').onclick = (e) => { e.stopPropagation(); ci = (ci + 1) % deck.length; flipped = false; renderCards(); };
    document.getElementById('shuf').onclick = () => { deck = shuffle(deck); ci = 0; flipped = false; renderCards(); };
    document.getElementById('secf').onchange = (e) => { secFilter = e.target.value; buildDeck(); renderCards(); };
  }

  // ---------- PRACTICE ----------
  function renderPractice() {
    const groups = [['Q1', 'Q1 — Hard cases (weeks 9–11)'], ['Q2', 'Q2 — Foundations (weeks 1–8)'], ['Q3', 'Q3 — Synthesis']];
    let h = '<p class="hint">Tap a question to see talking points. Aim to talk ~3–4 min: take a position, give a reason.</p>';
    for (const [g, title] of groups) {
      h += '<h2 class="ph">' + title + '</h2>';
      const secs = (DATA.practice || []).filter(s => s.group === g);
      for (const sec of secs) {
        if (secs.length > 1) h += '<div class="ptopic">' + esc(sec.topic) + '</div>';
        for (const q of sec.questions) {
          h += '<details class="qa"><summary>' + esc(q.question) + '</summary><ul>'
            + q.points.map(p => '<li>' + esc(p) + '</li>').join('') + '</ul></details>';
        }
      }
    }
    app.innerHTML = h;
  }

  // ---------- VIVA (spoken, blind, auto-judged by Claude) ----------
  let vivaItem = null, vivaWeek = 'all';
  const VIVA = (DATA.viva && DATA.viva.length) ? DATA.viva : (DATA.practice || []).flatMap(s => s.questions.map(q => ({ q: q.question, week: '', idea: '' })));
  const vivaWeeksList = () => { const s = new Set(VIVA.map(v => v.week)); const o = []; for (let i = 1; i <= 11; i++) if (s.has(i)) o.push(i); if (s.has('synthesis')) o.push('synthesis'); return o; };
  const weekLabel = (w) => w === 'synthesis' ? 'Synthesis' : ('Week ' + w);
  const vivaFilter = () => vivaWeek === 'all' ? VIVA : VIVA.filter(v => String(v.week) === String(vivaWeek));
  function newViva() { const pool = vivaFilter(); vivaItem = pool[Math.floor(Math.random() * pool.length)] || { q: 'No questions loaded.', idea: '' }; renderViva(); }
  function renderViva() {
    if (!vivaItem) { newViva(); return; }
    const pool = vivaFilter();
    const opts = '<option value="all"' + (vivaWeek === 'all' ? ' selected' : '') + '>All topics (' + VIVA.length + ')</option>'
      + vivaWeeksList().map(w => '<option value="' + w + '"' + (String(vivaWeek) === String(w) ? ' selected' : '') + '>' + weekLabel(w) + '</option>').join('');
    app.innerHTML =
      '<p class="hint">The real test — <b>no options</b>. Pick a topic (or all ' + VIVA.length + '), read the question, then <b>speak your answer out loud</b> (keyboard 🎤 or Record). Claude marks it against the real notes and ties it back to the big picture.</p>'
      + '<div class="row"><select id="vw">' + opts + '</select><span class="count">' + pool.length + ' Qs</span><button class="mini" id="newq">↻ New</button></div>'
      + '<div class="card"><div class="qlabel">Spoken mock oral</div><div class="q">' + esc(vivaItem.q) + '</div></div>'
      + '<textarea id="ans" rows="5" placeholder="Speak your answer here (keyboard 🎤) or type it… aim for ~1–2 minutes."></textarea>'
      + '<div class="row btns"><button class="nav" id="rec">🎤 Record</button><button class="nav primary" id="judge">Judge my answer</button></div>'
      + '<div id="vfb"></div>';
    const ta = document.getElementById('ans');
    document.getElementById('rec').onclick = function () { toggleRec(this, ta); };
    document.getElementById('judge').onclick = () => judge(ta);
    document.getElementById('newq').onclick = newViva;
    document.getElementById('vw').onchange = (e) => { vivaWeek = e.target.value; newViva(); };
  }
  function toggleRec(btn, ta) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { btn.textContent = '🎤 use keyboard mic'; btn.disabled = true; return; }
    if (window.__rec && window.__recOn) { window.__rec.stop(); return; }
    const rec = new SR(); window.__rec = rec;
    rec.lang = 'en-AU'; rec.continuous = true; rec.interimResults = true;
    const base = ta.value ? ta.value.trim() + ' ' : '';
    rec.onresult = (e) => { let t = ''; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript + ' '; ta.value = base + t.replace(/\s+/g, ' ').trim(); };
    rec.onend = () => { window.__recOn = false; btn.textContent = '🎤 Record'; btn.classList.remove('recing'); };
    rec.onerror = () => { window.__recOn = false; btn.textContent = '🎤 Record'; btn.classList.remove('recing'); };
    rec.start(); window.__recOn = true; btn.textContent = '⏹ Stop recording'; btn.classList.add('recing');
  }
  async function judge(ta) {
    const fb = document.getElementById('vfb');
    const ans = (ta.value || '').trim();
    if (!ans) { fb.innerHTML = '<div class="feedback show bad">Speak or type your answer first.</div>'; return; }
    const g = DATA.grade || {};
    if (!g.url) { fb.innerHTML = '<div class="feedback show bad">Grader not configured.</div>'; return; }
    fb.innerHTML = '<div class="feedback show">⏳ Asking Claude to mark your answer… (about 10–20 seconds)</div>';
    const jb = document.getElementById('judge'); if (jb) jb.disabled = true;
    try {
      const r = await fetch(g.url, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ token: g.token, question: vivaItem.q, answer: ans }) });
      const j = await r.json();
      if (j.feedback) fb.innerHTML = '<div class="card vgrade">' + render(j.feedback) + '</div>' + (vivaItem.idea ? '<div class="hint" style="margin-top:8px">🎯 Main idea this tests: <b>' + esc(vivaItem.idea) + '</b></div>' : '');
      else fb.innerHTML = '<div class="feedback show bad">' + esc(j.error || 'Grader error — try again.') + '</div>';
    } catch (e) {
      fb.innerHTML = '<div class="feedback show bad">Couldn’t reach the grader (your box may be offline). ' + esc(e.message) + '</div>';
    }
    if (jb) jb.disabled = false;
  }

  // ---------- GAME (comprehension-first) ----------
  let score = 0, streak = 0, seen = 0, gmode = 'understand';
  function statsBar() {
    return '<div class="stats"><span>Score ' + score + '</span><span>Streak ' + streak + '</span><span>' + seen + ' done</span></div>'
      + '<div class="gmode"><button id="mU" class="' + (gmode === 'understand' ? 'on' : '') + '">Understand</button>'
      + '<button id="mN" class="' + (gmode === 'names' ? 'on' : '') + '">Names (recall)</button></div>';
  }
  function renderGame() {
    app.innerHTML = statsBar() + '<div id="garea"></div>';
    document.getElementById('mU').onclick = () => { gmode = 'understand'; renderGame(); };
    document.getElementById('mN').onclick = () => { gmode = 'names'; renderGame(); };
    if (gmode === 'understand') newUnderstand(); else newMatch();
  }
  function refreshStats() {
    const s = document.querySelector('.stats');
    if (s) s.outerHTML = '<div class="stats"><span>Score ' + score + '</span><span>Streak ' + streak + '</span><span>' + seen + ' done</span></div>';
  }
  // comprehension quiz — scenarios/reasoning, with a teaching explanation after each answer
  let uCorrect = null;
  function newUnderstand() {
    const bank = DATA.quiz || [];
    if (!bank.length) { document.getElementById('garea').innerHTML = '<p class="hint">Comprehension questions not loaded.</p>'; return; }
    const item = bank[Math.floor(Math.random() * bank.length)];
    uCorrect = item.answer;
    const opts = shuffle([item.answer].concat(item.distractors || []));
    document.getElementById('garea').innerHTML =
      '<div class="card"><div class="qlabel">' + esc(item.kind || 'Think it through') + '</div><div class="q">' + esc(item.q) + '</div></div>'
      + '<div class="opts">' + opts.map(o => '<button class="opt">' + esc(o) + '</button>').join('') + '</div>'
      + '<div class="feedback" id="fb"></div><button class="next" id="nx">Next →</button>';
    document.querySelectorAll('#garea .opt').forEach(b => b.onclick = () => answerU(b, item.why));
    document.getElementById('nx').onclick = newUnderstand;
  }
  function answerU(btn, why) {
    document.querySelectorAll('#garea .opt').forEach(o => { o.disabled = true; if (o.textContent === uCorrect) o.classList.add('correct'); });
    const fb = document.getElementById('fb'); seen++;
    const right = btn.textContent === uCorrect;
    if (right) { score++; streak++; } else { streak = 0; btn.classList.add('wrong'); }
    fb.className = 'feedback show ' + (right ? 'good' : 'bad');
    fb.innerHTML = (right ? '✓ Right. ' : '✗ Not quite — the answer is highlighted. ') + '<b>Why:</b> ' + esc(why || '');
    refreshStats(); document.getElementById('nx').classList.add('show');
  }
  // match-up
  let mSel = null, mDone = 0;
  function newMatch() {
    mSel = null; mDone = 0;
    const pool = (DATA.thinkers || []).filter((p, i) => DATA.thinkers.findIndex(x => x.name === p.name) === i);
    const round = shuffle(pool).slice(0, 5);
    const ideas = shuffle(round.map(p => ({ name: p.name, idea: p.idea })));
    document.getElementById('garea').innerHTML =
      '<div class="msg" id="mmsg">Tap a thinker, then tap their idea.</div><div class="board"><div><div class="col-h">Thinker</div>'
      + round.map(p => '<button class="tile name" data-n="' + esc(p.name) + '">' + esc(p.name) + '</button>').join('')
      + '</div><div><div class="col-h">Idea</div>'
      + ideas.map(o => '<button class="tile idea" data-n="' + esc(o.name) + '">' + esc(o.idea) + '</button>').join('')
      + '</div></div><button class="next show" id="nb">New board ↻</button>';
    document.querySelectorAll('#garea .tile.name').forEach(b => b.onclick = () => {
      if (b.classList.contains('done')) return;
      document.querySelectorAll('#garea .tile.name').forEach(t => t.classList.remove('sel'));
      b.classList.add('sel'); mSel = b;
    });
    document.querySelectorAll('#garea .tile.idea').forEach(b => b.onclick = () => {
      if (b.classList.contains('done') || !mSel) return;
      const msg = document.getElementById('mmsg');
      if (b.dataset.n === mSel.dataset.n) {
        b.classList.add('done'); mSel.classList.add('done'); mSel.classList.remove('sel'); mSel = null; mDone++; score++; refreshStats();
        msg.textContent = mDone === 5 ? '🎉 All matched! Tap “New board”.' : 'Matched! (' + mDone + '/5)';
      } else { b.classList.add('bad'); streak = 0; refreshStats(); msg.textContent = 'Not that one — try again.'; const x = b; setTimeout(() => x.classList.remove('bad'), 450); }
    });
    document.getElementById('nb').onclick = newMatch;
  }

  renderTabs(); route();
})();
</script>
