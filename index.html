parrow thinks each one can seem unfair or unintelligible to blame.","week":11,"idea":"The responsibility gap (Sparrow's 'Killer Robots' urtext; Matthias/Roff); blame, punishment and the injustice to the victim","type":"define"},{"q":"Sparrow links blame to punishment: 'What would it mean to punish a machine? And if we can't conceive of punishing a machine can we really think it is morally responsible?' Reconstruct this argument and say whether you find the move from 'can't punish' to 'not responsible' convincing.","week":11,"idea":"The conceptual connection between responsibility, blame and punishment; why a machine can't close the gap","type":"argue"},{"q":"Is the responsibility-gap argument convincing? Argue both sides. In particular, address the reply that the doctrine of 'command responsibility' already holds commanders responsible for the actions of autonomous human troops, so we could simply assign responsibility to whoever launches the AWS. Note that Sparrow himself concedes the gap 'turns upon an understanding of autonomy that is richer and more demanding' than he assumes.","week":11,"idea":"Command responsibility as a dissolution of the gap; Sparrow's own ambivalence about how much weight the gap can bear","type":"argue"},{"q":"REFLECTIVE EXERCISE 11.3 (verbatim): 'Would there be anything morally problematic about holding a military commander responsible for the outcomes of the use of a machine that \"learned\" from experience?'","week":11,"idea":"Machine learning / inscrutability and the fairness of holding a human responsible; the responsibility gap in its strongest 'learning machine' form","type":"probe"},{"q":"Explain the distinction between asking 'can the MACHINE comply with jus in bello?' versus 'can the machine be USED in accordance with jus in bello?' Why does Sparrow think nearly the whole in bello case against AWS hinges on which of these questions we treat as the relevant one?","week":11,"idea":"Machine-compliance vs use-in-accordance-with; the pivot that disarms most distinction/proportionality objections by relocating the requirement to the human launcher","type":"debate"},{"q":"Can a machine satisfy the principle of distinction? Set out why Sparrow thinks the answer depends heavily on context (counterinsurgency in Afghanistan/Pakistan vs air defence, anti-submarine, air-to-air combat), and why it is therefore false that AWS are 'necessarily' or 'inherently' indiscriminate.","week":11,"idea":"AWS and distinction; the principle binds combatants not weapons; 'inherently indiscriminate' weapons; domain-dependence of the perception problem","type":"apply"},{"q":"REFLECTIVE EXERCISE 11.4 (verbatim): 'If a targeting officer tells an autonomous weapon system what sort of targets it is permitted to attack, and tasks it only with targeting enemy military forces, is this sufficient for her/his use of the robot to comply with the principle of distinction?'","week":11,"idea":"Whether locating distinction in the launcher's intention is sufficient for compliance; the bomb-blown-off-course / unguided-bombs analogy","type":"probe"},{"q":"Why does Sparrow think the proportionality objection looks STRONGER than the distinction objection ('machines can't do proportionality')? Explain what a proportionality calculation requires (weighing civilian — and morally, combatant — casualties against military advantage, contextual battle dynamics) and why this 'abstract and highly contextual reasoning' is beyond current and foreseeable AI.","week":11,"idea":"AWS and proportionality; military advantage; why the in bello reasoning resists machine implementation yet may still be supplied by the human authoriser at the time of launch","type":"apply"},{"q":"Why is the recognition of surrender (hors de combat) singled out as the hardest case for AWS — possibly the one place we might have good grounds for saying machines 'can never comply with distinction'? Explain the loitering-munition twist: why a weapon that strikes weeks after launch makes 'check for surrender at the time of launch and leave it at that' implausible.","week":11,"idea":"Surrender / hors de combat recognition as the residual hard problem; the loitering-munition timing problem ('Twenty Seconds to Comply')","type":"apply"},{"q":"REFLECTIVE EXERCISE 11.2 (verbatim): 'Write down as many single sentence arguments FOR autonomous weapon systems as you can. Write down as many single sentence arguments AGAINST autonomous weapon systems as you can.'","week":11,"idea":"The full pro/anti ledger for AWS (military, consequentialist, deontological, jus ad bellum and mala in se considerations)","type":"probe"},{"q":"Set out Ron Arkin's case for ethical autonomy. What are his concrete reasons machines might outperform human soldiers (no self-preservation drive / 'no shoot-first-ask-later', better sensors, no fear/anger/cognitive bias, no 'scenario fulfillment' as in the USS Vincennes, faster multi-source integration, monitoring teammates' conduct), and what empirical evidence (the Surgeon General Iraq report) does he marshal about how badly humans actually behave?","week":11,"idea":"Arkin's 'humanising war' / better-than-human-warfighter argument; the empirical record of human battlefield failings","type":"argue"},{"q":"What is Arkin's 'ethical governor', and what is his fallback proposal of a human operator monitoring the robot's reasoning? Reconstruct Sparrow's reply to BOTH: the 'impoverished account of ethics as clearly defined rules', the claim that 'ethics is a realm of meanings', and the regress objection that judging WHEN a machine's judgment is unreliable needs the very competence in question.","week":11,"idea":"Arkin's ethical governor and human-oversight replies, and Sparrow's rebuttals (ethics-as-meanings, behaviourism, the 'phone home' regress)","type":"argue"},{"q":"Arkin vs Sparrow on the standard of performance: Arkin says the right benchmark is the (low) standard achieved by human warfighters, so if AWS kill fewer noncombatants their use is justified. Sparrow replies that the relevant standard may be PERFECTION. Reconstruct Sparrow's argument — and note that he 'must admit I am increasingly suspicious that it doesn't' work. Who has the better of it?","week":11,"idea":"The standard-of-performance dispute; perfection vs better-than-human; the statistical-performance-of-machines worry; Sparrow's own doubt","type":"argue"},{"q":"REFLECTIVE EXERCISE 11.6 (verbatim): 'If I deliberately kill civilians 10% of the time, where my comrades deliberately kill civilians 20% of the time, is the fact that I am better at \"distinction\" than the alternative of my comrades sufficient to justify my behaviour?'","week":11,"idea":"Whether being statistically better than the alternative justifies conduct; perfection as the in bello standard; the non-consequentialism of jus in bello","type":"probe"},{"q":"Why does Sparrow insist that even if AWS would reduce noncombatant casualties this 'cannot settle' the ethics of their use? Explain why jus in bello is NOT consequentialist (combatants may not target noncombatants or use mala in se weapons even to win faster or reduce total casualties), and how this blunts Arkin's strongest card.","week":11,"idea":"Jus in bello is deontological/non-consequentialist; the limit of casualty-reduction arguments","type":"debate"},{"q":"Explain the Brian Williams 'consent' argument: civilians in Pakistan's tribal areas reportedly prefer drone strikes to Pakistani army operations, suggesting drones have 'the consent' of the population — and the same could be said of more-accurate AWS. Why does Sparrow think this is a non-consequentialist-looking argument, and why does he ultimately call it a 'red herring' (the coerced-choice objection)?","week":11,"idea":"The consent argument for AWS; whether concern for noncombatants is solely consequentialist; why wartime 'consent' is coerced and lends no moral weight","type":"argue"},{"q":"REFLECTIVE EXERCISE 11.7 (verbatim): 'If the civilian population in a territory in which war is being waged would prefer it if the enemy were to send AWS rather than human soldiers because the former kill fewer civilians, is that sufficient to demonstrate that AWS are ethically superior to human war fighters?'","week":11,"idea":"The hypothetical-consent / preference argument and its coercion problem; consequentialist vs deontological readings of civilian preference","type":"probe"},{"q":"What does it mean to say a weapon is mala in se ('evil in itself'), and why is this the only argument that could justify a TOTAL ban on AWS? Why does Sparrow think it is 'remarkably hard' to explain how any weapon could have this character — and why does the 'weapons platform not weapon' point (you die from a Hellfire missile identical to one fired from a helicopter) seem to defeat a mala in se charge?","week":11,"idea":"Mala in se and the case for a blanket ban; the weapon-vs-weapons-platform distinction; why 'how they kill' looks unproblematic","type":"define"},{"q":"Reconstruct the Kantian-respect / Nagel argument for why AWS might be mala in se. Explain Nagel's claim that whatever we do to a person intentionally 'must be aimed at him as a subject... he should be able to recognize it and identify himself as its object', the requirement of an 'interpersonal relationship' even in war, and why when an AWS decides to attack 'there is no one who decides whether the target should live or die'.","week":11,"idea":"Kantian respect for the humanity of the enemy (Nagel, 'War and Massacre') as the foundation of jus in bello; the missing interpersonal relationship; 'a right not to be killed by a robot'","type":"define"},{"q":"This is the crux: 'killing with robots' vs 'killer robots'. Explain how Sparrow's respect argument is vulnerable to the reply that the robot is just a TOOL/means by which the launching officer kills (so respect IS accorded when targeting criteria are set), supported by the high-altitude bombardier / cruise-missile-to-GPS-coordinates / landmine analogies. Then explain the tension Sparrow flags: the more advocates laud machine autonomy, the harder it is to treat the AWS as a mere transmitter of human intention.","week":11,"idea":"'Killer robots' (machine as agent) vs 'killing with robots' (machine as tool); whether the interpersonal relationship survives; the tension between machine-autonomy hype and the tool-reading","type":"debate"},{"q":"Sparrow's final and (he thinks) strongest move: respect is partly CONVENTIONAL — its content is fixed by shared social understandings (the 'okay' sign meaning friendly in Australia but obscene elsewhere; the corpse-desecration intuition). Explain how he uses this to argue that using AWS EXPRESSES disrespect — treating the enemy 'like vermin', 'setting traps for mice' — even if the robot is a mere tool and is more accurate than aerial bombing. Why does he concede this is 'much weaker than critics would like'?","week":11,"idea":"The expressive/conventional account of respect; AWS as expressing disrespect ('vermin'); the corpse-desecration analogy; the weakness that conventions can change once AWS become familiar","type":"argue"},{"q":"REFLECTIVE EXERCISE 11.8 (verbatim): 'Should urinating on the bodies of dead enemies be a war crime? Why/why not?' How does this case illuminate Sparrow's expressive theory of respect — the corpse-desecration intuition that wrongs the enemy without inflicting 'unnecessary suffering'?","week":11,"idea":"The expressive/conventional content of respect; corpse desecration as a wrong of meaning not of suffering; bridge to why AWS could be mala in se","type":"probe"},{"q":"REFLECTIVE EXERCISE 11.5 (verbatim): 'Say that you learned that your brother had been killed by a Hellfire missile. Would it make a difference to how you felt about it if you learned that the missile had been fired by an Autonomous Weapon System rather than by the human pilot of a drone?' What does your intuition here reveal about the respect argument and the 'killing with robots vs killer robots' divide?","week":11,"idea":"Eliciting the respect intuition first-person; whether the difference (if any) tracks the absence of an interpersonal relationship/human decision; the intuition that motivates the mala in se case","type":"probe"},{"q":"REFLECTIVE EXERCISE 11.1 (verbatim): 'What, in your eyes, would make a robotic weapon \"autonomous\"?' Where does your answer sit on Sparrow's spectrum — from antipersonnel mines that 'decide' via a pressure sensor, through the interesting middle (too complex to be a landmine, not strong AI), to human-level/strong-AI agency?","week":11,"idea":"The autonomy spectrum (landmine to strong AI); Sparrow's working definition (uncertainty about which targets even when functioning perfectly); why the 'interesting' cases sit in the middle","type":"probe"},{"q":"Sparrow says jus ad bellum worries about AWS — that they 'make war too easy' / 'lower the threshold of conflict' — are 'not that distinctive' next to the same worries about drones, with one possible exception. Explain the 'lowering the threshold of war' worry, why it generalises awkwardly (it would oppose any technology granting military superiority, plus Kahn's riskless-warfare point about humanitarian intervention), and what the genuinely distinctive AWS-specific ad bellum danger is (aggressive force postures, accidental war, machines initiating hostilities).","week":11,"idea":"Lowering the threshold of war; riskless warfare (Kahn); the distinctive AWS ad bellum risks (arms race, accidental war, war 'started by the decisions of a machine'); the case for arms control","type":"debate"},{"q":"Connect the AWS debate to a real system or event. Pick one — the Israeli Harpy loitering munition, the Phalanx CIWS / C-RAM, Aegis, anti-tank mines, the USS Vincennes shootdown of the Iranian airliner, or the Predator/Reaper drone campaign in Afghanistan/Pakistan — and use it to test a claim from the readings (e.g. that 'autonomous weapons already exist', or that machines can do distinction in some domains but not others).","week":11,"idea":"Applying the framework to real systems; the deflationary point that some 'autonomous' weapons already exist; domain-dependence of distinction","type":"case"},{"q":"Sparrow concludes the case for a ban is real but 'much weaker than critics might prefer'. Lay out his full dialectic: he strengthens the case FOR autonomous targeting in restricted domains (the 'kill box'), yet defends the intuition that AWS are still problematic via conventional respect, and likens the campaign to the historical bans on chemical and cluster munitions ('truths that existed prior to the prohibition'). Do you find the overall argument persuasive, given his own admitted doubts?","week":11,"idea":"Sparrow's two-part thesis (concede the in bello case in limited domains, then ground a ban in conventional respect/mala in se); the chemical/cluster-weapons analogy; entrenching an intuition in law","type":"meta"},{"q":"Meta / connective: Sparrow says the AWS debate 'necessarily ranged across principles drawn from the whole of the just war tradition'. Show how the AWS case pulls together distinction, proportionality, mala in se, jus ad bellum, the threshold of war, and respect for the enemy — and why he treats the connections between these ideas as itself a feature of sound moral reasoning about war. Where do you think the strongest objection to AWS actually lies?","week":11,"idea":"Synthesis of the whole just war tradition through the AWS case; identifying the load-bearing objection; the unit's overarching aim of reasoning critically about the ethics of conflict","type":"meta"},{"q":"Apply the principle of distinction (jus in bello) to autonomous weapon systems. Can a 'killer robot' that selects and engages targets itself satisfy distinction, and where does Sparrow think it can and can't — what is the residual hardest problem even in a 'kill box'?","week":"synthesis","idea":"Distinction binds human combatants not weapons; AWS not 'inherently indiscriminate'; tractable in restricted domains (anti-sub, air-to-air, SEAD) but ruled out in urban/COIN; surrender/hors de combat is the residual hard problem","type":"synthesis"},{"q":"Does the doctrine of double effect excuse the civilian deaths produced by drone strikes and signature strikes? Walk through the means-test and whether the deaths are intended-as-means or merely foreseen, given the US counts every male over 15 as a militant.","week":"synthesis","idea":"DDE permits foreseen-not-intended collateral if harm isn't the means and is proportionate; tension with signature strikes where target identity is unknown and 'militant' is generously defined, blurring intend/foresee","type":"synthesis"},{"q":"Is nuclear deterrence defensible on Realist grounds? Reconstruct the Realist case (MAD secures peace through enlightened self-interest) and say whether the security dilemma and the unprovable counterfactual undercut it on Realism's own terms.","week":"synthesis","idea":"Realism's enlightened self-interest / security dilemma vs MAD-secures-peace; but Sparrow's counterfactual and 'just lucky' objections plus proxy wars mean even the prudential Realist payoff is unproven","type":"synthesis"},{"q":"Does McMahan's revisionist account of liability and the rejection of independence reshape who a drone may legitimately target outside a declared war zone? Contrast it with Walzer's moral equality of soldiers for non-state actors with no uniform or command structure.","week":"synthesis","idea":"McMahan grounds killing in liability between individuals, rejecting independence/moral equality; applied to targeted killing it bears on whether 'ideologically motivated civilians', propagandists and religious leaders are liable — vs the police standard outside war","type":"synthesis"},{"q":"Is the nuclear deterrence paradox really just the intend/foresee distinction of the doctrine of double effect in another guise — or is it a distinct problem about conditional intention? Lay out the three deterrence questions and say whether DDE machinery solves any of them.","week":"synthesis","idea":"Deterrence paradox = intending to do what one admits one should not do (second strike); DDE is about intended vs foreseen harm, not about intending-an-act-one-won't-do, so the paradox is a distinct conditional-intention problem, not DDE","type":"synthesis"},{"q":"Can the moral equality of combatants survive killer robots? If a machine does the killing and 'who attacked?' answers 'the robot', what happens to the symmetrical permission/liability that both sides' soldiers are supposed to share?","week":"synthesis","idea":"Moral equality of combatants / independence thesis (W6) vs the responsibility gap (W11): if no human is fairly responsible the reciprocal soldier-to-soldier permission structure has no agent to attach to","type":"synthesis"},{"q":"Is terrorism morally worse than a signature drone strike? Both deliberately impose lethal risk on people whose individual identity and responsibility are unknown, for political/strategic ends. Use Primoratz's definition and the distinction/double-effect machinery to compare them.","week":"synthesis","idea":"Terrorism = targeting non-combatants to coerce (W7) vs signature strikes on unknown persons by pattern-of-life (W10); whether DDE/distinction genuinely separates them or whether both target the merely-suspected innocent","type":"synthesis"},{"q":"Sparrow's respect argument condemns autonomous weapons because sending a robot to kill expresses disrespect ('like setting traps for mice'). Does the same Kantian/Nagelian respect argument also condemn riskless drone killing — or do drones survive it because a human still decides?","week":"synthesis","idea":"Robots-and-Respect / Nagel's interpersonal relation 'aimed at him as a subject' (W11) vs riskless drone killing (W10); the human-in-the-loop drone keeps the interpersonal relation, so respect distinguishes drones from AWS — unless the expressive/conventional meaning condemns both","type":"synthesis"},{"q":"Does the asymmetry of drone and robotic warfare — riskless killing with no effective way to fight back — undermine jus ad bellum, especially the 'reasonable chance of success' and proportionality criteria? Why does Sparrow think the 'unfairness' intuition mostly misses?","week":"synthesis","idea":"Asymmetry/riskless killing (W10/11) vs jus ad bellum (W4): the perpetual-war / no-victory-condition problem wrecks 'reasonable chance of success' and proportionality; but Sparrow holds war isn't meant to be fair and commanders are obligated to seek asymmetry","type":"synthesis"},{"q":"Were Hiroshima and Nagasaki acts of state terrorism, and if you condemn them must you also condemn nuclear deterrence? Trace the line from the W7 terrorism definition through the bombings to counter-value second-strike doctrine.","week":"synthesis","idea":"State terrorism = targeting non-combatants to coerce a government (W7) applied to the atomic bombings and to counter-value deterrence (W9), which threatens enemy cities; if the bombings were terrorism, so is the standing deterrent threat","type":"synthesis"},{"q":"Are nuclear weapons mala in se? Apply each of the four ways to argue a weapon is evil-in-itself and explain why Sparrow pushes back on radiation and scale — is 'just a very big bomb' the right verdict?","week":"synthesis","idea":"The four mala in se arguments — indiscriminate, unnecessary suffering, shock-the-conscience, fail-to-respect (W8) — applied to nukes (W9); Sparrow's pushback that radiation isn't uniquely worse than blood poisoning and scale alone doesn't make killing worse","type":"synthesis"},{"q":"Are autonomous weapons mala in se, and how does the case differ from chemical weapons or poison gas? Explain why Sparrow says AWS are 'weapons platforms' not weapons, and why that forces the ban argument onto respect rather than manner-of-killing.","week":"synthesis","idea":"Mala in se / four arguments and unnecessary suffering (W8) applied to AWS (W11): a Hellfire kills identically whoever fires it, so manner-of-killing fails; only the respect/expressive-disrespect argument can ground a total ban","type":"synthesis"},{"q":"Does the realist rejection of the 'reputable vs rogue state' distinction ('how many countries have North Korea invaded since 1950? how many has the US?') imply a realist Iran should pursue exactly the nuclear deterrent the West condemns? Build the argument.","week":"synthesis","idea":"Realism's single motivational structure for all states (W3) applied to nuclear possession and the rogue/reputable rejection (W9): if deterrence is rational for the US/Israel it is rational for Iran on Realism's own logic","type":"synthesis"},{"q":"Outside a declared war zone Sparrow says distinction and proportionality become STRICTER (the police standard), not looser. Reconstruct the jus in bello principles you learned in W6 and explain how applying them to targeted killing flips the usual military permission.","week":"synthesis","idea":"Distinction and proportionality (W6) become the police 'urgent and immediate threat to life' / 'no innocent casualties at all' standard outside declared conflict (W10) — military collateral allowances don't apply","type":"synthesis"},{"q":"Does Arkin's claim that ethical robots could outperform human soldiers on the laws of war succeed against the jus in bello principle that one may NEVER deliberately target non-combatants or use evil means? Explain Sparrow's 'consequentialist trap' reply.","week":"synthesis","idea":"Arkin's better-than-humans statistical case vs the non-consequentialist character of jus in bello (W6/W8 absolute prohibitions, W11): fewer deaths is a consequentialist gain, but jus in bello forbids deliberate civilian targeting and mala in se 'even if it reduces casualties'","type":"synthesis"},{"q":"Can humanitarian intervention / R2P be reconciled with the respect-for-sovereignty principle that grounds jus ad bellum, when the modern tool of delivery is precision airpower and drones rather than ground troops? Does technological precision strengthen or weaken the proportionality case for intervening?","week":"synthesis","idea":"R2P vs sovereignty as the order's main principle (W4/W5) meeting drone-precision (W10): precision lowers apparent in-bello costs but the 'easier to make things worse than better' proportionality/success problem and the perpetual-war risk remain","type":"synthesis"},{"q":"Is the pacifist's 'who should justify what' burden-reversal vindicated by nuclear weapons and killer robots? Sparrow says pacifism 'bites hardest' for nuclear-armed states and is an 'ever-present danger' if distinction can't be drawn — connect these to the modern cases.","week":"synthesis","idea":"Pacifism's reversed burden and 'bites hardest for two nuclear-armed states' (W2) applied to nukes (W9) and to the W6 dilemma (if distinction fails → pacifism or total war), strengthened by AWS responsibility gap (W11)","type":"synthesis"},{"q":"If the deterrent threat 'if you attack us we will murder your civilians' looks 'perilously close to terrorism', does the contract-killer analogy (ex. 9.5) show that possessing nuclear weapons makes a state a standing terrorist? Use the W7 definition to adjudicate.","week":"synthesis","idea":"Working terrorism definition — threats of violence against non-combatants to coerce (W7) — applied to the standing deterrent threat and the contract-killer-of-the-neighbours'-children analogy (W9)","type":"synthesis"},{"q":"Sparrow argues distinction's accounts of why we may kill combatants (threat, responsibility, forfeiture) yield 'surprising conclusions at odds with military practice'. Pick the responsibility account and show how it both licenses terrorism against democratic voters (W7) AND complicates who a drone may target (W10).","week":"synthesis","idea":"The responsibility account of combatant liability (W6) — in democracies the voting population is 'responsible' — bridges to both the terrorism rationale (W7) and targeted-killing's contested combatant status (W10)","type":"synthesis"},{"q":"Does the 'last resort' criterion of jus ad bellum condemn targeted killing because arrest, interception, or changing US foreign policy are available alternatives — and how does this mirror the pacifist's 'last resort' pressure point and the alternatives-to-war argument of political pacifism?","week":"synthesis","idea":"Last resort (W4) and political pacifism's 'alternatives exist / negotiation and sanctions' (W2) applied to drone targeted killing's displaced alternatives — arrest, interception, altering policy (W10)","type":"synthesis"},{"q":"Is the responsibility gap for autonomous weapons a genuinely new problem, or just the old 'who is responsible in war' question (command responsibility, the war convention) under strong-AI assumptions? Explain on which definition of autonomy the gap even arises.","week":"synthesis","idea":"Responsibility gap (W11) vs command responsibility / proper authority and the war convention (W4): the gap arises only on the strong/critic definition; on the deflationary view responsibility lies with the launcher, as command responsibility already handles autonomous human troops","type":"synthesis"},{"q":"Does morality apply to war at all, or is Sparrow's whole unit only intelligible once you reject Realism and Pacifism? State the two 'radical challenges' and explain why rejecting both is the precondition for everything in weeks 4 through 11.","week":"synthesis","idea":"Realism (war not morally evaluable) and Pacifism (war never justified) as the two radical challenges; rejecting both motivates JWT, the framework the rest of the unit applies","type":"meta"},{"q":"Is the entire unit reducible to a contest between consequentialism and deontology? Show how each jus in bello principle can be grounded consequentially, conventionally, or deontologically, and why Sparrow thinks none of these deliver what IHL actually claims.","week":"synthesis","idea":"The 'hybrid' nature of JWT: in bello rules grounded consequentially / conventionally / deontologically, none delivering the absolute prohibitions IHL asserts — the recurring Sparrow puzzle across W6-W11","type":"meta"},{"q":"What single thread ties nuclear weapons, drones, and autonomous weapons together as the unit's three modern hard cases? Identify the common test each poses to jus in bello and to the mala in se / terrorism nexus.","week":"synthesis","idea":"All three are test cases for jus in bello (distinction/proportionality), for the mala in se prohibition, and for the terrorism link; each also revives the appeal of realism and pacifism — the unit's organising spine","type":"meta"},{"q":"Sparrow says the more fine-grained and plausible an account of distinction becomes, the more it pushes toward either pacifism or 'total war'. Explain this dilemma and say which horn you take — and what it implies for nuclear, drone, and robotic warfare.","week":"synthesis","idea":"The distinction dilemma: a better account of who may be killed makes it harder to tell supporters from non-supporters in practice → pacifism or abandonment; the foundational tension that recurs in every modern case","type":"meta"},{"q":"Of all the principles in the course — distinction, proportionality, mala in se, the independence thesis, respect for sovereignty — which is the single most important, and why? Defend your choice by showing what collapses without it.","week":"synthesis","idea":"Ranking the foundational principles by load-bearing role; e.g. distinction underwrites the condemnation of terrorism and the in-bello assessment of every weapon, but rests on the contested independence thesis","type":"meta"},{"q":"Can Just War Theory survive modern military technology, or do nuclear weapons, drones and killer robots show it has been overtaken? Marshal the strongest case that JWT still works and the strongest case that it doesn't, then give your verdict.","week":"synthesis","idea":"Whether JWT's structure (jus ad bellum + jus in bello, distinction/proportionality, absolute prohibitions) can still adjudicate perpetual war, riskless asymmetry, deterrence paradox and the responsibility gap","type":"meta"},{"q":"Why does Sparrow repeatedly insist that 'absolute' prohibitions can't be grounded consequentially — and is the demand for absolute in-bello rules itself the deepest problem the unit exposes? Tie this to why he stays sceptical about nukes, drones and AWS.","week":"synthesis","idea":"The puzzle of absolute requirements: IHL/jus in bello claims rules binding 'in all circumstances' even when the enemy defects, but consequentialist grounding lapses and conventional grounding is contingent — Sparrow's recurring 'exceedingly puzzling' move","type":"meta"},{"q":"Does the role of CONVENTION run through the whole course as the fallback when principled accounts fail — distinction as mere convention, mala in se as convention, and respect as conventionally-meaningful? Is convention enough to bear the moral weight Sparrow finally rests on it?","week":"synthesis","idea":"Convention as the recurring fallback (W6 distinction, W8 mala in se, W11 respect's conventional/expressive turn); Sparrow's candid admission the AWS ban argument is 'much weaker than critics would like' because it rests on changeable convention","type":"meta"},{"q":"Throughout the unit Sparrow argues jus in bello advantages the militarily powerful and may require the weak not to fight back. Is Just War Theory therefore a tool of the strong — and does this charge unite terrorism's defenders, the asymmetry objection to drones, and the imperialism critique of R2P?","week":"synthesis","idea":"The 'who benefits' through-line: precision weapons make distinction easy for the powerful, JWT siding with the powerful; unites the terrorism-justification move (W7), drone asymmetry (W10), and the R2P imperialism charge (W5)","type":"meta"}],"thinkers":[{"name":"Sparrow","idea":"Killer robots create a \"responsibility gap\" — no one (programmer, commander, or machine) can be fairly blamed for a wrongful killing","q":"Why might autonomous weapons be illegitimate even if they work?"},{"name":"Sparrow","idea":"Being killed by a machine that \"decides\" to kill you fails to respect your moral status (\"Robots and Respect\")","q":"What is wrong with a machine, not a human, choosing to kill you?"},{"name":"Arkin","idea":"Robots could be MORE ethical than soldiers — no fear or rage — via an \"ethical governor\"","q":"What is the strongest case FOR building autonomous weapons?"},{"name":"Walzer","idea":"The \"moral equality of combatants\" — any soldier may kill any enemy soldier, whatever the cause","q":"On the traditional view, who may soldiers kill?"},{"name":"McMahan","idea":"You are a fair target because you are responsible for an unjust threat — not just for wearing a uniform (liability)","q":"What really makes someone a legitimate target?"},{"name":"Rodin","idea":"National self-defence is NOT really like individual self-defence (the \"reductivist\" challenge)","q":"What is the deep challenge to the usual reason for starting a war?"},{"name":"Primoratz","idea":"Terrorism = deliberately attacking innocents to terrorise/coerce a wider group","q":"How is terrorism defined?"},{"name":"Held","idea":"Judge terrorism by the SAME standard as war — so it is not automatically worse","q":"Is terrorism always worse than regular war?"},{"name":"Nagel","idea":"The clash of absolutism vs utilitarianism (\"War and Massacre\")","q":"Who frames the core \"rules vs results\" clash for war?"},{"name":"Anscombe","idea":"Pacifism is \"pernicious\" — it erases the line between killing a soldier and murdering the innocent","q":"What is the sharpest objection to pacifism?"},{"name":"Tolstoy","idea":"Pacifism — war is never justified","q":"Who holds that war is never justified?"},{"name":"Morgenthau","idea":"Realism — morality does not really apply to war; states pursue power and survival","q":"Who says morality has no place in war?"},{"name":"Orend","idea":"Rebuts BOTH realism and pacifism, defending just war theory","q":"Who answers both \"anything goes\" and \"war is always wrong\"?"},{"name":"Ward Wilson","idea":"Nuclear deterrence may not even work — the Soviet invasion, not Hiroshima, may have ended WWII","q":"Who doubts that nuclear weapons actually keep the peace?"},{"name":"Byman","idea":"\"Why Drones Work\" — drones are precise and protect your own troops","q":"What is the case FOR drones?"},{"name":"Boyle","idea":"Drones cause \"blowback\" — civilian deaths radicalise people and create more enemies","q":"What is the case AGAINST drones?"},{"name":"Annan","idea":"\"Responsibility to Protect\" — sovereignty is conditional on a state protecting its people","q":"What justifies invading to stop a government slaughtering its people?"},{"name":"Coady","idea":"Critiques humanitarian war — \"we are just helping\" is easily abused","q":"What is the worry about humanitarian intervention?"}],"concepts":[{"term":"Doctrine of Double Effect","q":"Can foreseen-but-unintended civilian deaths ever be acceptable?"},{"term":"Distinction","q":"Which rule says: only target fighters, never deliberately civilians?"},{"term":"The deterrence paradox","q":"Is it ethical to THREATEN what it would be unethical to actually DO?"},{"term":"Mala in se","q":"What is the term for a weapon or act that is \"evil in itself\"?"},{"term":"Consequentialism","q":"Judging an act purely by whether it produces the best outcome?"},{"term":"Deontology","q":"The view that some acts are wrong in themselves, whatever the result?"},{"term":"Jus ad bellum","q":"The justice of whether it was right to START a war?"},{"term":"Jus in bello","q":"The justice of how a war is FOUGHT?"},{"term":"Proportionality","q":"The rule that harm caused must not be excessive vs the military gain?"},{"term":"Signature strike","q":"Killing someone by their behaviour pattern, without knowing who they are?"},{"term":"Responsibility gap","q":"The problem that no one can be blamed when an autonomous weapon kills wrongly?"},{"term":"Non-combatant immunity","q":"The principle that civilians may not be deliberately attacked?"}],"grade":{"url":"https://vibe-toolkit-prod.tail2c370e.ts.net/grade","token":"ats2640-viva-7q3z9k"}};</script>
<script>(function () {
  const DATA = window.DATA || {};
  const app = document.getElementById('app');
  const render = (s) => (window.marked ? (marked.parse ? marked.parse(s) : marked(s)) : s);
  const esc = (s) => String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  const shuffle = (a) => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; };
  const sample = (arr, n, ex) => shuffle(arr.filter(x => !ex.includes(x))).slice(0, n);

  let TAB = 'learn';
  const TABS = [['learn', 'Learn'], ['viva', 'Viva 🎤'], ['cards', 'Flashcards'], ['practice', 'Practice'], ['game', 'Game']];

  function renderTabs() {
    document.getElementById('tabbar').innerHTML = TABS.map(([k, l]) =>
      '<button class="tab' + (k === TAB ? ' on' : '') + '" data-k="' + k + '">' + l + '</button>').join('');
    document.querySelectorAll('.tab').forEach(b => b.onclick = () => { TAB = b.dataset.k; renderTabs(); route(); window.scrollTo(0, 0); });
  }
  function route() {
    if (TAB === 'learn') renderLearn();
    else if (TAB === 'viva') renderViva();
    else if (TAB === 'cards') renderCards();
    else if (TAB === 'practice') renderPractice();
    else if (TAB === 'game') renderGame();
  }

  // ---------- LEARN ----------
  function renderLearn() {
    app.innerHTML = '<div class="prose">' + render(DATA.learn || '') + '</div>'
      + '<p class="foot">Offline copies: <a href="https://github.com/Maximiseperformanc/ats2640-prep">PDF downloads on GitHub</a></p>';
  }

  // ---------- FLASHCARDS ----------
  let deck = [], ci = 0, flipped = false, secFilter = 'All';
  function buildDeck() { deck = (DATA.flashcards || []).filter(c => secFilter === 'All' || c.sec === secFilter); ci = 0; flipped = false; }
  function renderCards() {
    const secs = ['All', ...new Set((DATA.flashcards || []).map(c => c.sec))];
    if (!deck.length) buildDeck();
    const c = deck[ci] || { front: '(no cards)', back: '' };
    app.innerHTML =
      '<div class="row"><select id="secf">' + secs.map(s => '<option' + (s === secFilter ? ' selected' : '') + '>' + esc(s) + '</option>').join('') + '</select>'
      + '<span class="count">' + (deck.length ? ci + 1 : 0) + ' / ' + deck.length + '</span>'
      + '<button class="mini" id="shuf">Shuffle</button></div>'
      + '<div class="flash" id="flash"><div class="flashinner">'
      + '<div class="flabel">' + (flipped ? 'ANSWER' : 'PROMPT — say it aloud, then tap') + '</div>'
      + '<div class="ftext">' + (flipped ? render(c.back) : esc(c.front)) + '</div></div></div>'
      + '<div class="row btns"><button class="nav" id="prev">← Prev</button>'
      + '<button class="nav primary" id="flip">' + (flipped ? 'Hide' : 'Reveal') + '</button>'
      + '<button class="nav" id="next">Next →</button></div>';
    document.getElementById('flash').onclick = () => { flipped = !flipped; renderCards(); };
    document.getElementById('flip').onclick = (e) => { e.stopPropagation(); flipped = !flipped; renderCards(); };
    document.getElementById('prev').onclick = (e) => { e.stopPropagation(); ci = (ci - 1 + deck.length) % deck.length; flipped = false; renderCards(); };
    document.getElementById('next').onclick = (e) => { e.stopPropagation(); ci = (ci + 1) % deck.length; flipped = false; renderCards(); };
    document.getElementById('shuf').onclick = () => { deck = shuffle(deck); ci = 0; flipped = false; renderCards(); };
    document.getElementById('secf').onchange = (e) => { secFilter = e.target.value; buildDeck(); renderCards(); };
  }

  // ---------- PRACTICE ----------
  function renderPractice() {
    const groups = [['Q1', 'Q1 — Hard cases (weeks 9–11)'], ['Q2', 'Q2 — Foundations (weeks 1–8)'], ['Q3', 'Q3 — Synthesis']];
    let h = '<p class="hint">Tap a question to see talking points. Aim to talk ~3–4 min: take a position, give a reason.</p>';
    for (const [g, title] of groups) {
      h += '<h2 class="ph">' + title + '</h2>';
      const secs = (DATA.practice || []).filter(s => s.group === g);
      for (const sec of secs) {
        if (secs.length > 1) h += '<div class="ptopic">' + esc(sec.topic) + '</div>';
        for (const q of sec.questions) {
          h += '<details class="qa"><summary>' + esc(q.question) + '</summary><ul>'
            + q.points.map(p => '<li>' + esc(p) + '</li>').join('') + '</ul></details>';
        }
      }
    }
    app.innerHTML = h;
  }

  // ---------- VIVA (spoken, blind, auto-judged by Claude) ----------
  let vivaItem = null, vivaWeek = 'all';
  const VIVA = (DATA.viva && DATA.viva.length) ? DATA.viva : (DATA.practice || []).flatMap(s => s.questions.map(q => ({ q: q.question, week: '', idea: '' })));
  const vivaWeeksList = () => { const s = new Set(VIVA.map(v => v.week)); const o = []; for (let i = 1; i <= 11; i++) if (s.has(i)) o.push(i); if (s.has('synthesis')) o.push('synthesis'); return o; };
  const weekLabel = (w) => w === 'synthesis' ? 'Synthesis' : ('Week ' + w);
  const vivaFilter = () => vivaWeek === 'all' ? VIVA : VIVA.filter(v => String(v.week) === String(vivaWeek));
  function newViva() { const pool = vivaFilter(); vivaItem = pool[Math.floor(Math.random() * pool.length)] || { q: 'No questions loaded.', idea: '' }; renderViva(); }
  function renderViva() {
    if (!vivaItem) { newViva(); return; }
    const pool = vivaFilter();
    const opts = '<option value="all"' + (vivaWeek === 'all' ? ' selected' : '') + '>All topics (' + VIVA.length + ')</option>'
      + vivaWeeksList().map(w => '<option value="' + w + '"' + (String(vivaWeek) === String(w) ? ' selected' : '') + '>' + weekLabel(w) + '</option>').join('');
    app.innerHTML =
      '<p class="hint">The real test — <b>no options</b>. Pick a topic (or all ' + VIVA.length + '), read the question, then <b>speak your answer out loud</b> (keyboard 🎤 or Record). Claude marks it against the real notes and ties it back to the big picture.</p>'
      + '<div class="row"><select id="vw">' + opts + '</select><span class="count">' + pool.length + ' Qs</span><button class="mini" id="newq">↻ New</button></div>'
      + '<div class="card"><div class="qlabel">Spoken mock oral</div><div class="q">' + esc(vivaItem.q) + '</div></div>'
      + '<textarea id="ans" rows="5" placeholder="Speak your answer here (keyboard 🎤) or type it… aim for ~1–2 minutes."></textarea>'
      + '<div class="row btns"><button class="nav" id="rec">🎤 Record</button><button class="nav primary" id="judge">Judge my answer</button></div>'
      + '<div id="vfb"></div>';
    const ta = document.getElementById('ans');
    document.getElementById('rec').onclick = function () { toggleRec(this, ta); };
    document.getElementById('judge').onclick = () => judge(ta);
    document.getElementById('newq').onclick = newViva;
    document.getElementById('vw').onchange = (e) => { vivaWeek = e.target.value; newViva(); };
  }
  function toggleRec(btn, ta) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { btn.textContent = '🎤 use keyboard mic'; btn.disabled = true; return; }
    if (window.__rec && window.__recOn) { window.__rec.stop(); return; }
    const rec = new SR(); window.__rec = rec;
    rec.lang = 'en-AU'; rec.continuous = true; rec.interimResults = true;
    const base = ta.value ? ta.value.trim() + ' ' : '';
    rec.onresult = (e) => { let t = ''; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript + ' '; ta.value = base + t.replace(/\s+/g, ' ').trim(); };
    rec.onend = () => { window.__recOn = false; btn.textContent = '🎤 Record'; btn.classList.remove('recing'); };
    rec.onerror = () => { window.__recOn = false; btn.textContent = '🎤 Record'; btn.classList.remove('recing'); };
    rec.start(); window.__recOn = true; btn.textContent = '⏹ Stop recording'; btn.classList.add('recing');
  }
  async function judge(ta) {
    const fb = document.getElementById('vfb');
    const ans = (ta.value || '').trim();
    if (!ans) { fb.innerHTML = '<div class="feedback show bad">Speak or type your answer first.</div>'; return; }
    const g = DATA.grade || {};
    if (!g.url) { fb.innerHTML = '<div class="feedback show bad">Grader not configured.</div>'; return; }
    fb.innerHTML = '<div class="feedback show">⏳ Asking Claude to mark your answer… (about 10–20 seconds)</div>';
    const jb = document.getElementById('judge'); if (jb) jb.disabled = true;
    try {
      const r = await fetch(g.url, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ token: g.token, question: vivaItem.q, answer: ans }) });
      const j = await r.json();
      if (j.feedback) fb.innerHTML = '<div class="card vgrade">' + render(j.feedback) + '</div>' + (vivaItem.idea ? '<div class="hint" style="margin-top:8px">🎯 Main idea this tests: <b>' + esc(vivaItem.idea) + '</b></div>' : '');
      else fb.innerHTML = '<div class="feedback show bad">' + esc(j.error || 'Grader error — try again.') + '</div>';
    } catch (e) {
      fb.innerHTML = '<div class="feedback show bad">Couldn’t reach the grader (your box may be offline). ' + esc(e.message) + '</div>';
    }
    if (jb) jb.disabled = false;
  }

  // ---------- GAME (comprehension-first) ----------
  let score = 0, streak = 0, seen = 0, gmode = 'understand';
  function statsBar() {
    return '<div class="stats"><span>Score ' + score + '</span><span>Streak ' + streak + '</span><span>' + seen + ' done</span></div>'
      + '<div class="gmode"><button id="mU" class="' + (gmode === 'understand' ? 'on' : '') + '">Understand</button>'
      + '<button id="mN" class="' + (gmode === 'names' ? 'on' : '') + '">Names (recall)</button></div>';
  }
  function renderGame() {
    app.innerHTML = statsBar() + '<div id="garea"></div>';
    document.getElementById('mU').onclick = () => { gmode = 'understand'; renderGame(); };
    document.getElementById('mN').onclick = () => { gmode = 'names'; renderGame(); };
    if (gmode === 'understand') newUnderstand(); else newMatch();
  }
  function refreshStats() {
    const s = document.querySelector('.stats');
    if (s) s.outerHTML = '<div class="stats"><span>Score ' + score + '</span><span>Streak ' + streak + '</span><span>' + seen + ' done</span></div>';
  }
  // comprehension quiz — scenarios/reasoning, with a teaching explanation after each answer
  let uCorrect = null;
  function newUnderstand() {
    const bank = DATA.quiz || [];
    if (!bank.length) { document.getElementById('garea').innerHTML = '<p class="hint">Comprehension questions not loaded.</p>'; return; }
    const item = bank[Math.floor(Math.random() * bank.length)];
    uCorrect = item.answer;
    const opts = shuffle([item.answer].concat(item.distractors || []));
    document.getElementById('garea').innerHTML =
      '<div class="card"><div class="qlabel">' + esc(item.kind || 'Think it through') + '</div><div class="q">' + esc(item.q) + '</div></div>'
      + '<div class="opts">' + opts.map(o => '<button class="opt">' + esc(o) + '</button>').join('') + '</div>'
      + '<div class="feedback" id="fb"></div><button class="next" id="nx">Next →</button>';
    document.querySelectorAll('#garea .opt').forEach(b => b.onclick = () => answerU(b, item.why));
    document.getElementById('nx').onclick = newUnderstand;
  }
  function answerU(btn, why) {
    document.querySelectorAll('#garea .opt').forEach(o => { o.disabled = true; if (o.textContent === uCorrect) o.classList.add('correct'); });
    const fb = document.getElementById('fb'); seen++;
    const right = btn.textContent === uCorrect;
    if (right) { score++; streak++; } else { streak = 0; btn.classList.add('wrong'); }
    fb.className = 'feedback show ' + (right ? 'good' : 'bad');
    fb.innerHTML = (right ? '✓ Right. ' : '✗ Not quite — the answer is highlighted. ') + '<b>Why:</b> ' + esc(why || '');
    refreshStats(); document.getElementById('nx').classList.add('show');
  }
  // match-up
  let mSel = null, mDone = 0;
  function newMatch() {
    mSel = null; mDone = 0;
    const pool = (DATA.thinkers || []).filter((p, i) => DATA.thinkers.findIndex(x => x.name === p.name) === i);
    const round = shuffle(pool).slice(0, 5);
    const ideas = shuffle(round.map(p => ({ name: p.name, idea: p.idea })));
    document.getElementById('garea').innerHTML =
      '<div class="msg" id="mmsg">Tap a thinker, then tap their idea.</div><div class="board"><div><div class="col-h">Thinker</div>'
      + round.map(p => '<button class="tile name" data-n="' + esc(p.name) + '">' + esc(p.name) + '</button>').join('')
      + '</div><div><div class="col-h">Idea</div>'
      + ideas.map(o => '<button class="tile idea" data-n="' + esc(o.name) + '">' + esc(o.idea) + '</button>').join('')
      + '</div></div><button class="next show" id="nb">New board ↻</button>';
    document.querySelectorAll('#garea .tile.name').forEach(b => b.onclick = () => {
      if (b.classList.contains('done')) return;
      document.querySelectorAll('#garea .tile.name').forEach(t => t.classList.remove('sel'));
      b.classList.add('sel'); mSel = b;
    });
    document.querySelectorAll('#garea .tile.idea').forEach(b => b.onclick = () => {
      if (b.classList.contains('done') || !mSel) return;
      const msg = document.getElementById('mmsg');
      if (b.dataset.n === mSel.dataset.n) {
        b.classList.add('done'); mSel.classList.add('done'); mSel.classList.remove('sel'); mSel = null; mDone++; score++; refreshStats();
        msg.textContent = mDone === 5 ? '🎉 All matched! Tap “New board”.' : 'Matched! (' + mDone + '/5)';
      } else { b.classList.add('bad'); streak = 0; refreshStats(); msg.textContent = 'Not that one — try again.'; const x = b; setTimeout(() => x.classList.remove('bad'), 450); }
    });
    document.getElementById('nb').onclick = newMatch;
  }

  renderTabs(); route();
})();
</script>
